{id:128,type:"hotspot",question:"Tienes un datacenter local que contiene una app web personalizada llamada App1.\nLas solicitudes a App1 se enrutan a través de Azure Front Door que está conectado a App1 a través de Private Link.\nTienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas crear una alerta en Microsoft Sentinel cuando App1 sea accedida desde una dirección IP maliciosa conocida. La solución debe minimizar el esfuerzo administrativo.\n¿Qué deberías crear?",subquestions:[{label:"Tipo de conector de datos a usar:",options:["Azure Front Door","Microsoft Defender for Cloud","Threat Intelligence - TAXII","Common Event Format (CEF)"],answer:"Azure Front Door"},{label:"Tipo de regla de análisis:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Scheduled"}]},
{id:129,type:"dragdrop",question:"Planeas conectar una solución externa que enviará mensajes Common Event Format (CEF) a Azure Sentinel.\nNecesitas desplegar el log forwarder.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["Deploy an OMS Gateway on the network.","Set the syslog daemon to forward the events directly to Azure Sentinel.","Configure the syslog daemon. Restart the syslog daemon and the Log Analytics agent.","Download and install the Log Analytics agent.","Set the Log Analytics agent to listen on port 25226 and forward the CEF messages to Azure Sentinel."],answer:["Download and install the Log Analytics agent.","Set the Log Analytics agent to listen on port 25226 and forward the CEF messages to Azure Sentinel.","Configure the syslog daemon. Restart the syslog daemon and the Log Analytics agent."]},
{id:130,type:"hotspot",question:"Desde Azure Sentinel, abres el panel de Investigation para una alerta de alta severidad.\nNecesitas ver información adicional sobre las entidades relacionadas con la alerta en la Investigation graph.\n¿Qué deberías hacer para agregar más contexto a la investigación?",subquestions:[{label:"Para agregar notas a eventos durante la investigación:",options:["Crear un bookmark","Crear un playbook","Crear una watchlist","Agregar un comentario al incidente"],answer:"Crear un bookmark"},{label:"Para ver actividad histórica de una entidad (usuario o IP):",options:["Seleccionar la entidad y ver Entity timeline","Ejecutar una consulta de Advanced Hunting","Ver el Activity log de Azure","Crear una Analytics rule Scheduled"],answer:"Seleccionar la entidad y ver Entity timeline"}]},
{id:131,type:"dragdrop",question:"Tienes un despliegue de Azure Sentinel.\nNecesitas consultar todas las actividades de acceso a credenciales sospechosas.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["From Azure Sentinel, select Hunting.","Select Run All Queries.","Select New Query.","Filter by tactics.","From Azure Sentinel, select Notebooks."],answer:["From Azure Sentinel, select Hunting.","Filter by tactics.","Select Run All Queries."]},
{id:132,type:"mc",question:"Tienes una aplicación lógica de Azure existente que se usa para bloquear usuarios de Azure Active Directory (Azure AD). La aplicación lógica se activa manualmente.\nDespliegas Azure Sentinel.\nNecesitas usar la aplicación lógica existente como playbook en Azure Sentinel.\n¿Qué deberías hacer primero?",options:{"A":"Add a new scheduled query rule.","B":"Add a data connector to Azure Sentinel.","C":"Configure a custom Threat Intelligence connector in Azure Sentinel.","D":"Modify the trigger in the logic app."},answer:"D"},
{id:133,type:"mc",question:"Su empresa utiliza Azure Sentinel para gestionar las alertas de más de 10.000 dispositivos IoT.\nUn responsable de seguridad de la empresa informa de que el seguimiento de las amenazas a la seguridad resulta cada vez más difícil debido al elevado\nnúmero de incidentes.\n\nDebe recomendar una solución que proporcione una visualización personalizada para simplificar la investigación de amenazas y para inferir\namenazas mediante el uso de aprendizaje automático.\n\n¿Qué debería incluir en la recomendación?",options:{"A":"built-in queries","B":"livestream","C":"notebooks","D":"bookmarks"},answer:"C"},
{id:134,type:"mc",question:"Tienes un manual de procedimientos en Azure Sentinel.\n\nAl activar el playbook, se envía un correo electrónico a un grupo de distribución.\nDebes modificar el playbook para enviar el correo electrónico al propietario del recurso en lugar de al grupo de distribución. ¿Qué\ndebes hacer?",options:{"A":"Agregue un parámetro y modifique el disparador.","B":"Agregue un conector de datos personalizado y modifique el activador.","C":"Añade una condición y modifica la acción.","D":"Agregue una alerta y modifique la acción."},answer:"A"},
{id:135,type:"mc",question:"Estás aprovisionando Azure Sentinel para una nueva suscripción de\nAzure. Estás configurando el conector de eventos de seguridad.\n\nAl crear una nueva regla a partir de una plantilla en el conector, decide generar una nueva alerta para cada evento. Crea\nla siguiente consulta de regla.\n\n¿Mediante qué dos componentes se pueden agrupar las alertas en incidentes? Cada respuesta correcta presenta una solución\ncompleta. NOTA: Cada selección correcta vale un punto.\nUn usuario\n\nGrupo de recursos B\nDirección IP del cliente",options:{"A":"user","B":"resource group","C":"IP address","D":"computer"},answer:"AD"},
{id:136,type:"mc",question:"Su empresa almacena los datos de cada proyecto en una suscripción de Azure diferente. Todas las suscripciones utilizan el mismo\ninquilino de Azure Active Directory (Azure AD).\nCada proyecto consta de varias máquinas virtuales de Azure que ejecutan Windows Server. Los eventos de Windows de las máquinas\nvirtuales se almacenan en un espacio de trabajo de Log Analytics en la suscripción correspondiente de cada máquina.\nImplementas Azure Sentinel en una nueva suscripción de Azure.\n\nDebe realizar consultas de búsqueda en Azure Sentinel para buscar en todos los espacios de trabajo de Log Analytics de todas las\nsuscripciones.\n\n¿Qué dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Libros de jugadas Licenciatura en Análisis","B":"Crea una consulta que utilice la expresión de espacio de trabajo y el operador de unión.","C":"Inteligencia sobre amenazas","D":"Incidentes","E":"Agregue la solución Azure Sentinel a cada espacio de trabajo."},answer:"BE"},
{id:137,type:"mc",question:"Tienes un workspace de Azure Sentinel.\nNecesitas probar un playbook manualmente en el portal de Azure.\n¿Desde dónde puedes ejecutar la prueba en Azure Sentinel?",options:{"A":"Playbooks","B":"Analytics","C":"Threat intelligence","D":"Incidents"},answer:"A"},
{id:138,type:"mc",question:"Tienes una regla de análisis personalizada para detectar amenazas en Azure Sentinel.\n\nDescubres que la regla de análisis dejó de funcionar. La regla se deshabilitó y su nombre tiene el prefijo AUTO\nDISABLED.\n¿Cuál es una posible causa del problema?",options:{"A":"Existen problemas de conectividad entre las fuentes de datos y Log Analytics.","B":"El número de alertas superó las 10.000 en dos minutos.","C":"La consulta de la regla tarda demasiado en ejecutarse y se agota el tiempo de espera.","D":"Se modificaron los permisos de una de las fuentes de datos de la consulta de reglas."},answer:"D"},
{id:139,type:"mc",question:"Su empresa utiliza Azure Sentinel.\nUna nueva analista de seguridad informa que no puede asignar ni resolver incidentes en Azure Sentinel.\nDebes asegurarte de que el analista pueda asignar y resolver incidentes. La solución debe basarse en el principio de mínimo\nprivilegio.\n\n¿Qué rol debería asignarle al analista?",options:{"A":"Azure Sentinel Responder","B":"Logic App Contributor","C":"Azure Sentinel Contributor","D":"Azure Sentinel Reader"},answer:"A"},
{id:140,type:"mc",question:"Recientemente implementaste Azure Sentinel.\n\nDescubres que la regla predeterminada de Fusion no genera ninguna alerta. Verificas que la regla esté habilitada. Debes\nasegurarte de que la regla de Fusion pueda generar alertas.\n\n¿Qué deberías hacer?",options:{"A":"Desactive y luego active la regla.","B":"Agregar conectores de datos","C":"Crear una nueva regla de análisis de aprendizaje automático.","D":"Añade un marcapáginas de caza."},answer:"B"},
{id:141,type:"hotspot",question:"Tienes un área de trabajo de Microsoft Sentinel.\nNecesitas crear una regla de analytics programada para detectar NXDOMAIN DNS usando parsers ASIM unificados.\n¿Qué configuraciones de la regla de analytics deberías usar?",subquestions:[{label:"Tipo de regla:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Scheduled"},{label:"Tabla/función para queries DNS con ASIM:",options:["DnsEvents","_Im_Dns","AzureDiagnostics","CommonSecurityLog"],answer:"_Im_Dns"}]},
{id:142,type:"mc",question:"Una empresa utiliza Azure Sentinel.\nNecesitas crear una respuesta automatizada ante\namenazas. ¿Qué deberías usar?\n\nConector de datos AA\nLibro de jugadas de Ba\nLibro de trabajo de Ca\n\nRegla de creación de incidentes de Microsoft",options:{"A":"a data connector","B":"a playbook","C":"a workbook","D":"a Microsoft incident creation rule"},answer:"B"},
{id:143,type:"hotspot",question:"Usas Azure Sentinel para monitorear actividad irregular de Azure.\nCreas consultas KQL personalizadas.\nNecesitas una regla de detección que activa una alerta cuando se accede a recursos de Azure por primera vez desde usuarios en un país específico.\n¿Qué tipo de regla de analytics deberías crear?",subquestions:[{label:"Tipo de regla de analytics:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Scheduled"},{label:"Para agrupar todas las alertas del mismo país en un incidente:",options:["Group all alerts into a single incident","Group alerts triggered by the same rule into a single incident","Create separate incidents for each alert"],answer:"Group all alerts into a single incident"}]},
{id:144,type:"mc",question:"Tienes un despliegue de Azure Sentinel en la región East US de Azure.\nCreas un workspace de Log Analytics llamado LogsWest en la región West US de Azure.\nNecesitas asegurarte de que puedas usar reglas de análisis programadas en el despliegue de Azure Sentinel existente para generar alertas basadas en consultas a LogsWest.\n¿Qué deberías hacer primero?",options:{"A":"Deploy Azure Data Catalog to the West US Azure region.","B":"Modify the workspace settings of the existing Azure Sentinel deployment.","C":"Add Azure Sentinel to a workspace.","D":"Create a data connector in Azure Sentinel."},answer:"C"},
{id:145,type:"mc",question:"Creas una regla de análisis personalizada para detectar amenazas en Azure Sentinel.\nDescubres que la regla falla de forma intermitente.\n\n¿Cuáles son dos posibles causas de las fallas? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"La consulta de la regla tarda demasiado en ejecutarse y se agota el tiempo de espera.","B":"El espacio de trabajo de destino fue eliminado.","C":"Se modificaron los permisos de las fuentes de datos de la consulta de reglas.","D":"Existen problemas de conectividad entre las fuentes de datos y Log Analytics."},answer:"AD"},
{id:146,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una solución única\nque podría cumplir los objetivos establecidos. Algunos conjuntos de preguntas pueden tener más de una respuesta correcta.\n\n\nsolución, mientras que otros podrían no tener la solución correcta.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\n\nEstás configurando Azure Sentinel.\n\nDebe crear un incidente en Azure Sentinel cuando se detecte un inicio de sesión en una máquina virtual de Azure desde una\ndirección IP maliciosa.\nSolución: Crea una regla de consulta programada para un conector de datos.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"A"},
{id:147,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\n\nEstás configurando Azure Sentinel.\n\nDebe crear un incidente en Azure Sentinel cuando se detecte un inicio de sesión en una máquina virtual de Azure desde una\ndirección IP maliciosa.\n\nSolución: Creas un marcador de caza. ¿Esto\ncumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:148,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\n\nEstás configurando Azure Sentinel.\n\nDebe crear un incidente en Azure Sentinel cuando se detecte un inicio de sesión en una máquina virtual de Azure desde una\ndirección IP maliciosa.\nSolución: Crea una regla de creación de incidentes de Microsoft para un conector de datos.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:149,type:"mc",question:"Tiene previsto crear una consulta personalizada de Azure Sentinel que realice un seguimiento de la actividad anómala de inicio de sesión en Azure Active\nDirectory (Azure AD) y presente dicha actividad como un gráfico temporal agregado por día.\n\nNecesitas crear una consulta que se utilizará para mostrar el gráfico de tiempo.\n\n\n¿Qué deberías incluir en la consulta?",options:{"A":"extend","B":"bin","C":"makeset","D":"workspace"},answer:"B"},
{id:150,type:"mc",question:"Estás configurando Azure Sentinel.\nDebes enviar un mensaje de Microsoft Teams a un canal cada vez que se detecte un inicio de sesión desde una dirección IP\nsospechosa.\n\n¿Qué dos acciones debería realizar en Azure Sentinel? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Añadir un manual de jugadas.","B":"Asociar un plan de acción a un incidente.","C":"Habilitar el análisis del comportamiento de las entidades.","D":"Crear un libro de trabajo.","E":"Habilitar la regla de fusión."},answer:"AB"},
{id:151,type:"mc",question:"Es necesario visualizar los datos de Azure Sentinel y enriquecerlos mediante el uso de fuentes de datos de terceros para identificar\nindicadores de compromiso (IoC).\n\n¿Qué deberías usar?",options:{"A":"notebooks in Azure Sentinel","B":"Microsoft Cloud App Security","C":"Azure Monitor","D":"hunting queries in Azure Sentinel"},answer:"A"},
{id:152,type:"mc",question:"Tiene previsto crear una consulta personalizada de Azure Sentinel que proporcione una representación visual de las alertas de seguridad\ngeneradas por Azure Security Center.\n\nNecesitas crear una consulta que se utilizará para mostrar un gráfico de\nbarras. ¿Qué debes incluir en la consulta?",options:{"A":"extend","B":"bin","C":"count","D":"workspace"},answer:"C"},
{id:153,type:"mc",question:"Usted utiliza Azure Sentinel.\n\nNecesitas recibir una alerta casi en tiempo real cada vez que se enumeren las claves de la cuenta de Azure\nStorage. ¿Qué dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Crear una transmisión en vivo","B":"Añadir un conector de datos","C":"Crear una regla analítica","D":"Crea una consulta de búsqueda.","E":"Crear un marcador."},answer:"BC"},
{id:154,type:"hotspot",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel y contiene un área de trabajo de Log Analytics llamada workspace1.\nNecesitas configurar Microsoft Sentinel para identificar actividades anómalas de usuarios de Azure AD usando User and Entity Behavior Analytics (UEBA). La solución debe minimizar el esfuerzo administrativo.\n¿Qué deberías hacer?",subquestions:[{label:"Habilitar UEBA desde:",options:["Analytics rules","Entity behavior settings","Workbooks","Threat intelligence"],answer:"Entity behavior settings"},{label:"Conector de datos necesario para usuarios de Azure AD:",options:["Azure Activity","Azure Active Directory","Microsoft Defender for Cloud","Microsoft 365 Defender"],answer:"Azure Active Directory"}]},
{id:155,type:"mc",question:"Estás investigando un incidente en Azure Sentinel que contiene más de 127 alertas.\nDescubres ocho alertas en el incidente que requieren mayor investigación.\nNecesitas escalar las alertas a otro administrador de Azure Sentinel.\n¿Qué deberías hacer para proporcionar las alertas al administrador?",options:{"A":"Create a Microsoft incident creation rule","B":"Share the incident URL","C":"Create a scheduled query rule","D":"Assign the incident"},answer:"D"},
{id:156,type:"mc",question:"Estás configurando Azure Sentinel.\nDebes enviar un mensaje de Microsoft Teams a un canal cada vez que se active en Azure Sentinel un incidente que represente un evento de\nriesgo de inicio de sesión.\n\n¿Qué dos acciones debería realizar en Azure Sentinel? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Configure los ajustes de configuración de la política de auditoría avanzada para los controladores de dominio.","B":"Modificar los permisos de la unidad organizativa (OU) de controladores de dominio.","C":"Configure la auditoría en el centro de cumplimiento de Microsoft 365.","D":"Configure el reenvío de eventos de Windows en los controladores de dominio.","E":"Crear un libro de trabajo."},answer:"BD"},
{id:157,type:"dragdrop",question:"Necesitas usar una regla de análisis de Azure Sentinel para buscar criterios específicos en logs de Amazon Web Services (AWS) y generar incidentes.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["Create a rule by using the Changes to Amazon VPC settings rule template","From Analytics in Azure Sentinel, create a Microsoft incident creation rule","Add the Amazon Web Services connector","Set the alert logic","From Analytics in Azure Sentinel, create a custom analytics rule that uses a scheduled query","Select a Microsoft security service","Add the Syslog connector"],answer:["Add the Amazon Web Services connector","From Analytics in Azure Sentinel, create a custom analytics rule that uses a scheduled query","Set the alert logic"]},
{id:158,type:"mc",question:"Tienes el siguiente entorno:\n• Azure Sentinel\n• Una suscripción de Microsoft 365\n• Microsoft Defender for Identity\n• Un tenant de Azure Active Directory (Azure AD)\nConfiguras Azure Sentinel para recopilar logs de seguridad de todos los servidores miembro de Active Directory y los controladores de dominio.\nDespliegas Microsoft Defender for Identity usando sensores standalone.\nNecesitas asegurarte de que puedas detectar cuándo se modifican grupos sensibles en Active Directory.\n¿Cuáles dos acciones deberías realizar? Cada respuesta correcta presenta parte de la solución.",options:{"A":"Configure the Advanced Audit Policy Configuration settings for the domain controllers.","B":"Modify the permissions of the Domain Controllers organizational unit (OU).","C":"Configure auditing in the Microsoft 365 compliance center.","D":"Configure Windows Event Forwarding on the domain controllers."},answer:"AD"},
{id:159,type:"mc",question:"Usted utiliza Azure Sentinel.\n\nEs necesario utilizar un rol integrado para otorgar a un analista de seguridad la capacidad de editar las consultas de los libros de trabajo\npersonalizados de Azure Sentinel. La solución debe aplicar el principio de mínimo privilegio.\n\n¿Qué rol debería asignarle al analista?\nColaborador de Azure Sentinel\nAdministrador de seguridad B.",options:{"A":"Azure Sentinel Contributor","B":"Security Administrator","C":"Azure Sentinel Responder","D":"Logic App Contributor"},answer:"A"},
{id:160,type:"mc",question:"Puedes crear una consulta de búsqueda en Azure Sentinel.\n\nDebe recibir una notificación en el portal de Azure tan pronto como la consulta de búsqueda detecte una coincidencia. La solución\ndebe minimizar el esfuerzo.\n\n¿Qué deberías usar?\nUn manual de jugadas\n\nCuaderno Ba\nTransmisión en vivo de California\n\nMarcador",options:{"A":"a playbook","B":"a notebook","C":"a livestream","D":"a bookmark"},answer:"C"},
{id:161,type:"mc",question:"Tienes una suscripción de Azure llamada Sub1 y una suscripción de Microsoft 365. Sub1 está vinculada a un inquilino de Azure\nActive Directory (Azure AD) llamado contoso.com.\n\nCrea un espacio de trabajo de Azure Sentinel llamado workspace1. En workspace1, activa un conector de Azure AD para\ncontoso.com y un conector de Office 365 para la suscripción de Microsoft 365.\nDebe utilizar la regla Fusion para detectar ataques en varias etapas que incluyan inicios de sesión sospechosos en contoso.com\nseguidos de actividad anómala en Microsoft Office 365.\n\n¿Cuáles dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Cree una regla personalizada basada en las plantillas del conector de Office 365.","B":"Cree una regla de creación de incidentes de Microsoft basada en Azure Security Center.","C":"Cree un conector de Microsoft Cloud App Security.","D":"Cree un conector de Azure AD Identity Protection."},answer:"CD"},
{id:162,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\n\nEstás configurando Azure Sentinel.\n\nDebe crear un incidente en Azure Sentinel cuando se inicie sesión en una máquina virtual de Azure desde una IP maliciosa.\n\n\nSe ha detectado la dirección.\n\nSolución: Se crea una transmisión en vivo a partir de una\nconsulta. ¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:163,type:"hotspot",question:"Necesitas crear una consulta para un libro de trabajo. La consulta debe cumplir los siguientes requisitos:\n• Listar todos los incidentes por número de incidente.\n• Incluir solo el log más reciente para cada incidente.\n¿Cómo deberías completar la consulta?",subquestions:[{label:"Función de resumen para obtener el log más reciente por incidente:",options:["arg_max","arg_min","count","make_list"],answer:"arg_max"},{label:"Columna de ordenación para el arg_max:",options:["IncidentNumber","LastModifiedTime","TimeGenerated","Title"],answer:"TimeGenerated"}]},
{id:164,type:"hotspot",question:"Tienes los siguientes recursos: SW1 (espacio de trabajo de Microsoft Sentinel).\nNecesitas prevenir eventos duplicados de ocurrir en SW1.\n¿Qué deberías usar para cada acción?",subquestions:[{label:"Para prevenir duplicados de conectores de datos cloud:",options:["Data Collection Rules","Deduplication rules in Sentinel","Disable overlapping data connectors","Workbooks"],answer:"Disable overlapping data connectors"},{label:"Para prevenir duplicados de agentes en el mismo host:",options:["Data Collection Rules","Deduplication rules in Sentinel","Use only one agent per host","Workbooks"],answer:"Use only one agent per host"}]},
{id:165,type:"mc",question:"Tienes una suscripción de Azure que utiliza Microsoft Sentinel.\nEs necesario minimizar el esfuerzo administrativo requerido para responder a los incidentes y solucionar las amenazas de\nseguridad detectadas por Microsoft Sentinel.\n\n¿Qué dos funciones deberías usar? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Microsoft Sentinel bookmarks","B":"Azure Automation runbooks","C":"Microsoft Sentinel automation rules","D":"Microsoft Sentinel playbooks","E":"Azure Functions apps"},answer:"CD"},
{id:166,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel llamado workspace1 que contiene consultas Kusto personalizadas.\nNecesitas crear un cuaderno Jupyter basado en Python que genere visualizaciones. Estas visualizaciones mostrarán los resultados de las\nconsultas y estarán ancladas a un panel de control. La solución debe minimizar el esfuerzo de desarrollo.\n¿Qué herramientas deberías usar para crear los elementos visuales?",options:{"A":"plotly","B":"TensorFlow","C":"msticpy","D":"matplotlib"},answer:"C"},
{id:167,type:"hotspot",question:"Tienes un área de trabajo de Microsoft Sentinel llamada sws1.\nNecesitas crear una consulta de hunting para identificar usuarios que listan claves de almacenamiento de múltiples cuentas de Azure Storage. La solución debe excluir usuarios que listan claves de almacenamiento para una sola cuenta.\n¿Cómo deberías completar la consulta?",subquestions:[{label:"Función para agrupar y contar cuentas de almacenamiento únicas por usuario:",options:["dcount","makelist","summarize count()","summarize dcount()"],answer:"summarize dcount()"},{label:"Filtro para excluir usuarios con solo una cuenta:",options:["| where StorageAccountCount > 1","| where StorageAccountCount == 1","| where StorageAccountCount >= 1","| where count_ > 1"],answer:"| where StorageAccountCount > 1"}]},
{id:168,type:"dragdrop",question:"Tienes un workspace de Microsoft Sentinel llamado workspace1 y una máquina virtual de Azure llamada VM1.\nRecibes una alerta por uso sospechoso de PowerShell en VM1.\nNecesitas investigar el incidente, identificar qué evento activó la alerta e identificar si las siguientes acciones ocurrieron en VM1 después de la alerta:\n• La modificación de las membresías de grupos locales\n• La purga de registros de eventos\n¿Cuáles tres acciones deberías realizar en secuencia en el portal de Azure?",actions:["From the details pane of the incident, select Investigate.","From the Investigation blade, select the entity that represents VM1.","From the Investigation blade, select the entity that represents powershell.exe.","From the Investigation blade, select Timeline.","From the Investigation blade, select Info.","From the Investigation blade, select Insights."],answer:["From the details pane of the incident, select Investigate.","From the Investigation blade, select the entity that represents VM1.","From the Investigation blade, select Insights."]},
{id:169,type:"mc",question:"Tienes un workspace de Microsoft Sentinel que contiene el siguiente incidente:\nAtaque de fuerza bruta contra la regla de análisis del portal de Azure.\nNecesitas identificar la información de geolocalización correspondiente al incidente.\n¿Qué deberías hacer?",options:{"A":"From Overview, review the Potential malicious events map.","B":"From Incidents, review the details of the IPCustomEntity entity associated with the incident.","C":"From Incidents, review the details of the AccountCustomEntity entity associated with the incident.","D":"From Investigation, review insights on the incident entity."},answer:"B"},
{id:170,type:"mc",question:"Tienes dos suscripciones de Azure que utilizan Microsoft Defender para la nube.\nDebe asegurarse de que las alertas de seguridad específicas de Defender for Cloud se supriman a nivel del grupo de administración\nraíz. La solución debe minimizar el esfuerzo administrativo.\n\n¿Qué debes hacer en el portal de Azure?",options:{"A":"Crear una asignación de directiva de Azure.","B":"Modifique la configuración de protección de carga de trabajo en Defender para la nube.","C":"Crea una regla de alerta en Azure Monitor.","D":"Modifique la configuración de alertas en Defender para la nube."},answer:"A"},
{id:171,type:"mc",question:"Usted dispone de una suscripción de Azure con las funciones de seguridad mejoradas de Microsoft Defender para la nube habilitadas y\nque contiene un usuario llamado User1.\nDebe asegurarse de que el Usuario1 pueda exportar los datos de alerta desde Defender for Cloud. La solución debe aplicar el principio de\nmínimo privilegio.\n\n¿Qué rol deberías asignar al Usuario1?",options:{"A":"Administrador de acceso de usuarios","B":"Propietario","C":"una regla analítica","D":"una regla de automatización"},answer:"D"},
{id:172,type:"mc",question:"Tienes una suscripción de Azure que contiene una aplicación lógica de Azure llamada app1 y un workspace de Microsoft Sentinel que tiene un conector de Azure Active Directory (Azure AD).\nNecesitas asegurarte de que app1 se lance cuando Microsoft Sentinel detecte una alerta generada por Azure AD.\n¿Qué deberías crear primero?",options:{"A":"a repository connection","B":"a watchlist","C":"an analytics rule","D":"an automation rule"},answer:"D"},
{id:173,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel.\n\nEs necesario identificar qué reglas se utilizan para detectar ataques avanzados de varias etapas que comprenden dos o más alertas o\nactividades. La solución debe minimizar el esfuerzo administrativo.\n\n¿Qué tipo de regla debería consultar?\n\nFusión A",options:{"A":"Fusion","B":"Microsoft Security","C":"ML Behavior Analytics","D":"Scheduled"},answer:"A"},
{id:174,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel y contiene 100 máquinas virtuales Linux. Necesitas\nsupervisar las máquinas virtuales usando Microsoft Sentinel. La solución debe cumplir los siguientes requisitos:\n✑Minimizar el esfuerzo administrativo.\n\n✑Minimice el análisis necesario para leer los datos de\nniebla. ¿Qué debería configurar?\nAPI de recopilación de datos de Aa Log Analytics\n\nIntegración de la API B.REST\nConector de formato común Evert (CEF) de California\n\nConector Da Syslog",options:{"A":"a Log Analytics Data Collector API","B":"REST API integration","C":"a Common Evert Format (CEF) connector","D":"a Syslog connector"},answer:"C"},
{id:175,type:"hotspot",question:"Tienes 100 suscripciones de Azure que tienen habilitadas las características de seguridad mejoradas de Microsoft Defender for Cloud.\nTodas las suscripciones están vinculadas a un solo tenant de Azure Active Directory (Azure AD).\nNecesitas transmitir los logs de Defender for Cloud a un servidor syslog. La solución debe minimizar el esfuerzo administrativo.\n¿Qué deberías hacer?",subquestions:[{label:"Servicio a usar para la transmisión centralizada:",options:["Azure Event Hub","Azure Monitor","Azure Storage Account","Microsoft Sentinel"],answer:"Azure Event Hub"},{label:"Alcance de la configuración de exportación continua:",options:["A nivel de cada suscripción","A nivel del grupo de gestión raíz","A nivel del grupo de recursos","A nivel del workspace de Log Analytics"],answer:"A nivel del grupo de gestión raíz"}]},
{id:176,type:"dragdrop",question:"Tienes una suscripción de Azure que contiene 100 máquinas virtuales Linux.\nNecesitas configurar Microsoft Sentinel para recopilar registros de eventos de las máquinas virtuales.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["Add the Syslog data connector to Microsoft Sentinel","Configure the data collection settings from the Syslog connector in Microsoft Sentinel","Install the Log Analytics agent on the virtual machines","Create a Data Collection Rule in Azure Monitor","Configure the Syslog facilities and severity levels to collect"],answer:["Add the Syslog data connector to Microsoft Sentinel","Configure the data collection settings from the Syslog connector in Microsoft Sentinel","Install the Log Analytics agent on the virtual machines"]},
{id:177,type:"mc",question:"Tienes una suscripción de Azure que utiliza Microsoft Sentinel.\nSe detecta una nueva amenaza mediante una consulta de búsqueda.\n\nDebe asegurarse de que Microsoft Sentinel detecte automáticamente la amenaza. La solución debe minimizar el esfuerzo\nadministrativo.\n\n¿Qué deberías hacer?",options:{"A":"Crea una regla analítica.","B":"Agregue la consulta a un libro de trabajo.","C":"Crea una lista de seguimiento.","D":"Crea un manual de jugadas."},answer:"A"},
{id:178,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel.\n\nTienes una consulta llamada Query1, como se muestra en la siguiente imagen.\n\nPlaneas crear un analizador sintáctico personalizado llamado Parser1.\n\nDebes usar Query1 en Parser1.\n¿Qué debes hacer primero?",options:{"A":"Eliminar la línea 5.","B":"Eliminar la línea 2.","C":"En la línea 3, reemplace el operador !contains por el operador !has.","D":"En la línea 4, elimine el predicado TimeGenerated."},answer:"B"},
{id:179,type:"mc",question:"Tienes una suscripción de Azure que utiliza Microsoft Sentinel.\nNecesitas crear un informe personalizado que visualice la información de inicio de sesión a lo largo del tiempo.\n\n¿Qué deberías crear primero?\nConsulta de caza Aa\nLibro de ejercicios de Ba\n\nCuaderno Ca\nEl libro de jugadas",options:{"A":"a hunting query","B":"a workbook","C":"a notebook","D":"a playbook"},answer:"B"},
{id:180,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel.\n\nRecibes varias alertas por intentos fallidos de inicio de sesión en una cuenta.\nUsted identifica que las alertas son falsos positivos.\n\nDebe evitar que se generen alertas adicionales de inicio de sesión fallido para la cuenta. La solución debe cumplir\n\n\nlos siguientes requisitos:\n• Asegúrese de que se generen alertas de inicio de sesión fallido para otras cuentas.\n• Minimizar el esfuerzo administrativo\n¿Qué debería hacer?",options:{"A":"Modificar la regla analítica.","B":"Crea una lista de seguimiento.","C":"Añadir una plantilla de actividad al comportamiento de la entidad.","D":"Crea una regla de automatización."},answer:"A"},
{id:181,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que contiene dos usuarios llamados User1 y User2.\nTienes la siguiente consulta de hunting:\nAuditLogs | where OperationName == 'Add member to role' | where Result == 'success' | extend RoleId = tostring(TargetResources[0].id) | where RoleId == '62e90394-69f5-4237-9190-012177145e10'\n\nUser1 asigna el rol de Administrador global a User2.\nUser2 crea un nuevo usuario llamado User3.\n\nPara cada una de las siguientes afirmaciones, selecciona Sí si la afirmación es verdadera. De lo contrario, selecciona No.",subquestions:[{label:"La consulta de hunting retornará un resultado para la acción de User1:",options:["Sí","No"],answer:"Sí"},{label:"La consulta de hunting retornará un resultado para la acción de User2:",options:["Sí","No"],answer:"No"}]},
{id:182,type:"mc",question:"Tienes un área de trabajo de Microsoft Sentinel.\nNecesitas asegurarte de que solo las personas con el rol de Azure Sentinel Contributor puedan disparar playbooks manualmente.\n¿Qué deberías crear?",options:{"A":"Una Azure Logic App con un trigger de Microsoft Sentinel","B":"Una regla de automatización que requiera aprobación","C":"Un rol personalizado de Azure con permisos de acción de Logic Apps","D":"Una regla de analytics programada que llame al playbook"},answer:"C"},
{id:183,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas crear una regla de analítica basada en una consulta personalizada. La regla debe iniciar automáticamente la ejecución de un playbook.\nSolución: Creas una regla de análisis de tipo Microsoft Security.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:184,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas crear una regla de analítica basada en una consulta personalizada. La regla debe iniciar automáticamente la ejecución de un playbook.\nSolución: Creas una regla de análisis de tipo Fusion.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:185,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas crear una regla de analítica basada en una consulta personalizada. La regla debe iniciar automáticamente la ejecución de un playbook.\nSolución: Creas una regla de análisis de tipo Scheduled.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"A"},
{id:186,type:"mc",question:"Tienes un área de trabajo de Microsoft Sentinel llamado Sentinel1.\nNecesitas asegurarte de que cuando se crea un incidente en Sentinel1, se envíe automáticamente un correo electrónico al equipo de seguridad.\nSolución: Configuras una regla de análisis programada con una acción de playbook.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"A"},
{id:187,type:"mc",question:"Tienes un área de trabajo de Microsoft Sentinel.\nNecesitas asegurar que un usuario llamado admin1 pueda configurar playbooks de Microsoft Sentinel. La solución debe minimizar los permisos.\n¿Qué rol deberías asignar a admin1?",options:{"A":"Azure Sentinel Contributor","B":"Logic App Contributor","C":"Microsoft Sentinel Contributor","D":"Owner"},answer:"B"},
{id:188,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas evitar que un parser de Advanced Security Information Model (ASIM) integrado sea actualizado automáticamente.\n¿Cuáles son dos formas de lograr este objetivo? Cada respuesta correcta presenta una solución completa.",options:{"A":"Create a hunting query that references the built-in parser.","B":"Build a custom unifying parser and include the built-in parser version.","C":"Redeploy the built-in parser and specify a CallerContext parameter of Any and a SourceSpecificParser parameter of Any.","D":"Redeploy the built-in parser and specify a CallerContext parameter of Built-in.","E":"Create an analytics rule that includes the built-in parser."},answer:"BC"},
{id:189,type:"mc",question:"Tienes un libro de trabajo personalizado de Microsoft Sentinel llamado Workbook1.\n\nDebe agregar una cuadrícula al Libro de trabajo 1. La solución debe garantizar que la cuadrícula contenga un máximo de 100 filas.\n\n¿Qué deberías hacer?",options:{"A":"En la consulta de cuadrícula, incluya el operador de toma.","B":"En la consulta de la cuadrícula, incluya el operador de proyecto.","C":"En la interfaz del editor de consultas, configure los ajustes.","D":"En la interfaz del editor de consultas, seleccione Editor avanzado."},answer:"A"},
{id:190,type:"hotspot",question:"Tienes un área de trabajo de Microsoft Sentinel.\nNecesitas crear una regla de análisis de Microsoft Sentinel que agrupe alertas en incidentes individuales, con un incidente por cuenta de usuario de prueba de Azure AD.\n¿Cómo deberías configurar la agrupación de eventos de la regla?",subquestions:[{label:"Configuración de agrupación de alertas:",options:["Agrupar todas las alertas en un único incidente","Agrupar las alertas activadas por la misma regla en un único incidente","Crear incidentes separados para cada alerta"],answer:"Crear incidentes separados para cada alerta"},{label:"Entidad por la que agrupar:",options:["Account","AlertSeverity","IPAddress","Timestamp"],answer:"Account"}]},
{id:191,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel llamado Workspace1.\nDebe excluir un analizador ASIM (Modelo de Información de Seguridad Avanzada) integrado y específico de la fuente de un analizador ASIM\nunificado integrado.\n¿Qué deberías crear en el Espacio de trabajo 1?",options:{"A":"an analytic rule","B":"a watchlist","C":"a workbook","D":"a hunting query"},answer:"B"},
{id:192,type:"mc",question:"Usted dispone de una suscripción a Azure que contiene un espacio de trabajo de Microsoft Sentinel.\n\nDebes crear un playbook que se ejecute automáticamente en respuesta a una alerta de Microsoft Sentinel.\n\n¿Qué deberías crear primero?\nConsulta de búsqueda Aa en Microsoft Sentinel",options:{"A":"a hunting query in Microsoft Sentinel","B":"an Azure logic app","C":"an automation rule in Microsoft Sentinel","D":"a trigger in Azure Functions"},answer:"B"},
{id:193,type:"hotspot",question:"Tienes un área de trabajo de Microsoft Sentinel y una máquina virtual de Azure llamada VM1.\nRecibes una alerta por uso sospechoso de PowerShell en VM1.\nNecesitas investigar el incidente, identificar qué evento desencadenó la alerta y si las siguientes acciones ocurrieron en VM1 después de la alerta. La solución debe minimizar el esfuerzo de investigación.\n¿Qué deberías usar para cada tarea de investigación?",subquestions:[{label:"Para ver la cronología del incidente y eventos relacionados:",options:["Investigation graph de Microsoft Sentinel","Live Response en Microsoft Defender for Endpoint","Azure Activity Log","VM1 Windows Event Viewer"],answer:"Investigation graph de Microsoft Sentinel"},{label:"Para ejecutar comandos en VM1 y recopilar evidencia:",options:["Investigation graph de Microsoft Sentinel","Live Response en Microsoft Defender for Endpoint","Azure Activity Log","VM1 Windows Event Viewer"],answer:"Live Response en Microsoft Defender for Endpoint"}]},
{id:194,type:"hotspot",question:"Tu red local contiene 100 servidores que ejecutan Windows Server.\nTienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas cargar logs personalizados desde los servidores locales a Microsoft Sentinel.\n¿Qué deberías hacer?",subquestions:[{label:"En los servidores, instalar:",options:["Azure Connected Machine agent","Log Analytics agent","Microsoft Dependency agent"],answer:"Log Analytics agent"},{label:"Configurar los ajustes de logs personalizados usando:",options:["Data connectors page of Microsoft Sentinel","Log Analytics workspace settings of Microsoft Sentinel","Logs blade of Microsoft Sentinel"],answer:"Log Analytics workspace settings of Microsoft Sentinel"}]},
{id:195,type:"mc",question:"Tienes una suscripción de Azure que contiene un espacio de trabajo de Microsoft Sentinel. El espacio de trabajo contiene un conector de\ndatos de Microsoft Defender para la nube.\n\nDebes personalizar qué detalles se incluirán cuando se cree una alerta para un evento específico.\n¿Qué deberías hacer?",options:{"A":"Habilitar el análisis del comportamiento de usuarios y entidades (UEBA).","B":"Crear una regla de recopilación de datos (DCR).","C":"Modificar las propiedades del conector.","D":"Crear una regla de consulta programada."},answer:"D"},
{id:196,type:"mc",question:"Dispone de un espacio de trabajo de Microsoft Sentinel llamado Workspace1 y 200 analizadores personalizados del Modelo de Información de\nSeguridad Avanzada (ASIM) basados en el esquema DNS.\n\nDebe habilitar los 200 análisis sintácticos en Workspace1. La solución debe minimizar el esfuerzo administrativo.\n¿Qué debes hacer primero?",options:{"A":"Copie los analizadores en la página de Registros de Azure Monitor.","B":"Crea un archivo JSON basado en la plantilla DNS.","C":"Crea un archivo XML basado en la plantilla DNS.","D":"Crea un archivo YAML basado en la plantilla DNS."},answer:"D"},
{id:197,type:"hotspot",question:"Tienes un área de trabajo de Microsoft Sentinel con alertas y una regla de analytics programada que genera incidentes.\nNecesitas agregar notas a los eventos que representan acceso a datos desde una dirección IP específica para poder referenciar la dirección IP durante la navegación a través del investigation graph.\n¿Qué deberías usar?",subquestions:[{label:"Característica de Microsoft Sentinel para agregar notas a eventos durante hunting:",options:["Bookmarks","Comments","Incidents","Watchlists"],answer:"Bookmarks"},{label:"Sección del portal de Microsoft Sentinel para ver estas notas:",options:["Analytics","Hunting > Bookmarks","Incidents","Workbooks"],answer:"Hunting > Bookmarks"}]},

{id:232,type:"hotspot",question:"(Caso de estudio - Adatum Corporation) Mismo escenario que Q226.\n\nNecesitas asegurarte de que la configuración de HuntingQuery1 cumpla los requisitos de Microsoft Sentinel.\n¿Qué deberías hacer?",subquestions:[{label:"Para cumplir el requisito de HuntingQuery1:",options:["Add HuntingQuery1 to a livestream","Create a watchlist","Create an Azure Automation rule","Add HuntingQuery1 to favorites"],answer:"Add HuntingQuery1 to favorites"}]},
{id:233,type:"mc",question:"Tienes una suscripción de Azure que contiene un espacio de trabajo de Microsoft Sentinel llamado Workspace1.\n\nDesde Content Hub, se implementa la solución Microsoft Entra para Microsoft Sentinel y se configura un conector.\nEs necesario analizar las acciones realizadas por los usuarios que tienen privilegios administrativos sobre la suscripción.\n¿Qué libro de ejercicios deberías usar?\nActividad de Azure",options:{"A":"Azure Activity","B":"Microsoft Entra Audit logs","C":"Microsoft Entra Sign-ins logs","D":"Identity & Access"},answer:"A"},
{id:234,type:"mc",question:"Usted dispone de una suscripción de Azure que contiene un espacio de trabajo de Microsoft Sentinel llamado Workspace1 y un usuario\nllamado User1.\n\nDebe asegurarse de que el Usuario1 pueda investigar incidentes utilizando el Espacio de trabajo1. La solución debe seguir el\nprincipio de mínimo privilegio.\n\n¿Qué rol deberías asignar al Usuario1?",options:{"A":"Microsoft Sentinel Responder","B":"Colaborador de Microsoft Sentinel","C":"Colaborador de Microsoft Sentinel Automation","D":"Lector Sentinel de Microsoft"},answer:"A"},
{id:235,type:"hotspot",question:"Tienes una suscripción de Azure que contiene un workspace de Log Analytics llamado Workspace1.\nConfiguras logs de actividad de Azure y logs de Microsoft Entra ID para que se reenvíen a Workspace1.\nNecesitas consultar Workspace1 para identificar todas las solicitudes que fallaron debido a autorización insuficiente.\n¿Cómo deberías completar la consulta KQL?",subquestions:[{label:"Tabla inicial de la consulta:",options:["AuditLogs","AzureActivity","MicrosoftGraphActivityLogs"],answer:"MicrosoftGraphActivityLogs"},{label:"Segundo código de estado de respuesta (además de 403):",options:["401","402","403"],answer:"401"}]},
{id:236,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR.\n\nEstás investigando un incidente.\nDebe revisar las tareas realizadas relacionadas con los incidentes. La solución debe incluir una consulta que muestre los incidentes\nen un libro de trabajo y, a continuación, las tareas de cada incidente en otra cuadrícula.\n\n¿A qué tabla debería dirigirse la consulta?",options:{"A":"SecurityIncident","B":"SecurityEvent","C":"SentinelAudit","D":"SecurityAlert"},answer:"A"},

{id:239,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel con período de retención predeterminado de 30 días. El workspace contiene dos tablas personalizadas: Table1 (plan Basic, retención interactiva Default, retención total Default) y Table2 (plan Analytics, retención interactiva Default, retención total 365 días).\nCada tabla ingesta dos registros por día durante los últimos 365 días.\nCreaste las consultas KQL:\n- Query1: Table1 | where TimeGenerated >= ago(15d) | summarize count()\n- Query2: Table2 | where TimeGenerated >= ago(120d) | summarize count()\n- Query3: Table1 | where TimeGenerated >= ago(45d)\n\nPara cada afirmación, selecciona Sí o No:",subquestions:[{label:"Para que Query1 devuelva 30, debes cambiar el plan de Table1 a Analytics:",options:["Sí","No"],answer:"No"},{label:"Para que Query2 devuelva 240, debes cambiar el período total de retención a 120 días:",options:["Sí","No"],answer:"No"},{label:"Para que Query3 devuelva 90 filas, debes cambiar el período total de retención a 45 días:",options:["Sí","No"],answer:"Sí"}]},
{id:240,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Defender for Endpoint.\nTienes los siguientes dispositivos on-premises:\n• Device1: Windows Server 2022, integrado y administrado por Microsoft Defender for Endpoint\n• Device2: Linux, descubierto por Microsoft Defender for Endpoint pero no administrado\n\nEstás preparando un plan de respuesta a incidentes para dispositivos infectados con malware.\nNecesitas recomendar acciones de respuesta que cumplan los siguientes requisitos:\n• Bloquear el malware de comunicarse con e infectar dispositivos administrados.\n• NO afectar la capacidad de controlar los dispositivos administrados.\n¿Cuáles acciones deberías usar para cada dispositivo?",subquestions:[{label:"Para Device1 (Windows Server 2022, administrado):",options:["Contain device","Isolate device","Run antivirus scan","Restrict app execution"],answer:"Contain device"},{label:"Para Device2 (Linux, no administrado):",options:["Contain device","Isolate device","Run antivirus scan","Restrict app execution"],answer:"Contain device"}]},
{id:241,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 E5 que utiliza Microsoft Defender XDR y contiene un usuario llamado User1.\nDebe asegurarse de que el Usuario1 pueda administrar las reglas de detección personalizadas de Microsoft Defender XDR y las directivas de seguridad de los\npuntos finales. La solución debe seguir el principio de mínimo privilegio.\n\n¿Qué rol deberías asignar al Usuario1?",options:{"A":"Security Administrator","B":"Security Operator","C":"Cloud Device Administrator","D":"Desktop Analytics Administrator"},answer:"A"},
{id:242,type:"hotspot",question:"Tienes los siguientes recursos:\n- Server1: servidor on-premises, Azure Arc habilitado, Windows Server 2022, Microsoft SQL Server 2022\n- VM1: Azure Virtual Machine, Windows Server 2022, Microsoft SQL Server 2022\nTienes una suscripción de Azure que usa Microsoft Defender for Cloud.\nNecesitas usar Defender for Cloud para proteger VM1 y Server1 con los siguientes requisitos:\n• Soportar Advanced Threat Protection y vulnerability assessment.\n• Registrar cada instancia de SQL Server 2022 como una máquina virtual SQL.\n• Minimizar el esfuerzo de implementación y administración.\n¿Qué deberías desplegar en cada servidor?",subquestions:[{label:"Para VM1:",options:["An Azure virtual machine extension","The Azure Monitor Agent and an Azure virtual machine extension","The Log Analytics agent and an Azure virtual machine extension"],answer:"The Azure Monitor Agent and an Azure virtual machine extension"},{label:"Para Server1:",options:["An Azure virtual machine extension","The Azure Monitor Agent and an Azure virtual machine extension","The Log Analytics agent and an Azure virtual machine extension"],answer:"The Azure Monitor Agent and an Azure virtual machine extension"}]},
{id:243,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel que contiene un libro de trabajo personalizado llamado Workbook1.\n\nDebe crear una representación visual basada en la tabla SecurityEvent. La solución debe cumplir los siguientes requisitos:\n• Identifique el número de eventos de seguridad registrados durante la última semana.\n• Muestra el recuento de eventos por día en un gráfico de tiempo.\n\n¿Qué deberías añadir al Libro de trabajo 1?\nUna consulta\n\nMétrica Ba\n\nGrupo Ca\nEnlaces o pestañas",options:{"A":"a query","B":"a metric","C":"a group","D":"links or tabs"},answer:"A"},
{id:244,type:"hotspot",question:"Tienes una suscripción de Azure con 50 máquinas virtuales.\nPlaneas desplegar Microsoft Defender for Cloud.\nNecesitas habilitar el escaneo sin agente para 40 máquinas virtuales. La solución debe crear snapshots de disco de las máquinas virtuales y realizar análisis fuera de banda de los snapshots.\n¿Qué deberías hacer?",subquestions:[{label:"Plan de Defender a seleccionar:",options:["Defender CSPM","Resource Manager","Storage"],answer:"Defender CSPM"},{label:"Para excluir máquinas virtuales específicas, usar:",options:["A role-based access control (RBAC) assignment","An Azure Policy assignment","Tagging"],answer:"Tagging"}]},
{id:245,type:"mc",question:"Tienes una suscripción a Azure.\nNecesitas transmitir los registros de actividad de Microsoft Graph a una herramienta de gestión de información y eventos de seguridad\n(SIEM) de terceros. La solución debe minimizar el esfuerzo administrativo.\n\n¿A dónde se deben enviar los registros?\nUn espacio de nombres de Azure Event Hubs",options:{"A":"an Azure Event Hubs namespace","B":"an Azure Storage account","C":"an Azure Event Grid namespace","D":"a Log Analytics workspace"},answer:"A"},
{id:246,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Defender XDR y contiene dos usuarios: User1 y User2.\nNecesitas asegurarte de que los usuarios puedan realizar búsquedas en el portal de Microsoft Purview. La solución debe cumplir:\n• User1 puede buscar en los logs del servicio de Microsoft Purview Audit y revisar la configuración del servicio.\n• User2 puede buscar en los buzones de Microsoft Exchange Online.\n• Seguir el principio de menor privilegio.\n¿A qué grupo de roles de Microsoft Purview deberías agregar a cada usuario?",subquestions:[{label:"Grupo de roles para User1:",options:["Audit Reader","Global Reader","Reviewer","Security Reader"],answer:"Audit Reader"},{label:"Grupo de roles para User2:",options:["Communication Compliance Investigators","Data Investigator","Insider Risk Management Investigators","Privacy Management Investigators"],answer:"Data Investigator"}]},
{id:247,type:"mc",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Defender XDR y contiene dos usuarios: User1 y User2.\nNecesitas asegurarte de que User2 pueda buscar en los buzones de Microsoft Exchange Online usando el portal de Microsoft Purview.\nSiguiendo el principio de menor privilegio, ¿a qué grupo de roles de Microsoft Purview deberías agregar a User2?",options:{"A":"Communication Compliance Investigators","B":"Data Investigator","C":"Insider Risk Management Investigators","D":"Privacy Management Investigators"},answer:"B"},
{id:248,type:"mc",question:"Tienes una suscripción a Microsoft 365 que utiliza Microsoft Defender para Endpoint y contiene un usuario llamado User1 y un grupo de\nMicrosoft 365 llamado Group1. A todos los usuarios se les ha asignado una licencia de Defender para Endpoint Plan 1.\nHabilita el control de acceso basado en roles (RBAC) unificado de Microsoft Defender XDR para la administración de puntos finales y\nvulnerabilidades.\n\n\nDebes asegurarte de que el Usuario1 pueda configurar alertas que envíen notificaciones por correo electrónico al Grupo1. La solución debe\nseguir el principio de mínimo privilegio.\n\n¿Qué permisos debería asignar al Usuario1?",options:{"A":"Defender Vulnerability Management - Remediation handling","B":"Alerts investigation","C":"Live response capabilities: Basic","D":"Manage security settings"},answer:"D"},
{id:249,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel con logs de diagnóstico de múltiples recursos de Azure.\nNecesitas crear una regla de análisis de Microsoft Sentinel que genere incidentes cuando se detecten solicitudes GET en Webapp1.\n¿Qué tipo de regla de análisis deberías crear y desde qué tabla?",subquestions:[{label:"Tipo de regla de análisis para detectar solicitudes GET en tiempo casi real:",options:["Fusion","Microsoft Security","ML Behavior Analytics","NRT (Near-Real-Time)","Scheduled"],answer:"NRT (Near-Real-Time)"},{label:"Tabla de datos de Webapp1:",options:["AzureActivity","CommonSecurityLog","SecurityAlert","W3CIISLog"],answer:"W3CIISLog"}]},
{id:250,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nTienes una suscripción de Azure que utiliza Microsoft Defender XDR.\nDesde el portal de Microsoft Defender, realice una búsqueda de auditoría y exporte los resultados como un archivo llamado File1.csv que\ncontiene 10.000 filas.\nUsted utiliza Microsoft Excel para realizar operaciones de Obtener y Transformar Datos con el fin de analizar la columna AuditData del archivo File1.csv.\nLas operaciones no logran generar columnas para propiedades JSON específicas.\nDebe asegurarse de que Excel genere columnas para las propiedades JSON específicas en los resultados de la búsqueda de auditoría.\n\nSolución: Desde Excel, aplique filtros a las columnas existentes en File1.csv para reducir la cantidad de propiedades JSON\ny luego realice las operaciones de transformación de datos Get 8t para analizar la columna AuditData.\n\n¿Cumple esto con el requisito?",options:{"A":"Sí","B":"No   Traducido del inglés al español - www.onlinedoctranslator.com"},answer:"B"},
{id:251,type:"mc",question:"Usted dispone de una suscripción Microsoft 365 E5 que contiene dos usuarios denominados Usuario1 y Usuario2 y utiliza Microsoft Copilot para\nla seguridad.\n\nDesde el portal Copilot for Security, el Usuario1 inicia una sesión y crea las siguientes indicaciones:\n• Indicación 1: Proporciona acceso al complemento Entra\n• Mensaje 2: Proporciona acceso al complemento de Intune\n\n• Prompt3: Proporciona acceso al complemento Entra\nEl usuario 1 comparte la sesión con el usuario 2.\n\nEl usuario 2 NO tiene acceso a Microsoft Intune.\n¿Para qué preguntas puede el Usuario2 ver los resultados durante la sesión compartida?",options:{"A":"Prompt1 only","B":"Prompt1 and Prompt2 only","C":"Prompt3 only","D":"Prompt1 and Prompt3 only","E":"Prompt1, Prompt2, and Prompt3"},answer:"E"},
{id:252,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que utiliza Microsoft Copilot para seguridad. Copilot para seguridad tiene la\nconfiguración predeterminada.\nDebe asegurarse de que un usuario llamado Usuario pueda usar Copilot for Security para realizar las siguientes tareas:\n• Subir archivos.\n\n• Consulta el panel de uso.\n• Comparte los libros de sugerencias con todos los usuarios.\n\nLa solución debe seguir el principio del mínimo privilegio.\n¿Qué rol deberías asignarle al Usuario?\nPropietario del copiloto A.\n\nAdministrador de aplicaciones en la nube\nAdministrador de seguridad C.\n\nColaborador de D.Copilot",options:{"A":"Copilot owner","B":"Cloud Application Administrator","C":"Security Administrator","D":"Copilot Contributor"},answer:"A"},
{id:253,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que las consultas de ASIM (Advanced Security Information Model) puedan acceder a datos de Infoblox DNS de forma transparente usando parsers unificados.\n¿Qué deberías configurar?",subquestions:[{label:"Tipo de conector de datos para Infoblox DNS:",options:["Azure Monitor Agent","CEF connector","Custom Logs","Syslog connector"],answer:"CEF connector"},{label:"Para que ASIM DNS queries funcionen con Infoblox:",options:["Crear una función KQL personalizada que mapee al schema ASIM","Instalar la solución de Infoblox desde Content Hub","Usar el parser _Im_Dns directamente","Crear una watchlist con los datos DNS"],answer:"Instalar la solución de Infoblox desde Content Hub"}]},
{id:254,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 y un espacio de trabajo de Microsoft Sentinel.\n\nNecesitas crear una consulta KQL que combine datos de las siguientes fuentes:\n• Microsoft Graph\n• Usuarios de riesgo detectados mediante Microsoft Entra ID Protection\n\nLa solución debe minimizar el volumen de datos devueltos.\n¿Cómo debería comenzar la consulta?",options:{"B":"DO."},answer:"B"},
{id:255,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5.\nTienes un script de PowerShell que consulta el registro de auditoría unificado.\nDescubres que la consulta devuelve solo la primera página de resultados debido a la paginación del lado del servidor.\n\nDebes asegurarte de obtener todos los resultados.\n¿Qué propiedad debería consultar en los resultados?",options:{"A":"@odata.context","B":"@odata.count","C":"@odata.nextLink","D":"@odata.deltaLink"},answer:"C"},
{id:256,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 E5 que contiene dos grupos llamados Grupo1 y Grupo2 y utiliza Microsoft Copilot para\nla seguridad.\nDebe configurar Copilot para la asignación de roles de seguridad de manera que cumpla con los siguientes requisitos:\n• Asegúrese de que los miembros del Grupo 1 puedan ejecutar comandos y responder a incidentes de seguridad de Microsoft Defender XDR.\n• Asegúrese de que los miembros del Grupo2 puedan ejecutar comandos.\n\n• Siga el principio del mínimo privilegio.\n\nEliminas a Todos del rol de Colaborador Copiloto.\n¿Cuáles dos acciones debes realizar a continuación? Cada respuesta correcta presenta parte de la solución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Asigne el rol de Operador de Seguridad al Grupo1.","B":"Asignar el rol de Copiloto Propietario al Grupo2.","C":"Asignar el rol de Copiloto Propietario al Grupo1","D":"Asigne el rol de Operador de Seguridad al Grupo2.","E":"Asignar el rol de Colaborador Copiloto al Grupo2."},answer:"AE"},
{id:257,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 E5 que contiene un servidor de base de datos llamado DB1. DB1 está integrado en\nMicrosoft Defender XDR.\nDebes asegurarte de que DB1 aparezca en el mapa de superficie de ataque.\n\n¿Qué deberías configurar?",options:{"A":"an asset rule","B":"a critical asset rule","C":"a sensitive entity tag","D":"a honeytoken entity tag"},answer:"B"},
{id:258,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis Scheduled para detectar solicitudes DNS NXDOMAIN de los últimos 7 días usando parsers ASIM.\n¿Qué tabla/función deberías usar y cuál es el tipo de regla?",subquestions:[{label:"Tabla/función ASIM para DNS:",options:["DnsEvents","_Im_Dns","AzureDiagnostics","CommonSecurityLog"],answer:"_Im_Dns"},{label:"Tipo de regla de análisis:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Scheduled"}]},
{id:259,type:"mc",question:"(Caso de estudio - Adatum) Necesitas implementar una regla de análisis de Microsoft Sentinel de tipo NRT que detecte solicitudes GET en Webapp1 (servicio web on-premises HTTP/HTTPS).\n¿Cuál tabla de datos deberías usar en la regla?",options:{"A":"AzureActivity","B":"CommonSecurityLog","C":"SecurityAlert","D":"W3CIISLog"},answer:"D"},
{id:260,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5.\nDebe configurar la interrupción automática de ataques de Microsoft Defender XDR para que utilice las señales generadas por Microsoft Defender\npara aplicaciones en la nube.\n\n¿Qué dos acciones debe realizar para Defender para aplicaciones en la nube en el portal de Microsoft Defender? Cada respuesta\ncorrecta presenta parte de la solución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Habilitar el conector de Microsoft 365.","B":"Agregar un recolector de registros para la carga automática de registros.","C":"Activar la gobernanza de la aplicación.","D":"Implementar el enriquecimiento de usuarios de Cloud Discovery.","E":"Desde Protección de la información, habilite la monitorización de archivos."},answer:"AC"},
{id:261,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas minimizar el overhead de las consultas que usan parsers ASIM.\n¿Qué deberías configurar?",subquestions:[{label:"Para minimizar el overhead de los parsers ASIM:",options:["Usar workspace-deployed parsers","Usar native parsers","Usar parsers personalizados","Usar tablas de Log Analytics Basic"],answer:"Usar workspace-deployed parsers"},{label:"Desde dónde instalar los parsers optimizados:",options:["Analytics rules","Content Hub","Hunting queries","Workbooks"],answer:"Content Hub"}]},
{id:262,type:"mc",question:"(Caso de estudio - Adatum) La regla basada en rulequery1 detecta cuando Azure Cloud Shell es iniciado por el equipo SecOps de Adatum.\nNecesitas asegurarte de que los incidentes generados por la regla se cierren automáticamente cuando Azure Cloud Shell sea iniciado por el equipo SecOps.\n¿Qué deberías crear?",options:{"A":"An analytics rule of type Fusion","B":"An analytics rule of type Microsoft Security","C":"An automation rule","D":"A playbook"},answer:"C"},
{id:263,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas detectar reinicios de contraseña anormales para las cuentas de usuario de corp.adatum.com.\n¿Qué deberías crear?",subquestions:[{label:"Tipo de regla de análisis para detección basada en machine learning de comportamiento anómalo:",options:["Fusion","Microsoft Security","ML Behavior Analytics","NRT","Scheduled"],answer:"ML Behavior Analytics"},{label:"Origen de datos necesario:",options:["Azure Active Directory Identity Protection","Microsoft Entra ID logs","SecurityEvent","Syslog"],answer:"Microsoft Entra ID logs"}]},
{id:264,type:"mc",question:"(Caso de estudio - Adatum) Necesitas asegurarte de que los miembros de Group1 puedan crear y ejecutar playbooks en Microsoft Sentinel.\n¿Cuáles dos roles deberías asignar a Group1?",options:{"A":"Logic App Contributor","B":"Microsoft Sentinel Automation Contributor","C":"Microsoft Sentinel Contributor","D":"Microsoft Sentinel Reader","E":"Microsoft Sentinel Responder"},answer:"AC"},
{id:265,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear un workbook que recupere datos dinámicamente de Webapp1 (servicio web HTTP/HTTPS on-premises).\n¿Qué tipo de elemento deberías agregar al workbook?",subquestions:[{label:"Elemento del workbook para recuperar datos de una URL externa:",options:["Group","Links/Tabs","Metric","Query","Text"],answer:"Query"},{label:"Tipo de fuente de datos para Webapp1:",options:["Azure Resource Graph","JSON","Log Analytics","REST API"],answer:"JSON"}]},
{id:266,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel (Sentinel1) con una regla de análisis Scheduled basada en rulequery1.\nrulequery1 usa AzureActivity para detectar cuando Azure Cloud Shell es iniciado por el equipo SecOps.\nNecesitas configurar la regla para que los incidentes generados se cierren automáticamente si Azure Cloud Shell es iniciado por el equipo SecOps.\n¿Qué deberías configurar?",subquestions:[{label:"Para cerrar incidentes automáticamente:",options:["Una regla de automatización con acción 'Close incident'","Una regla de supresión de alertas","Un playbook con trigger de incidente","Una acción de respuesta automática en la regla de analytics"],answer:"Una regla de automatización con acción 'Close incident'"},{label:"Condición para identificar el equipo SecOps:",options:["Condition: Incident title contains 'SecOps'","Condition: Account entity matches SecOps accounts","Condition: Alert provider equals Microsoft Sentinel","Condition: Incident tag equals SecOps"],answer:"Condition: Account entity matches SecOps accounts"}]},
{id:267,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5.\nNecesitas buscar en el registro de auditoría de Microsoft Purview usando PowerShell en un dispositivo Windows.\n\n¿Qué debes hacer primero?",options:{"A":"Instale el módulo de Microsoft Graph para PowerShell.","B":"Habilitar el acceso remoto a PowerShell.","C":"Instale el módulo de PowerShell de Microsoft Exchange Online.","D":"Modificar la lista TrustedHosts."},answer:"C"},
{id:268,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas que los miembros de Group1 puedan crear y editar playbooks, y administrar reglas de análisis.\n¿Qué roles deberías asignar a Group1?",subquestions:[{label:"Rol para crear y editar playbooks:",options:["Logic App Contributor","Microsoft Sentinel Contributor","Microsoft Sentinel Responder","Owner"],answer:"Logic App Contributor"},{label:"Rol para administrar reglas de análisis:",options:["Logic App Contributor","Microsoft Sentinel Contributor","Microsoft Sentinel Responder","Owner"],answer:"Microsoft Sentinel Contributor"}]},
{id:269,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que los miembros de Group2 puedan administrar incidentes de Sentinel.\n¿Qué rol deberías asignar a Group2?",subquestions:[{label:"Rol de menor privilegio para administrar incidentes de Sentinel:",options:["Logic App Contributor","Microsoft Sentinel Contributor","Microsoft Sentinel Responder","Microsoft Sentinel Reader"],answer:"Microsoft Sentinel Responder"}]},
{id:270,type:"mc",question:"(Caso de estudio - Adatum) Necesitas detectar volúmenes más altos de lo normal de restablecimientos de contraseña para cuentas de usuario de corp.adatum.com usando machine learning.\n¿Qué tipo de regla de análisis deberías crear?",options:{"A":"Fusion","B":"Microsoft Security","C":"ML Behavior Analytics","D":"NRT","E":"Scheduled"},answer:"C"},
{id:271,type:"mc",question:"(Caso de estudio - Adatum) Necesitas minimizar el overhead asociado con las consultas que usan parsers ASIM.\n¿Qué deberías hacer?",options:{"A":"Instalar workspace-deployed parsers desde Content Hub","B":"Crear parsers ASIM personalizados","C":"Usar los parsers ASIM nativos directamente","D":"Deshabilitar los parsers ASIM integrados"},answer:"A"},
{id:272,type:"mc",question:"(Caso de estudio - Adatum) Necesitas asegurarte de que las consultas ASIM puedan acceder a datos de Infoblox DNS de manera transparente usando parsers unificados.\n¿Qué deberías hacer primero?",options:{"A":"Crear una función KQL personalizada que mapee al schema ASIM DNS","B":"Instalar la solución de Infoblox desde el Content Hub de Microsoft Sentinel","C":"Usar el parser _Im_Dns directamente en las consultas","D":"Crear una watchlist con los datos DNS de Infoblox"},answer:"B"},
{id:273,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Security Copilot.\nTiene previsto configurar un plugin GPT personalizado para Copilot.\n\n¿Qué modelo GPT debería utilizar?",options:{"A":"gpt-4o","B":"o1-mini","C":"davinci-002","D":"gpt-35-turbo"},answer:"A"},
{id:274,type:"mc",question:"Tienes una suscripción de Azure que utiliza Microsoft Security Copilot.\nNecesitas aumentar temporalmente el número de unidades de cómputo de seguridad.\n¿Cuál es el intervalo de tiempo mínimo por el que se le puede facturar?",options:{"A":"1 segundo","B":"1 minuto","C":"1 hora","D":"1 día"},answer:"C"},
{id:275,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nRecibes una alerta de Microsoft Sentinel indicando que se detectó un ataque de fuerza bruta.\nNecesitas investigar el incidente y determinar si el ataque fue exitoso.\n¿Qué debería usar?",options:{"A":"El investigation graph del incidente en Microsoft Sentinel","B":"La página de Hunting en Microsoft Sentinel","C":"La página de Workbooks en Microsoft Sentinel","D":"Azure Monitor Logs"},answer:"A"},
{id:276,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una consulta KQL para identificar usuarios que listan claves de cuentas de almacenamiento de Azure desde direcciones IP inesperadas.\nLa consulta usa AzureActivity y un join con otra instancia de AzureActivity para comparar la dirección IP esperada con la real.\n¿Qué función deberías usar para identificar automáticamente patrones comunes en los resultados?",options:{"A":"autocluster()","B":"bin()","C":"count()","D":"dcount()"},answer:"A"},
{id:277,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas conectar Microsoft Sentinel a un servicio que requiere autenticación. La solución debe minimizar el esfuerzo administrativo y seguir el principio de menor privilegio.\n¿Qué deberías usar para autenticar el conector?",options:{"A":"A managed identity","B":"A service principal","C":"An Azure AD user account","D":"A shared access signature (SAS)"},answer:"A"},
{id:278,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con un conector que usa una managed identity.\n¿Qué rol deberías asignar a las credenciales del conector para minimizar los permisos?",options:{"A":"Microsoft Sentinel Automation Contributor","B":"Microsoft Sentinel Reader","C":"Microsoft Sentinel Responder","D":"Microsoft Sentinel Contributor"},answer:"A"},
{id:279,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel con una regla de analytics de tipo Microsoft Security que genera incidentes a partir de alertas de Microsoft Defender for Cloud.\nNecesitas asegurarte de que la regla solo genere incidentes para alertas de alta severidad.\n¿Qué deberías configurar en la regla?",subquestions:[{label:"Filtro para aplicar en la regla Microsoft Security:",options:["Alert name contains 'High'","Alert severity equals High","Alert status equals New","Product name equals Microsoft Defender for Cloud"],answer:"Alert severity equals High"},{label:"Campo de severidad en alertas de Microsoft Defender for Cloud:",options:["AlertSeverity","Severity","SystemAlertId","WorkspaceSubscriptionId"],answer:"AlertSeverity"}]},
{id:280,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis de tipo Scheduled que genere alertas cuando se detecte acceso entrante a Microsoft Office 365 por las cuentas de usuario de prueba de Azure AD. Las alertas generadas deben agruparse en incidentes individuales, uno por cuenta de usuario de prueba.\n¿Cómo deberías configurar la agrupación de alertas?",options:{"A":"Grouping: Group all alerts into a single incident","B":"Grouping: Group alerts triggered by the same rule into a single incident using entity Account","C":"Grouping: Create separate incidents for each alert","D":"Disable alert grouping"},answer:"C"},
{id:281,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel con la función HuntingQuery1.\nNecesitas asegurarte de que HuntingQuery1 se ejecute automáticamente cuando se abra la página de Hunting en el portal de Azure.\n¿Qué deberías hacer para configurar esto?",subquestions:[{label:"Acción a realizar con HuntingQuery1:",options:["Agregarla a livestream","Marcarla como favorita","Crear una regla de automatización","Añadirla a una watchlist"],answer:"Marcarla como favorita"},{label:"Esto hace que la consulta:",options:["Se ejecute periódicamente en background","Se ejecute al abrir la página de Hunting","Se convierta en una regla de analytics","Envíe resultados por email"],answer:"Se ejecute al abrir la página de Hunting"}]},
{id:282,type:"mc",question:"Tienes tres suscripciones de Azure. Cada suscripción contiene varias máquinas virtuales que ejecutan Windows Server.\nTienes un espacio de trabajo de Microsoft Sentinel.\n\nDebe asegurarse de que los intentos fallidos de inicio de sesión de todas las máquinas virtuales puedan analizarse mediante Microsoft\nSentinel. La solución debe minimizar el esfuerzo administrativo.\n\n¿Qué debes hacer primero?",options:{"A":"Desde el portal de Microsoft Defender, instale la solución Eventos de seguridad de Windows.","B":"En cada máquina virtual, cree una suscripción a eventos.","C":"En cada máquina virtual, instale el agente de Azure Connected Machine.","D":"Desde el portal de Microsoft Defender, instale la solución Syslog."},answer:"A"},
{id:283,type:"mc",question:"Tienes una máquina virtual local llamada VM1 que ejecuta Windows Server.\nTienes un espacio de trabajo de Microsoft Sentinel llamado Workspace1.\nDebe instalar el agente de Azure Connected Machine en la máquina virtual VM1.\n\nDebes recopilar eventos de VM1 y enviarlos a Workspace1.\n¿Cuáles dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\n\nNOTA: Cada respuesta correcta vale un punto.",options:{"A":"En VM1, instale el Agente de supervisión de Microsoft.","B":"En la máquina virtual VM1, instale el agente de Log Analytics.","C":"Desde el portal de Microsoft Defender, agregue el conector de datos de Eventos de seguridad de Windows a través de AMA.","D":"Desde el portal de Microsoft Defender, agregue el Syslog a través del conector de datos AMA.","E":"En la máquina virtual VM1, habilite las extensiones del agente de Azure Monitor.","F":"Desde el portal de Microsoft Defender, cree una regla de recopilación de datos (DCR) que tenga como objetivo VM1."},answer:"EF"},
{id:284,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas configurar Microsoft Sentinel para que los datos recopilados de múltiples fuentes estén disponibles para consultas.\n¿Qué deberías crear?",options:{"A":"Conectores de datos","B":"Reglas de análisis","C":"Playbooks","D":"Workbooks"},answer:"A"},
{id:285,type:"mc",question:"Debes implementar los requisitos de Azure Information Protection. ¿Qué\ndebes configurar primero?",options:{"A":"Device health and compliance reports settings in Microsoft Defender Security Center","B":"scanner clusters in Azure Information Protection from the Azure portal","C":"content scan jobs in Azure Information Protection from the Azure portal","D":"Advanced features from Settings in Microsoft Defender Security Center"},answer:"D"},
{id:286,type:"mc",question:"Debe modificar la configuración de la política de detección de anomalías para cumplir con los requisitos de seguridad de la aplicación en la nube y\nresolver el problema reportado.\n\n¿Qué política debería modificar?",options:{"A":"Activity from suspicious IP addresses","B":"Activity from anonymous IP addresses","C":"Impossible travel","D":"Risky sign-in"},answer:"C"},
{id:287,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis que detecte cuando un usuario inicia sesión desde múltiples países en un período de 1 hora.\n¿Qué tipo de regla de análisis y qué agrupación de entidades deberías usar?",subquestions:[{label:"Tipo de regla de análisis:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Scheduled"},{label:"Entidad por la que agrupar los incidentes:",options:["Account","Host","IP","URL"],answer:"Account"}]},
{id:288,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas conectar Microsoft Sentinel a los repositorios de código fuente de GitHub para detectar secretos expuestos y vulnerabilidades en el código.\n¿Qué conector de datos deberías usar?",options:{"A":"GitHub (Preview)","B":"Microsoft Defender for DevOps","C":"Common Event Format (CEF)","D":"REST API personalizada"},answer:"A"},
{id:289,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que cuando se cree un nuevo incidente en Microsoft Sentinel, se envíe automáticamente un correo electrónico al equipo de seguridad con los detalles del incidente.\n¿Qué deberías crear?",options:{"A":"Una regla de automatización que llame a un playbook","B":"Una regla de análisis de tipo Scheduled","C":"Una regla de análisis de tipo Microsoft Security","D":"Una watchlist"},answer:"A"},
{id:290,type:"mc",question:"Usted tiene 500 dispositivos en sus instalaciones.\n\nUsted tiene una suscripción Microsoft 365 E5 que utiliza Microsoft Defender 365.\nUsted agrega 100 dispositivos a Microsoft Defender 365.\nDebe identificar cualquier dispositivo local no administrado. La solución debe garantizar que solo los dispositivos incorporados\nespecíficos realicen la detección.\n¿Qué debes hacer primero?",options:{"A":"Crear un grupo de dispositivos.","B":"Crea una exclusión.","C":"Configure el modo de detección en Básico.","D":"Crea una etiqueta."},answer:"D"},
