<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070c18;--bg2:#0d1526;--bg3:#111d35;
  --surface:#0f1e36;--surface2:#162742;--surface3:#1e3352;
  --border:rgba(212,56,13,.25);--border2:rgba(255,122,69,.18);
  --accent:#d4380d;--accent2:#ff7a45;--accent3:#ffa07a;--glow:rgba(212,56,13,.35);
  --success:#10d98c;--success-bg:rgba(16,217,140,.1);
  --danger:#ff4e6a;--danger-bg:rgba(255,78,106,.1);
  --warning:#ffb830;--warning-bg:rgba(255,184,48,.1);
  --info:#7b96ff;
  --text:#e8f0fe;--text2:#a8bbd4;--text3:#5a7a9a;--text4:#3a5570;
  --sans:'DM Sans',system-ui,sans-serif;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r-sm:6px;--r:10px;--r-lg:16px;--r-xl:22px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:72px;
}
html{scroll-behavior:smooth;background:#070c18;overscroll-behavior:none}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;touch-action:manipulation;padding-bottom:var(--nav-h)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(212,56,13,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(212,56,13,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-40%;left:-20%;width:80vw;height:80vw;background:radial-gradient(circle,rgba(212,56,13,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;min-height:100vh}
/* HEADER */
.header{display:flex;align-items:center;gap:16px;padding:14px 24px;background:rgba(7,12,24,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#d4380d,#ff7a45);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:12px;font-weight:800;color:#fff;letter-spacing:-.5px;box-shadow:0 0 16px rgba(212,56,13,.5);flex-shrink:0}
.logo-text{display:flex;flex-direction:column;gap:1px}
.logo-title{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.04em}
.header-stats{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:11px;font-family:var(--mono);color:var(--text2);white-space:nowrap}
.stat-pill .val{color:var(--accent3);font-weight:600}
.progress-wrap{width:130px;height:5px;background:var(--surface3);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width .4s ease;box-shadow:0 0 8px var(--accent)}
/* LAYOUT */
.main{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 67px)}
/* SIDEBAR */
.sidebar{background:rgba(13,21,38,.8);border-right:1px solid var(--border);padding:20px 14px;overflow-y:auto;position:sticky;top:67px;height:calc(100vh - 67px)}
.sidebar-title{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;padding:0 4px}
.q-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:20px}
.q-dot{aspect-ratio:1;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--mono);font-weight:600;cursor:pointer;transition:all .15s;background:var(--surface2);color:var(--text3);border:1px solid transparent}
.q-dot:hover{background:var(--surface3);color:var(--text2);transform:scale(1.1)}
.q-dot.current{background:var(--accent);color:#fff;border-color:var(--accent2);box-shadow:0 0 10px var(--glow)}
.q-dot.correct{background:rgba(16,217,140,.2);color:var(--success);border-color:rgba(16,217,140,.3)}
.q-dot.wrong{background:rgba(255,78,106,.2);color:var(--danger);border-color:rgba(255,78,106,.3)}
.q-dot.flagged{background:rgba(255,184,48,.15);color:var(--warning);border-color:rgba(255,184,48,.3)}
.q-dot.casestudy{outline:1px dashed rgba(16,217,140,.4);outline-offset:1px}
.sidebar-legend{display:flex;flex-direction:column;gap:7px;padding:0 4px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text3)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
/* CONTENT */
.content{padding:24px 28px;max-width:860px;display:flex;flex-direction:column;gap:16px}
/* Q HEADER */
.q-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.q-number{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.04em}
.q-badges{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-left:auto}
.badge{padding:3px 9px;border-radius:100px;font-size:10px;font-family:var(--mono);font-weight:500;letter-spacing:.04em;border:1px solid transparent}
.badge-mc{background:rgba(212,56,13,.15);color:var(--accent3);border-color:rgba(212,56,13,.3)}
.badge-cs{background:rgba(16,217,140,.12);color:var(--success);border-color:rgba(16,217,140,.3)}
.badge-multi{background:rgba(255,184,48,.12);color:var(--warning);border-color:rgba(255,184,48,.3)}
.badge-series{background:rgba(123,150,255,.15);color:var(--info);border-color:rgba(123,150,255,.3)}
.flag-btn{padding:4px 11px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;font-family:var(--mono);cursor:pointer;transition:all .15s}
.flag-btn:hover{border-color:var(--warning);color:var(--warning)}
.flag-btn.flagged{background:rgba(255,184,48,.12);border-color:rgba(255,184,48,.4);color:var(--warning)}
/* SCENARIO */
.scenario-box{border-radius:var(--r-lg);border:1px solid rgba(16,217,140,.25);background:rgba(16,217,140,.04);overflow:hidden}
.scenario-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;cursor:pointer;transition:background .15s}
.scenario-header:hover{background:rgba(16,217,140,.08)}
.scenario-title{font-size:12px;font-weight:600;color:var(--success);font-family:var(--mono)}
.scenario-toggle{font-size:10px;color:var(--text3);font-family:var(--mono)}
.scenario-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.scenario-body.open{max-height:600px;overflow-y:auto}
.scenario-text{padding:16px 18px;font-size:13px;line-height:1.75;color:var(--text2);border-top:1px solid rgba(16,217,140,.15);white-space:pre-wrap}
/* Q CARD */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:28px;box-shadow:0 8px 40px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);animation:cardIn .25s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-text{font-size:15px;line-height:1.75;color:var(--text);font-weight:400;margin-bottom:22px;white-space:pre-wrap}
/* OPTIONS */
.options{display:flex;flex-direction:column;gap:9px}
.option{display:flex;align-items:flex-start;gap:13px;padding:14px 16px;border-radius:var(--r-lg);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;transition:all .15s;font-size:14px;color:var(--text2);line-height:1.6}
.option:hover:not(.disabled):not(.correct):not(.wrong){border-color:rgba(255,122,69,.5);background:rgba(212,56,13,.12);color:var(--text);transform:translateX(3px)}
.option.selected{border-color:var(--accent);background:rgba(212,56,13,.15);color:var(--text)}
.option.correct{border-color:var(--success);background:var(--success-bg);color:var(--success)}
.option.wrong{border-color:var(--danger);background:var(--danger-bg);color:var(--danger)}
.option.disabled{cursor:default}
.option-key{min-width:28px;height:28px;border-radius:var(--r-sm);background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent3);flex-shrink:0;transition:all .15s}
.option.selected .option-key{background:var(--accent);border-color:var(--accent);color:#fff}
.option.correct .option-key{background:var(--success);border-color:var(--success);color:var(--bg)}
.option.wrong .option-key{background:var(--danger);border-color:var(--danger);color:#fff}
/* FEEDBACK */
.feedback{padding:14px 18px;border-radius:var(--r-lg);font-size:14px;line-height:1.7;border:1px solid}
.feedback.correct{background:var(--success-bg);border-color:rgba(16,217,140,.3);color:var(--success)}
.feedback.wrong{background:var(--danger-bg);border-color:rgba(255,78,106,.3);color:var(--danger)}
.feedback-title{font-weight:700;margin-bottom:4px;font-size:12px;font-family:var(--mono)}
.feedback-exp{color:var(--text2);font-size:13px}
/* CONTROLS */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:4px 0}
.controls-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.controls-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--r-lg);border:1px solid transparent;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;min-height:40px;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-primary{background:var(--accent);color:#fff;border-color:rgba(255,122,69,.4);box-shadow:0 4px 16px rgba(212,56,13,.4)}
.btn-primary:not(:disabled):hover{background:var(--accent2);box-shadow:0 6px 24px rgba(212,56,13,.5);transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);border-color:var(--border);color:var(--text2)}
.btn-secondary:not(:disabled):hover{background:var(--surface3);border-color:var(--accent);color:var(--text);transform:translateY(-1px)}
.btn-success{background:rgba(16,217,140,.15);border-color:rgba(16,217,140,.4);color:var(--success);box-shadow:0 4px 16px rgba(16,217,140,.2)}
.btn-success:hover{background:rgba(16,217,140,.25);box-shadow:0 6px 24px rgba(16,217,140,.3);transform:translateY(-1px)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text3)}
.btn-ghost:not(:disabled):hover{background:var(--surface2);color:var(--text2)}
/* WELCOME */
.welcome{max-width:700px;margin:0 auto;padding:60px 28px 80px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0}
.welcome-badge{display:inline-flex;align-items:center;padding:5px 14px;border-radius:100px;background:rgba(212,56,13,.15);border:1px solid rgba(212,56,13,.35);color:var(--accent3);font-size:11px;font-family:var(--mono);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px}
.welcome h1{font-family:var(--display);font-size:44px;font-weight:800;line-height:1.1;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 30%,var(--accent3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:18px}
.welcome-sub{font-size:15px;line-height:1.7;color:var(--text2);max-width:540px;margin-bottom:36px}
.welcome-stats{display:flex;gap:12px;margin-bottom:36px;flex-wrap:wrap;justify-content:center}
.welcome-stat{padding:16px 22px;border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border);text-align:center;min-width:90px;transition:all .2s}
.welcome-stat:hover{border-color:var(--accent);transform:translateY(-2px)}
.welcome-stat-val{font-family:var(--display);font-size:26px;font-weight:800;color:var(--accent3);line-height:1}
.welcome-stat-lbl{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:5px}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:500px;margin-bottom:22px}
.mode-cards-3{grid-template-columns:1fr 1fr 1fr;max-width:640px}
.mode-card{padding:20px 18px;border-radius:var(--r-xl);border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .18s;text-align:left}
.mode-card:hover{border-color:var(--accent2);transform:translateY(-2px)}
.mode-card.selected{border-color:var(--accent);background:rgba(212,56,13,.1);box-shadow:0 0 24px rgba(212,56,13,.2)}
.mode-card-sim{border-color:rgba(255,184,48,.2)}
.mode-card-sim.selected{background:rgba(255,184,48,.08);border-color:var(--warning);box-shadow:0 0 24px rgba(255,184,48,.15)}
.mode-icon{font-size:24px;margin-bottom:10px}
.mode-card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px}
.mode-card-desc{font-size:12px;color:var(--text3);line-height:1.5}
.count-btn{padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .15s}
.count-btn:hover{border-color:var(--accent2);color:var(--text)}
.count-btn.count-active{background:rgba(212,56,13,.2);border-color:var(--accent);color:var(--accent3);font-weight:600}
.count-selector-hidden{display:none!important}
/* SCORE */
.score-screen{max-width:540px;margin:0 auto;padding:60px 28px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:20px}
.score-ring{width:150px;height:150px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--pct) * 1%),var(--surface3) 0);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(212,56,13,.3);position:relative}
.score-ring::before{content:'';position:absolute;inset:12px;border-radius:50%;background:var(--bg2)}
.score-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.score-pct{font-family:var(--display);font-size:34px;font-weight:800;color:var(--accent3);line-height:1}
.score-label{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:.1em;margin-top:3px}
.score-title{font-family:var(--display);font-size:28px;font-weight:800;color:var(--text)}
.score-sub{font-size:14px;line-height:1.7;color:var(--text2);max-width:400px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.score-stat{padding:18px 12px;border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border)}
.score-stat-val{font-family:var(--display);font-size:28px;font-weight:800}
.score-stat-lbl{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
/* BOTTOM NAV */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(7,12,24,.95);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-top:1px solid rgba(212,56,13,.2);padding:8px 16px calc(8px + var(--safe-bottom));align-items:center;gap:10px}
#bottom-nav .bnav-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 10px;border-radius:14px;border:1px solid transparent;background:transparent;color:var(--text3);font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;min-height:50px;white-space:nowrap;-webkit-tap-highlight-color:transparent}
#bottom-nav .bnav-btn:active{transform:scale(.95);opacity:.8}
#bottom-nav .bnav-btn.primary{background:var(--accent);color:#fff;border-color:rgba(255,122,69,.3);box-shadow:0 4px 16px rgba(212,56,13,.4);flex:2}
#bottom-nav .bnav-btn.success{background:rgba(16,217,140,.15);color:var(--success);border-color:rgba(16,217,140,.3);flex:2}
#bottom-nav .bnav-icon{font-size:16px;line-height:1}
/* SIMULATION */
.sim-wrap{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.sim-top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(7,12,24,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.sim-top-logo{display:flex;align-items:center;gap:10px}
.sim-top-right{display:flex;align-items:center;gap:10px}
.sim-top-total{font-size:10px;font-family:var(--mono);color:var(--text3)}
.sim-timer{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent3);letter-spacing:.04em;padding:5px 12px;border-radius:8px;background:rgba(212,56,13,.1);border:1px solid rgba(212,56,13,.2);transition:all .3s}
.sim-timer.warn{color:var(--warning);background:rgba(255,184,48,.1);border-color:rgba(255,184,48,.3)}
.sim-timer.danger{color:var(--danger);background:rgba(255,78,106,.1);border-color:rgba(255,78,106,.3);animation:timerPulse 1s ease-in-out infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.55}}
.sim-sec-badge{padding:3px 10px;border-radius:100px;font-size:10px;font-family:var(--mono);font-weight:600;background:rgba(212,56,13,.15);border:1px solid rgba(212,56,13,.3);color:var(--accent3);white-space:nowrap}
.sim-intro-body{max-width:560px;margin:0 auto;padding:48px 24px 80px;display:flex;flex-direction:column;align-items:center;gap:0;text-align:center}
.ssi-eyebrow{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.ssi-icon{font-size:52px;margin-bottom:14px}
.ssi-title{font-family:var(--display);font-size:30px;font-weight:800;color:var(--text);margin-bottom:12px;line-height:1.15}
.ssi-info{font-size:14px;color:var(--text2);line-height:1.7;max-width:420px;margin-bottom:22px}
.ssi-alert{background:rgba(255,184,48,.07);border:1px solid rgba(255,184,48,.3);border-radius:12px;padding:14px 18px;margin-bottom:18px;font-size:13px;color:var(--warning);line-height:1.6;max-width:420px;text-align:left;width:100%}
.ssi-ok{background:rgba(16,217,140,.07);border:1px solid rgba(16,217,140,.3);border-radius:12px;padding:14px 18px;margin-bottom:18px;font-size:13px;color:var(--success);max-width:420px;width:100%;text-align:left}
.ssi-rules{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin-bottom:28px;max-width:440px;width:100%;text-align:left;display:flex;flex-direction:column;gap:9px}
.ssi-rule{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.ssi-rule-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ssi-rule-dot.ok{background:rgba(16,217,140,.15);color:var(--success)}
.ssi-rule-dot.info{background:rgba(212,56,13,.15);color:var(--accent3);font-size:12px}
.ssi-cta{width:100%;max-width:340px;justify-content:center;padding:14px 24px;font-size:15px;border-radius:16px}
.ssi-nav-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px}
.sim-result-page{min-height:100vh;background:var(--bg)}
.sim-result-topbar{padding:14px 24px;background:rgba(7,12,24,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.sim-result-body{max-width:600px;margin:0 auto;padding:36px 24px 100px;display:flex;flex-direction:column;align-items:center;gap:20px}
.sim-ring-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
.sim-ring-svg{position:absolute;inset:0;width:100%;height:100%}
.sim-ring-center{position:relative;z-index:1;text-align:center;background:var(--bg2);border-radius:50%;width:136px;height:136px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sim-ring-score{font-family:var(--display);font-size:46px;font-weight:800;color:var(--text);line-height:1}
.sim-ring-of{font-size:12px;font-family:var(--mono);color:var(--text3);margin-top:2px}
.sim-verdict{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:.08em;padding:8px 26px;border-radius:100px;border:2px solid}
.sim-verdict.pass{color:var(--success);border-color:rgba(16,217,140,.45);background:rgba(16,217,140,.1)}
.sim-verdict.fail{color:var(--danger);border-color:rgba(255,78,106,.45);background:rgba(255,78,106,.1)}
.sim-verdict-msg{font-size:14px;color:var(--text2);text-align:center;max-width:400px;line-height:1.65}
.sim-verdict-msg strong{color:var(--text)}
.sim-res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.sim-res-stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center}
.srstat-val{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent3)}
.srstat-lbl{font-size:9px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:4px}
.sim-scale-wrap{width:100%}
.sim-scale-track{position:relative;height:10px;background:var(--surface3);border-radius:100px;margin:16px 0 4px;overflow:visible}
.sim-scale-fail-zone{position:absolute;left:0;top:0;bottom:0;background:rgba(255,78,106,.18);border-radius:100px 0 0 100px}
.sim-scale-pass-line{position:absolute;top:-6px;bottom:-6px;width:2px;background:var(--warning);border-radius:2px}
.sim-scale-pass-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:9px;font-family:var(--mono);color:var(--warning);white-space:nowrap}
.sim-scale-needle{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:3px solid var(--bg2);box-shadow:0 2px 10px rgba(0,0,0,.5);transition:left 1s cubic-bezier(.34,1.56,.64,1);z-index:2}
.sim-scale-needle.pass{background:var(--success);box-shadow:0 0 10px rgba(16,217,140,.4)}
.sim-scale-needle.fail{background:var(--danger);box-shadow:0 0 10px rgba(255,78,106,.4)}
.sim-scale-needle-val{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);font-size:10px;font-family:var(--mono);font-weight:700;white-space:nowrap;color:var(--text)}
.sim-scale-ends{display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);color:var(--text3)}
.sim-breakdown-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.sim-bd-hdr{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.sim-bd-row{display:grid;grid-template-columns:140px 1fr 80px;align-items:center;gap:12px;margin-bottom:12px}
.sim-bd-row:last-child{margin-bottom:0}
.sim-bd-label{font-size:13px;color:var(--text2)}
.sim-bd-bar-wrap{height:7px;background:var(--surface3);border-radius:100px;overflow:hidden}
.sim-bd-bar{height:100%;border-radius:100px;transition:width 1s ease}
.sim-bd-val{font-size:11px;font-family:var(--mono);font-weight:600;text-align:right}
.sim-res-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
/* iOS install banner */
#ios-install-banner{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);left:12px;right:12px;z-index:300;display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(15,30,54,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(212,56,13,.4);border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.6);transform:translateY(20px);opacity:0;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.iib-icon{width:40px;height:40px;background:linear-gradient(135deg,#d4380d,#ff7a45);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--display);font-weight:800;font-size:13px;flex-shrink:0}
.iib-text{flex:1}
.iib-title{font-size:13px;font-weight:700;color:var(--text)}
.iib-desc{font-size:11px;color:var(--text3);margin-top:2px}
.iib-close{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0}
/* RESPONSIVE */
select,button,input{touch-action:manipulation}
@media(max-width:900px){.main{grid-template-columns:1fr}.sidebar{display:none}}
@media all and (display-mode:standalone){.header{padding-top:calc(14px + var(--safe-top))}body{padding-bottom:calc(var(--nav-h) + var(--safe-bottom))}}
@media(max-width:640px){
  .controls{display:none!important}
  #bottom-nav{display:flex}
  .header{padding:10px 14px;gap:8px}
  .logo-icon{width:32px;height:32px;font-size:11px;border-radius:8px}
  .logo-sub{display:none}
  .header-stats{gap:6px}
  .stat-pill{padding:4px 9px;font-size:10px}
  .stat-pill:nth-child(n+3){display:none}
  .progress-wrap{width:80px}
  .main{grid-template-columns:1fr;min-height:calc(100vh - 57px)}
  .sidebar{display:none!important}
  .content{padding:14px 12px 8px;gap:12px}
  .q-card{padding:18px 16px;border-radius:18px}
  .q-text{font-size:14px;line-height:1.7;margin-bottom:18px}
  .option{padding:14px 14px;font-size:14px;min-height:54px;border-radius:14px;transform:none!important}
  .option:active:not(.disabled){background:rgba(212,56,13,.18)!important;border-color:var(--accent)!important;transform:scale(.98)!important}
  .option-key{min-width:30px;height:30px;border-radius:8px;font-size:12px}
  .scenario-box{border-radius:14px}
  .feedback{font-size:13px;padding:13px 14px;border-radius:14px}
  .q-number{font-size:10px}
  .badge{font-size:9px;padding:3px 8px}
  .flag-btn{font-size:10px;padding:4px 10px}
  .welcome{padding:32px 16px 24px;gap:0}
  .welcome h1{font-size:30px;margin-bottom:12px}
  .welcome-sub{font-size:14px;margin-bottom:24px}
  .welcome-badge{font-size:10px;margin-bottom:20px}
  .welcome-stats{gap:8px;margin-bottom:24px}
  .welcome-stat{padding:12px 14px;min-width:80px}
  .welcome-stat-val{font-size:22px}
  .mode-cards{grid-template-columns:1fr 1fr;gap:8px;max-width:100%;margin-bottom:16px}
  .mode-cards-3{grid-template-columns:1fr 1fr}
  .mode-card-sim{grid-column:1 / -1}
  .mode-card{padding:14px 12px;border-radius:16px}
  .mode-icon{font-size:20px;margin-bottom:7px}
  .mode-card-title{font-size:13px}
  .mode-card-desc{font-size:11px}
  .welcome .btn-primary{min-height:54px;font-size:15px;border-radius:16px;padding:14px 24px}
  .score-screen{padding:32px 16px 24px;gap:16px}
  .score-ring{width:130px;height:130px}
  .score-pct{font-size:30px}
  .score-title{font-size:22px}
  .score-sub{font-size:13px}
  .score-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .score-stat{padding:14px 8px;border-radius:14px}
  .score-stat-val{font-size:22px}
  .sim-top-bar{padding:10px 14px}
  .sim-timer{font-size:14px;padding:4px 10px}
  .ssi-title{font-size:22px}
  .ssi-icon{font-size:42px}
  .sim-intro-body{padding:28px 14px 80px}
  .sim-ring-score{font-size:38px}
  .sim-ring-wrap,.sim-ring-center{width:150px;height:150px}
  .sim-ring-center{width:110px;height:110px}
  .sim-result-body{padding:24px 14px 80px;gap:14px}
  .sim-bd-row{grid-template-columns:90px 1fr 55px;gap:8px}
  .sim-res-stats{gap:8px}
  .srstat-val{font-size:18px}
}
@media(hover:none) and (pointer:coarse){
  .option:hover{background:var(--surface2);border-color:var(--border2);transform:none}
  .btn:active{transform:scale(.96);opacity:.85}
}

<script>
const ALL_QUESTIONS = [
{id:1,type:"dragdrop",question:"Estás investigando un incidente usando Microsoft 365 Defender.\nNecesitas crear una consulta de advanced hunting para contar los inicios de sesión fallidos en tres dispositivos: CFOLaptop, CEOLaptop y COOLaptop.\n¿Cómo deberías completar la consulta?",actions:["| project LogonFailures=count()","| summarize LogonFailures=count() by DeviceName, LogonType","| where ActionType == FailureReason","| where DeviceName in (\"CFOLaptop\", \"CEOLaptop\", \"COOLaptop\")","ActionType == \"LogonFailed\"","ActionType == FailureReason","DeviceEvents","DeviceLogonEvents"],answer:["DeviceLogonEvents","| where DeviceName in (\"CFOLaptop\", \"CEOLaptop\", \"COOLaptop\")","ActionType == \"LogonFailed\"","| summarize LogonFailures=count() by DeviceName, LogonType"]},
{id:2,type:"mc",question:"Necesitas recibir una alerta de seguridad cuando un usuario intente iniciar sesión desde una ubicación que nunca fue utilizada por otros usuarios de tu organización.\n¿Qué política de detección de anomalías deberías usar?",options:{"A":"Impossible travel","B":"Activity from anonymous IP addresses","C":"Activity from infrequent country","D":"Malware detection"},answer:"C"},
{id:3,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender para Office 365.\nUsted dispone de sitios de Microsoft SharePoint Online que contienen documentos confidenciales. Dichos documentos contienen\nnúmeros de cuenta de clientes, cada uno compuesto por 32 caracteres alfanuméricos.\nNecesitas crear una política de prevención de pérdida de datos (DLP) para proteger los documentos confidenciales. ¿Qué\nherramientas deberías usar para detectar qué documentos son confidenciales?",options:{"A":"Búsqueda en SharePoint","B":"una consulta de búsqueda en Microsoft 365 Defender","C":"Protección de la información de Azure","D":"Coincidencia de patrones mediante expresiones regulares"},answer:"D"},
{id:4,type:"mc",question:"Tu empresa usa aplicaciones de línea de negocio que contienen macros de Microsoft Office VBA.\nNecesitas evitar que los usuarios descarguen y ejecuten payloads adicionales desde las macros de Office VBA como procesos hijo adicionales.\n¿Cuáles dos comandos puedes ejecutar para lograr el objetivo? Cada respuesta correcta presenta una solución completa.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Add-MpPreference -AttackSurfaceReductionRules_Ids D4F940AB -401B -4EFC -AADC -AD5F3C50688A -AttackSurfaceReductionRules_Actions Enabled","B":"Set-MpPreference -AttackSurfaceReductionRules_Ids D4F940AB -401B -4EFC -AADC -AD5F3C50688A -AttackSurfaceReductionRules_Actions AuditMode","C":"Add-MpPreference -AttackSurfaceReductionRules_Ids D4F940AB -401B -4EFC -AADC -AD5F3C50688A -AttackSurfaceReductionRules_Actions AuditMode","D":"Set-MpPreference -AttackSurfaceReductionRules_Ids D4F940AB -401B -4EFC -AADC -AD5F3C50688A -AttackSurfaceReductionRules_Actions Enabled"},answer:"AD"},
{id:5,type:"mc",question:"Su empresa utiliza Microsoft Defender para endpoints.\nLa empresa dispone de documentos de Microsoft Word que contienen macros. Estos documentos se utilizan con frecuencia en los dispositivos\ndel equipo de contabilidad de la empresa.\n\nNecesitas ocultar los falsos positivos en la cola de alertas, manteniendo la seguridad actual. ¿Qué tres\nacciones deberías realizar? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Resolver la alerta automáticamente.","B":"Ocultar la alerta.","C":"Cree una regla de supresión que se aplique a cualquier dispositivo.","D":"Cree una regla de supresión con ámbito limitado a un grupo de dispositivos.","E":"Generar la alerta."},answer:"BDE"},
{id:6,type:"dragdrop",question:"Abres el portal de Cloud App Security como se muestra en el siguiente gráfico.\nTu entorno NO tiene Microsoft Defender for Endpoint habilitado.\nNecesitas remediar el riesgo para la app Launchpad.\n¿Cuáles cuatro acciones deberías realizar en secuencia?",actions:["Tag the app as Unsanctioned","Run the script on the source appliance","Run the script in Azure Cloud Shell","Select the app","Tag the app as Sanctioned","Generate a block script"],answer:["Select the app","Tag the app as Unsanctioned","Generate a block script","Run the script on the source appliance"]},
{id:7,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5.\nPlaneas realizar investigaciones entre dominios usando Microsoft 365 Defender.\nNecesitas crear una consulta de advanced hunting para identificar dispositivos afectados por un adjunto de correo malicioso.\n¿Cómo deberías completar la consulta?",subquestions:[{label:"Primer operador después de EmailAttachmentInfo | where SenderFromAddress =~ ... | where isnotempty(SHA256):",options:["extend","join","project","union"],answer:"join"},{label:"Operador para proyectar FileName, SHA256 de DeviceFileEvents:",options:["extend","join","project","union"],answer:"project"},{label:"Operador final para Timestamp, FileName, SHA256, DeviceName, DeviceId...:",options:["extend","join","project","union"],answer:"project"}]},
{id:8,type:"mc",question:"Tienes la siguiente consulta de advanced hunting en Microsoft 365 Defender:\nDeviceProcessEvents | where Timestamp > ago(24h) and InitiatingProcessFileName =~ 'runsl32.exe' and InitiatingProcessCommandLine !contains \" \" and InitiatingProcessCommandLine != \"\" and FileName in~ ('schtasks.exe') and ProcessCommandLine has 'Change' and ProcessCommandLine has 'SystemRestore' and ProcessCommandLine has 'disable' | project Timestamp, AccountName, ProcessCommandLine\n\nNecesitas recibir una alerta cuando algún proceso deshabilite System Restore en un dispositivo gestionado por Microsoft Defender durante las últimas 24 horas.\n¿Cuáles dos acciones deberías realizar?",options:{"A":"Create a detection rule.","B":"Create a suppression rule.","C":"Add | order by Timestamp to the query.","D":"Replace DeviceProcessEvents with DeviceNetworkEvents.","E":"Add DeviceId and ReportId to the output of the query."},answer:"AE"},
{id:9,type:"mc",question:"Estás investigando un posible ataque que despliega una nueva variante de ransomware.\nTienes tres grupos de dispositivos personalizados. Estos grupos contienen dispositivos que almacenan información altamente confidencial. Planeas\nrealizar acciones automatizadas en todos los dispositivos.\n\nNecesitas poder agrupar temporalmente las máquinas para realizar acciones en los dispositivos.\n¿Cuáles tres acciones debes realizar? Cada respuesta correcta presenta parte de la solución. NOTA:\nCada selección correcta vale un punto.",options:{"A":"Asigne una etiqueta al grupo de dispositivos.","B":"Agregue los usuarios del dispositivo al rol de administrador.","C":"Añadir una etiqueta a las máquinas.","D":"Crea un nuevo grupo de dispositivos con rango 1.","E":"Crear un nuevo rol de administrador.","F":"Crea un nuevo grupo de dispositivos con rango 4."},answer:"ACD"},
{id:10,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nEstá configurando Microsoft Defender para la integración de identidades con Active Directory.\nDesde el portal de identidad de Microsoft Defender, debe configurar varias cuentas para que los atacantes las exploten. Solución: Desde\nlas etiquetas de entidad, agregue las cuentas como cuentas de Honeytoken.\n\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"A"},
{id:11,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nEstá configurando Microsoft Defender para la integración de identidades con Active Directory.\nDesde el portal de Microsoft Defender para identidades, debe configurar varias cuentas para que los atacantes las exploten. Solución:\nDesde Azure AD Identity Protection, configure la directiva de riesgo de inicio de sesión.\n\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:12,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nEstá configurando Microsoft Defender para la integración de identidades con Active Directory.\nDesde el portal de identidades de Microsoft Defender, es necesario configurar varias cuentas para que los atacantes las exploten.\nSolución: agregue las cuentas a un grupo de Active Directory y marque dicho grupo como confidencial.\n\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:13,type:"mc",question:"Implementa las directivas de Archivos adjuntos seguros en Microsoft Defender para Office 365.\n\nLos usuarios informan que los correos electrónicos con archivos adjuntos tardan más de lo esperado en recibirse. Es\nnecesario reducir el tiempo de entrega de estos mensajes sin comprometer la seguridad. Los archivos adjuntos\ndeben analizarse en busca de malware y cualquier mensaje que lo contenga debe bloquearse.\n¿Qué debería configurar en las políticas de Archivos adjuntos seguros?",options:{"A":"Dynamic Delivery","B":"Replace","C":"Block and Enable redirect","D":"Monitor and Enable redirect"},answer:"A"},
{id:14,type:"hotspot",question:"Eres informado de un aumento en el correo electrónico malicioso recibido por los usuarios.\nNecesitas crear una consulta de advanced hunting en Microsoft 365 Defender para identificar si las cuentas de los destinatarios de correo electrónico fueron comprometidas. La consulta debe devolver los 20 inicios de sesión más recientes realizados por los destinatarios dentro de una hora de recibir el correo electrónico malicioso conocido.\n¿Cómo deberías completar la consulta?",subquestions:[{label:"Tabla inicial de la consulta (let MaliciousEmails =):",options:["EmailAttachmentInfo","EmailEvents","IdentityLogonEvents"],answer:"EmailAttachmentInfo"},{label:"Tabla en el join posterior:",options:["EmailAttachmentInfo","EmailEvents","IdentityLogonEvents"],answer:"IdentityLogonEvents"},{label:"Operador final para limitar a 20 resultados:",options:["select 20","take 20","top 20"],answer:"take 20"}]},
{id:15,type:"mc",question:"Usted recibe un boletín de seguridad sobre un posible ataque que utiliza un archivo de imagen.\n\nPara prevenir el ataque, debe crear un indicador de compromiso (IoC) en Microsoft Defender para Endpoint. ¿Qué\ntipo de indicador debería usar?\nUn indicador de URL/dominio que tiene la acción configurada en solo Alerta.\n\nIndicador de URL/dominio Ba que tiene la acción configurada en Alerta y bloqueo\nIndicador de hash de archivo CA con la acción configurada en Alerta y bloqueo\n\nIndicador de certificado Da que tiene la acción configurada en Alerta y bloqueo",options:{"A":"a URL/domain indicator that has Action set to Alert only","B":"a URL/domain indicator that has Action set to Alert and block","C":"a file hash indicator that has Action set to Alert and block","D":"a certificate indicator that has Action set to Alert and block"},answer:"C"},
{id:16,type:"mc",question:"Su empresa implementa los siguientes servicios: ✑\nMicrosoft Defender para identidad ✑Microsoft\nDefender para endpoints ✑Microsoft Defender para\nOffice 365\nDebe proporcionar a un analista de seguridad la capacidad de usar el Centro de seguridad de Microsoft 365. El analista debe poder\naprobar y rechazar las acciones pendientes generadas por Microsoft Defender para Endpoint. La solución debe aplicar el principio\nde mínimo privilegio.\n\n¿Qué dos roles se le deben asignar al analista? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"El administrador de datos de cumplimiento en Azure Active Directory (Azure AD)","B":"La función de acciones de remediación activas en Microsoft Defender para Endpoint","C":"El rol de Administrador de seguridad en Azure Active Directory (Azure AD)","D":"El rol de Lector de seguridad en Azure Active Directory (Azure AD)"},answer:"BD"},
{id:17,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Defender y una suscripción de Azure que usa Azure Sentinel.\nNecesitas identificar todos los dispositivos que contienen archivos en correos electrónicos enviados por un remitente de correo electrónico malicioso conocido. La consulta se basará en la coincidencia del hash SHA256.\n¿Cómo deberías completar la consulta?",subquestions:[{label:"Campo where isnotempty():",options:["(DeviceId)","(RecipientEmailAddress)","(SenderFromAddress)","(SHA256)"],answer:"(SHA256)"},{label:"Campo join on:",options:["DeviceId","RecipientEmailAddress","SenderFromAddress","SHA256"],answer:"SHA256"}]},
{id:18,type:"mc",question:"Necesitas configurar Microsoft Cloud App Security para generar alertas y activar acciones de remediación en respuesta al intercambio externo de archivos confidenciales.\n¿Cuáles dos acciones deberías realizar en el portal de Cloud App Security? Cada respuesta correcta presenta parte de la solución.",options:{"A":"From Settings, select Information Protection, select Azure Information Protection, and then select Only scan files for AIP classification labels and content inspection warnings from this tenant.","B":"Select Investigate files, and then filter App to Office 365.","C":"Select Investigate files, and then select New policy from search.","D":"From Settings, select Information Protection, select Azure Information Protection, and then select Automatically scan new files for AIP classification labels and content inspection warnings.","E":"From Settings, select Information Protection, select Files, and then enable file monitoring.","F":"Select Investigate files, and then filter File Type to Document."},answer:"DE"},
{id:19,type:"hotspot",question:"Compras una suscripción de Microsoft 365.\nPlaneas configurar Microsoft Cloud App Security.\nNecesitas crear una política personalizada basada en plantillas que detecte conexiones a apps de Microsoft 365 que se originen desde una red botnet.\n¿Qué deberías usar?",subquestions:[{label:"Tipo de plantilla de política:",options:["Access policy","Activity policy","Anomaly detection policy"],answer:"Activity policy"},{label:"Filter based on:",options:["IP address tag","Source","User agent string"],answer:"IP address tag"}]},
{id:20,type:"mc",question:"Tu empresa tiene una única oficina en Estambul y una suscripción de Microsoft 365.\nLa empresa planea usar directivas de acceso condicional para aplicar la autenticación multifactor (MFA).\nNecesitas aplicar MFA para todos los usuarios que trabajan de forma remota.\n¿Qué deberías incluir en la solución?",options:{"A":"a fraud alert","B":"a user risk policy","C":"a named location","D":"a sign-in user policy"},answer:"C"},
{id:21,type:"mc",question:"Estás configurando Microsoft Cloud App Security.\nDispone de una política de detección de amenazas personalizada basada en los rangos de direcciones IP de las oficinas de su empresa ubicadas en Estados\nUnidos.\n\nRecibes muchas alertas relacionadas con viajes imposibles e inicios de sesión desde direcciones IP de riesgo.\nDeterminas que el 99 % de las alertas corresponden a inicios de sesión legítimos desde tus oficinas corporativas.\nNecesitas evitar las alertas de inicios de sesión legítimos desde ubicaciones conocidas.\n\n¿Qué dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Sí","B":"No","C":"Aumentar el nivel de sensibilidad de la política de detección de anomalías de viajes imposibles.","D":"Agregue las direcciones IP a la categoría de otro rango de direcciones y agregue una etiqueta.","E":"Cree una política de actividad que excluya las direcciones IP."},answer:"AB"},
{id:22,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario.\nEstás configurando la integración de Microsoft Defender for Identity con Active Directory.\nDesde el portal de Microsoft Defender for Identity, necesitas configurar varias cuentas para que los atacantes las exploten.\nSolución: Agregas cada cuenta como una cuenta Sensitive.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:23,type:"mc",question:"Tienes un inquilino de Microsoft 365 que usa Microsoft Exchange Online y Microsoft Defender para Office 365. ¿Qué deberías usar\npara identificar si la purga automática de hora cero (ZAP) movió un mensaje de correo electrónico del buzón de un usuario?",options:{"A":"El informe de estado de protección contra amenazas en Microsoft Defender para Office 365.","B":"El registro de auditoría del buzón en Exchange","C":"El informe de tipos de archivos adjuntos seguros en Microsoft Defender para Office 365.","D":"El informe de flujo de correo en Exchange"},answer:"A"},
{id:24,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que incluye 1000 dispositivos con Windows 10. Dichos dispositivos tienen instalado Microsoft\nOffice 365.\nDebe mitigar las siguientes amenazas para los dispositivos:\n✑Macros de Microsoft Excel que descargan scripts de sitios web no confiables. ✑Usuarios\nque abren archivos adjuntos ejecutables en Microsoft Outlook ✑Vulnerabilidades de las\nreglas y formularios de Outlook ¿Qué debería usar?",options:{"A":"Antivirus Microsoft Defender","B":"Reglas de reducción de la superficie de ataque en Microsoft Defender para Endpoint","C":"Cortafuegos de Windows Defender","D":"Control de aplicaciones adaptativo en Azure Defender"},answer:"B"},
{id:25,type:"mc",question:"Usted utiliza una solución de gestión de información y eventos de seguridad (SIEM) de terceros.\nDebe asegurarse de que la solución SIEM pueda generar alertas para los eventos de firma de Azure Active Directory (Azure AD) prácticamente en\ntiempo real.\n¿Qué pasos debes seguir para enrutar los eventos a la solución SIEM?",options:{"A":"Cree un espacio de trabajo de Azure Sentinel que tenga un conector de eventos de seguridad.","B":"Configure los ajustes de diagnóstico en Azure AD para que se transmitan a un centro de eventos.","C":"Cree un espacio de trabajo de Azure Sentinel que tenga un conector de Azure Active Directory.","D":"Configure los ajustes de diagnóstico en Azure AD para archivar en una cuenta de almacenamiento."},answer:"B"},
{id:26,type:"hotspot",question:"Tienes una suscripción de Azure vinculada a un tenant de Azure Active Directory (Azure AD). El tenant contiene dos usuarios llamados User1 y User2.\nPlaneas desplegar Azure Defender.\nNecesitas habilitar a User1 y User2 para realizar las siguientes tareas a nivel de suscripción:\n• User1: Asignar iniciativas, Editar políticas de seguridad, Habilitar el aprovisionamiento automático\n• User2: Ver alertas y recomendaciones, Aplicar recomendaciones de seguridad, Descartar alertas\nLa solución debe usar el principio de menor privilegio.\n¿Qué rol deberías asignar a cada usuario?",subquestions:[{label:"Rol para User1:",options:["Contributor","Owner","Security administrator","Security reader"],answer:"Owner"},{label:"Rol para User2:",options:["Contributor","Owner","Security administrator","Security reader"],answer:"Contributor"}]},
{id:27,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que contiene 200 dispositivos Windows 10 inscritos en Microsoft Defender for Endpoint.\nNecesitas asegurarte de que los usuarios puedan acceder a los dispositivos mediante una conexión de shell remoto directamente desde el portal de Microsoft 365 Defender. La solución debe usar el principio de menor privilegio.\n¿Qué deberías hacer en el portal de Microsoft 365 Defender?",subquestions:[{label:"Para configurar Microsoft Defender for Endpoint:",options:["Turn on endpoint detection and response (EDR) in block mode","Turn on Live Response","Turn off Tamper Protection"],answer:"Turn on Live Response"},{label:"Para configurar los dispositivos:",options:["Add a network assessment job","Create a device group that contains the devices and set Automation level to Full","Create a device group that contains the devices and set Automation level to No automated response"],answer:"Create a device group that contains the devices and set Automation level to Full"}]},
{id:28,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 que usa Microsoft 365 Defender y contiene un usuario llamado User1.\nEres notificado de que la cuenta de User1 está comprometida.\nNecesitas revisar las alertas activadas en los dispositivos en los que inició sesión User1.\n¿Cómo deberías completar la consulta?",subquestions:[{label:"Operador para unir con AlertEvidence:",options:["extend","join","project"],answer:"join"},{label:"Operador final para obtener AlertId, Timestamp, Title, Severity, Category:",options:["project","summarize","take"],answer:"project"}]},
{id:29,type:"mc",question:"Tienes una solución de gestión de información y eventos de seguridad (SIEM) de terceros.\nNecesitas asegurar que la solución SIEM pueda generar alertas para eventos de inicio de sesión de Azure Active Directory (Azure AD) en tiempo casi real.\n¿Qué deberías hacer para enrutar los eventos a la solución SIEM?",options:{"A":"Create an Azure Sentinel workspace that has a Security Events connector.","B":"Configure the Diagnostics settings in Azure AD to stream to an event hub.","C":"Create an Azure Sentinel workspace that has an Azure Active Directory connector.","D":"Configure the Diagnostics settings in Azure AD to archive to a storage account."},answer:"B"},
{id:30,type:"mc",question:"Tienes una suscripción a Microsoft 365 con Microsoft 365 Defender habilitado.\nDebes identificar todos los cambios realizados en las etiquetas de sensibilidad durante los últimos siete días.\n¿Qué deberías usar?",options:{"A":"La sección Incidentes del portal de Microsoft 365 Defender.","B":"La configuración de alertas en la sección de Prevención de pérdida de datos del Centro de cumplimiento de Microsoft 365.","C":"Explorador de actividades en el centro de cumplimiento de Microsoft 365","D":"La configuración del Explorador en la sección Correo electrónico y colaboración del portal de Microsoft 365 Defender."},answer:"C"},
{id:31,type:"mc",question:"Tienes una suscripción a Microsoft 365 que utiliza Microsoft 365 Defender. Necesitas\nidentificar todas las entidades afectadas por un incidente.\n\n¿Qué pestaña debo usar en el portal de Microsoft 365 Defender?",options:{"A":"Investigaciones","B":"Dispositivos","C":"Evidencia y respuesta","D":"Alertas"},answer:"C"},
{id:32,type:"mc",question:"Usted dispone de una suscripción a Microsoft 365 E5 vinculada a un inquilino híbrido de Azure AD.\nDebes identificar todos los cambios realizados en el grupo Administradores de dominio durante los últimos 30 días.\n\n¿Qué deberías usar?",options:{"A":"El informe de modificaciones de grupos confidenciales en Microsoft Defender para identidad","B":"Evaluación de la postura de seguridad de identidad en Microsoft Defender para aplicaciones en la nube.","C":"El libro de trabajo de análisis de aprovisionamiento de Azure Active Directory","D":"Configuración general de la gestión de riesgos internos"},answer:"A"},
{id:33,type:"mc",question:"Usted tiene una suscripción a Microsoft 365. La suscripción utiliza Microsoft 365 Defender y tiene políticas de prevención\nde pérdida de datos (DLP) con alertas agregadas configuradas.\n\nDebe identificar las entidades afectadas en una alerta agregada.\n¿Qué elementos debería revisar en el panel de administración de alertas de DLP del centro de cumplimiento de Microsoft 365?",options:{"A":"La pestaña Eventos de la alerta","B":"La pestaña Tipos de información confidencial de la alerta.","C":"Registro de gestión","D":"La pestaña Detalles de la alerta"},answer:"A"},
{id:34,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft 365 Defender.\n\nPlaneas crear una consulta de búsqueda desde Microsoft Defender.\nDebe crear una consulta de seguimiento personalizada que se utilizará para evaluar el estado de amenaza de la suscripción.\n\nDesde el portal de Microsoft 365 Defender, ¿qué página debo usar para crear la consulta?",options:{"A":"Análisis de amenazas","B":"Caza avanzada","C":"Explorador","D":"Políticas y normas"},answer:"B"},
{id:35,type:"mc",question:"Tienes una suscripción a Microsoft 365 que utiliza Microsoft Defender para Endpoint.\nDebe agregar indicadores de amenazas para todas las direcciones IP en el rango 171.23.34.32-171.23.34.63. La solución debe\nminimizar el esfuerzo administrativo.\n\n¿Qué debes hacer en el portal de Microsoft 365 Defender?",options:{"A":"Cree un archivo de importación que contenga las direcciones IP individuales del rango. Seleccione Importar e importe el archivo.","B":"Crea un archivo de importación que contenga la dirección IP 171.23.34.32/27. Selecciona Importar e importa el archivo.","C":"Seleccione Agregar indicador y configure la dirección IP a 171.23.34.32-171.23.34.63.","D":"Seleccione Agregar indicador y establezca la dirección IP en 171.23.34.32/27."},answer:"A"},
{id:36,type:"mc",question:"Tienes una suscripción de Azure que utiliza Microsoft Defender para Endpoint.\nDebe asegurarse de poder permitir o bloquear un rango de direcciones IP y URL especificado por el usuario.\n¿Qué opción debe habilitar primero en las funciones avanzadas de la configuración de puntos finales en el portal de Microsoft 365 Defender?",options:{"A":"custom network indicators","B":"live response for servers","C":"endpoint detection and response (EDR) in block mode","D":"web content filtering"},answer:"A"},
{id:37,type:"hotspot",question:"Tienes una suscripción de Azure que contiene los siguientes usuarios: User1 (Security administrator), User2 (Security reader), User3 (Contributor).\nNecesitas delegar las siguientes tareas:\n• Habilitar Microsoft Defender for Servers en máquinas virtuales.\n• Revisar recomendaciones de seguridad y habilitar escaneos de vulnerabilidades.\nLa solución debe usar el principio de menor privilegio.\n¿Qué usuario debería realizar cada tarea?",subquestions:[{label:"Habilitar Microsoft Defender for Servers en máquinas virtuales:",options:["User1","User2","User3"],answer:"User1"},{label:"Revisar recomendaciones de seguridad y habilitar escaneos de vulnerabilidades:",options:["User1","User2","User3"],answer:"User1"}]},
{id:38,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5.\nNecesitas crear una consulta de hunting que retorne todos los correos electrónicos que contienen un archivo adjunto llamado Document.pdf. La consulta debe:\n• Mostrar solo correos enviados durante la última hora.\n• Optimizar el rendimiento de la consulta.\n¿Cómo deberías completar la consulta?",subquestions:[{label:"Primera cláusula después de EmailAttachmentInfo:",options:["| join DeviceFileEvents on SHA256","| join kind=inner (DeviceFileEvents | where Timestamp > ago(1h)) on SHA256","| where Timestamp > ago(1h)","| where Timestamp < ago(1h)"],answer:"| where Timestamp > ago(1h)"},{label:"Segunda cláusula para el join:",options:["| join DeviceFileEvents on SHA256","| join kind=inner (DeviceFileEvents | where Timestamp > ago(1h)) on SHA256","| where Timestamp > ago(1h)","| where Timestamp < ago(1h)"],answer:"| join kind=inner (DeviceFileEvents | where Timestamp > ago(1h)) on SHA256"}]},
{id:39,type:"mc",question:"Su empresa dispone de una red local que utiliza Microsoft Defender para la gestión de identidades.\nLa puntuación de seguridad de Microsoft para la empresa incluye una evaluación de seguridad asociada con Kerberos no seguro.\n\ndelegación.\nEs necesario solucionar el riesgo de seguridad.\n\n¿Qué deberías hacer?",options:{"A":"Deshabilite los protocolos heredados en los equipos que figuran como entidades expuestas.","B":"Implementar la firma LDAP en los equipos que figuran como entidades expuestas.","C":"Modificar las propiedades de los objetos informáticos enumerados como entidades expuestas.","D":"Instale la extensión Local Administrator Password Solution (LAPS) en los equipos que figuran como entidades expuestas."},answer:"C"},
{id:40,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft 365 Defender.\nUna medida correctiva para una investigación automatizada pone en cuarentena un archivo en varios dispositivos.\n\nDebes marcar el archivo como seguro y sacarlo de la cuarentena en los dispositivos.\n¿Qué herramientas debería usar en el portal de Microsoft 365 Defender?",options:{"A":"Desde la pestaña Historial en el Centro de acciones, revierta las acciones.","B":"Desde la página de investigación, revise los procesos AIR.","C":"Desde Cuarentena en la página de Revisión, modifique las reglas.","D":"Desde el rastreador de amenazas, revise las consultas."},answer:"A"},
{id:41,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que utiliza Microsoft 365 Defender.\nEs necesario revisar las nuevas técnicas de ataque descubiertas por Microsoft e identificar los recursos vulnerables en la\nsuscripción. La solución debe minimizar el esfuerzo administrativo.\n\n¿Qué panel debo usar en el portal de Microsoft 365 Defender?",options:{"A":"Advanced hunting","B":"Threat analytics","C":"Incidents & alerts","D":"Learning hub"},answer:"B"},
{id:42,type:"mc",question:"¿Qué deberías revisar?",options:{"A":"Tiempo de actualización de estado","B":"El método de resolución del ordenador de origen","C":"estado de alerta","D":"la certeza del ordenador de origen"},answer:"D",scenario:"Estudio de caso -\n\nEste es un estudio de caso. Los estudios de caso no tienen un tiempo límite independiente. Puede usar todo el tiempo de examen que desee.\n\n\nComplete cada caso práctico. Sin embargo, este examen puede incluir estudios de caso y secciones adicionales. Debe administrar\nsu tiempo para asegurarse de poder responder todas las preguntas del examen dentro del tiempo asignado.\n\nPara responder a las preguntas de un estudio de caso, deberá consultar la información que se proporciona en el\nmismo. Los estudios de caso pueden incluir anexos y otros recursos que ofrecen información adicional sobre el\nescenario descrito. Cada pregunta es independiente de las demás.\nAl finalizar este caso práctico, aparecerá una pantalla de revisión. Esta pantalla le permite revisar sus respuestas y realizar\ncambios antes de pasar a la siguiente sección del examen. Una vez que comience una nueva sección, no podrá regresar a\nesta.\n\nPara comenzar el estudio de caso -\n\nPara ver la primera pregunta de este caso práctico, haga clic en el botón «Siguiente». Utilice los botones del panel izquierdo para\nexplorar el contenido del caso práctico antes de responder las preguntas. Al hacer clic en estos botones, se mostrará información\ncomo los requisitos del negocio, el entorno actual y la descripción del problema. Si el caso práctico incluye una pestaña «Toda la\ninformación», tenga en cuenta que la información que se muestra es idéntica a la de las pestañas siguientes. Cuando esté listo para\nresponder",scenario_title:"Caso Práctico"},
{id:43,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Defender 365.\nTu red contiene un dominio de Active Directory Domain Services (AD DS) local que se sincroniza con Azure AD.\nNecesitas identificar los 100 intentos de inicio de sesión más recientes registrados en dispositivos y controladores de dominio AD DS.\n¿Cómo deberías completar la consulta KQL?",subquestions:[{label:"Tabla a agregar en el union con DeviceLogonEvents:",options:["IdentityInfo","IdentityLogonEvents","IdentityQueryEvents"],answer:"IdentityLogonEvents"},{label:"Tipo de join/union a usar:",options:["join kind = full outer","join kind = inner","union"],answer:"union"}]},
{id:44,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Defender 365.\nTu red contiene un dominio de Active Directory Domain Services (AD DS) local que se sincroniza con Azure AD.\nNecesitas identificar las solicitudes LDAP de usuarios de AD DS para enumerar objetos de AD DS.\n¿Cómo deberías completar la consulta KQL?",subquestions:[{label:"Tabla inicial de la consulta:",options:["IdentityDirectoryEvents","IdentityInfo","IdentityQueryEvents"],answer:"IdentityQueryEvents"},{label:"Operador where para filtrar AccountSid no vacío:",options:["contains","has","isnotempty"],answer:"isnotempty"}]},
{id:45,type:"mc",question:"Usted tiene una suscripción Microsoft 365 E5 que utiliza Microsoft Defender 365.\nDebe asegurarse de poder investigar las amenazas utilizando los datos del registro de auditoría unificado de Microsoft Defender para aplicaciones en\nla nube.\n\n¿Qué debes configurar primero?",options:{"A":"Configuración de enriquecimiento de usuario","B":"El conector de Azure","C":"El conector de Office 365","D":"Configuración de carga automática de registros"},answer:"C"},
{id:46,type:"hotspot",question:"Tienes una regla de detección personalizada que incluye la siguiente consulta KQL:\nAlertInfo | where Severity == \"High\" | distinct AlertId | join AlertEvidence on AlertId | where EntityType in (\"User\", \"Mailbox\") | where EvidenceRole == \"Impacted\" | summarize by Timestamp, AlertId, AccountName... | join EmailEvents on $left.AccountObjectId == $right.RecipientObjectId | where DeliveryAction == \"Delivered\" | summarize by Timestamp, AlertId, ReportId...\n\nPara cada una de las siguientes afirmaciones, selecciona Sí si es verdadera. De lo contrario, selecciona No.",subquestions:[{label:"La regla puede usarse para automatizar la eliminación de mensajes de correo electrónico del buzón de un usuario basada en la columna RecipientEmailAddress:",options:["Sí","No"],answer:"No"},{label:"La regla puede usarse para restringir la ejecución de apps automáticamente basada en la columna DeviceId:",options:["Sí","No"],answer:"Sí"},{label:"La regla puede usarse para automatizar la eliminación de un archivo basada en la columna SHA256:",options:["Sí","No"],answer:"Sí"}]},
{id:47,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Defender para servidores Plan 1 y contiene un servidor llamado\n\nServidor1.\n\nHabilita el escaneo sin agente.\nDebes evitar que se escanee el Servidor1. La solución debe minimizar el esfuerzo administrativo.\n¿Qué deberías hacer?",options:{"A":"Crea una etiqueta de exclusión.","B":"Actualice la suscripción al Plan 2 de Defender para servidores.","C":"Crear una regla de gobernanza.","D":"Crear un grupo de exclusión."},answer:"A"},
{id:48,type:"mc",question:"Debe configurar Microsoft Defender para aplicaciones en la nube para que genere alertas y active acciones correctivas en respuesta al\nuso compartido externo de archivos confidenciales.\n\n¿Qué dos acciones debe realizar en el portal de Microsoft 365 Defender? Cada respuesta correcta presenta parte de la\nsolución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"En Configuración, seleccione Protección de la información, seleccione Protección de la información de Azure y, a continuación, seleccione Analizar solo los archivos en busca de etiquetas de clasificación de Protección de la información de Azure y advertencias de inspección de contenido de este inquilino.","B":"En Configuración, seleccione Protección de la información, seleccione Archivos y, a continuación, habilite la supervisión de archivos.","D":"En Aplicaciones en la nube, seleccione Archivos y, a continuación, filtre la aplicación por Office 365.","E":"Desde las aplicaciones en la nube, seleccione Archivos y, a continuación, seleccione Nueva política en la búsqueda.","F":"En Configuración, seleccione Protección de la información, seleccione Protección de la información de Azure y, a continuación, seleccione Analizar automáticamente los archivos nuevos en busca de etiquetas de clasificación de Protección de la información de Azure y advertencias de inspección de contenido."},answer:"EF"},
{id:49,type:"hotspot",question:"Tu red contiene un dominio de Active Directory Domain Services (AD DS) local que se sincroniza con Azure AD.\nTienes una suscripción de Microsoft 365 E5 que usa Microsoft Defender 365.\nNecesitas identificar todos los intentos de autenticación interactiva de los usuarios del departamento de finanzas de tu empresa.\n¿Cómo deberías completar la consulta KQL?",subquestions:[{label:"Tabla inicial de la consulta:",options:["BehaviorAnalytics","IdentityInfo","IdentityQueryEvents"],answer:"IdentityInfo"},{label:"Tabla en el join:",options:["AuditLogs","IdentityLogonEvents","SigninLogs"],answer:"IdentityLogonEvents"}]},
{id:50,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que utiliza Microsoft Defender para Endpoint.\nDebe identificar los dispositivos que activaron una alerta de malware y recopilar pruebas relacionadas con dicha alerta. La\nsolución debe garantizar que pueda utilizar los resultados para iniciar el aislamiento de los dispositivos afectados.\n¿Qué herramientas debería usar en el portal de Microsoft 365 Defender?",options:{"A":"Incidentes","B":"Remediación","C":"Investigaciones","D":"Caza avanzada"},answer:"A"},
{id:51,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Purview y contiene un usuario llamado User1.\nUser1 comparte un archivo de informe de Microsoft Power BI desde la carpeta de Microsoft OneDrive de tu empresa a un usuario externo usando Microsoft Teams.\nNecesitas identificar qué archivo de informe de Power BI fue compartido.\n¿Cómo deberías configurar la búsqueda?",subquestions:[{label:"Activities:",options:["Copied file","Downloaded files to computer","Share file, folder, or site","Shared Power BI report"],answer:"Share file, folder, or site"},{label:"Record type:",options:["MicrosoftTeams","OneDrive","PowerBiAudit","Shared Power BI report"],answer:"Shared Power BI report"},{label:"Workload:",options:["MicrosoftTeams","OneDrive","PowerBi","SharePoint"],answer:"MicrosoftTeams"}]},
{id:52,type:"dragdrop",question:"(Caso de estudio - Litware Inc.) Litware tiene los siguientes recursos:\n• LA1: Log Analytics workspace con logs de todos los recursos de Azure y servidores on-premises\n• VM1: Windows Server 2019, Boston\n• VM2: Ubuntu 18.04 LTS, Boston\n• DC1: Windows Server 2019 (controlador de dominio), Boston\n\nNecesitas configurar DC1 para cumplir los requisitos de negocio (todos los controladores de dominio deben estar protegidos por Microsoft Defender for Identity).\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["Provide domain administrator credentials to the litware.com Active Directory domain","Create an instance of Microsoft Defender for Identity","Provide global administrator credentials to the litware.com Azure AD tenant","Install the sensor on DC1","Install the standalone sensor on DC1"],answer:["Create an instance of Microsoft Defender for Identity","Provide domain administrator credentials to the litware.com Active Directory domain","Install the sensor on DC1"]},
{id:53,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Purview y Microsoft Teams.\nTienes un equipo llamado Equipo1 que tiene un proyecto llamado Proyecto1.\nDebes identificar cualquier archivo del Proyecto1 que se haya almacenado en el sitio del equipo Team1 entre el 1 de febrero de 2023 y el 10 de\nfebrero de 2023.\n\n¿Qué consulta KQL debería ejecutar?",options:{"A":"(c:c)(Proyecto1)(fecha=(2023-02-01)..fecha=(2023-02-10))","B":"Registros de auditoría -  | donde la marca de tiempo esté entre (fecha y hora (2023-02-01)...fecha y hora (2023-02-10)) | donde el nombre del archivo contenga “Proyecto1”","C":"Proyecto1(c:c)(fecha=2023-02-01..2023-02-10)","D":"Registros de auditoría -  | donde Marca de tiempo > hace (10 días)  | donde FileName contiene “Project1”"},answer:"C"},
{id:54,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que utiliza Microsoft Defender para Endpoint.\n\nDebes crear una consulta que vincule las tablas AlertInfo, AlertEvidence y DeviceLogonEvents. La solución debe\ndevolver todas las filas de las tablas.\n¿Qué operador debería utilizar?\nUna búsqueda *",options:{"A":"search *","B":"union kind = inner","C":"join kind = inner","D":"evaluate hint.remote ="},answer:"B"},
{id:55,type:"mc",question:"Usted dispone de una suscripción Microsoft 365 E5 que incluye 100 dispositivos con Windows 10.\n\nUsted integra los dispositivos a Microsoft Defender 365.\nDebe asegurarse de poder iniciar conexiones remotas de shell a los dispositivos incorporados desde el portal de\nMicrosoft 365 Defender.\n¿Qué debes hacer primero?",options:{"A":"Modificar los permisos para Microsoft 365 Defender.","B":"Crear un grupo de dispositivos.","C":"En las funciones avanzadas de la configuración de Endpoints del portal de Microsoft 365 Defender, habilite la investigación automatizada.","D":"Configurar el control de acceso basado en roles (RBAC)."},answer:"D"},
{id:56,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Defender for Endpoint.\nNecesitas crear una regla de detección que cumpla los siguientes requisitos:\n• Se activa cuando un dispositivo con vulnerabilidades críticas de software estuvo activo durante la última hora.\n• Limita el número de resultados duplicados.\n¿Cómo deberías completar la consulta KQL?",subquestions:[{label:"Operador para limitar duplicados (después de | where VulnerabilitySeverityLevel == 'Critical'):",options:["| distinct CveId","| distinct DeviceId","| project-away CveId","| project-keep DeviceId"],answer:"| distinct DeviceId"},{label:"Operador final para incluir Timestamp, DeviceId, ReportId:",options:["| distinct DeviceId","| distinct DeviceId, ReportId","| project Timestamp, DeviceId, ReportId","| summarize count() by DeviceId, ReportId"],answer:"| project Timestamp, DeviceId, ReportId"}]},
{id:57,type:"hotspot",question:"Tienes una suscripción de Microsoft 365 E5 que usa Microsoft Teams.\nNecesitas realizar una búsqueda de contenido de chats de Teams para un usuario usando el portal de cumplimiento de Microsoft Purview. La solución debe minimizar el alcance de la búsqueda.\n¿Cómo deberías configurar la búsqueda de contenido?",subquestions:[{label:"Locations (Ubicaciones):",options:["Exchange mailboxes","Exchange public folders","SharePoint sites"],answer:"Exchange mailboxes"},{label:"Keywords (Palabras clave):",options:["Category","ItemClass","Kind"],answer:"Kind"}]},
{id:58,type:"mc",question:"Tienes una suscripción Microsoft 365 E5 que incluye 100 dispositivos Linux. Los dispositivos están integrados en Microsoft\nDefender 365.\n\nDebe iniciar la recopilación de paquetes de investigación de los dispositivos mediante el portal de Microsoft 365\nDefender.\n¿Qué acción de respuesta debería utilizar?",options:{"A":"Ejecutar análisis antivirus","B":"Iniciar la investigación automatizada","C":"Recopilar el paquete de investigación","D":"Iniciar sesión de respuesta en vivo"},answer:"C"},
{id:59,type:"mc",question:"Debe configurar Microsoft Defender para aplicaciones en la nube para que genere alertas y active acciones correctivas en respuesta al\nuso compartido externo de archivos confidenciales.\n\n¿Qué dos acciones debe realizar en el portal de Microsoft 365 Defender? Cada respuesta correcta presenta parte de la\nsolución.\nNOTA: Cada selección correcta vale un punto.",options:{"A":"En Configuración, seleccione Aplicación en la nube, seleccione Protección de información de Microsoft y, a continuación, seleccione Analizar solo archivos para etiquetas de confidencialidad de Protección de información de Microsoft y advertencias de inspección de contenido de este inquilino.","B":"Desde las aplicaciones en la nube, seleccione Archivos y, a continuación, filtre el tipo de archivo por Documento.","C":"En Configuración, seleccione Aplicación en la nube, seleccione Protección de información de Microsoft, seleccione Archivos y, a continuación, habilite la supervisión de archivos.","D":"En Aplicaciones en la nube, seleccione Archivos y, a continuación, filtre la aplicación por Office 365.","E":"Desde las aplicaciones en la nube, seleccione Archivos y, a continuación, seleccione Nueva política en la búsqueda.","F":"En Configuración, seleccione Aplicación en la nube, seleccione Protección de información de Microsoft y, a continuación, seleccione Analizar automáticamente los archivos nuevos en busca de etiquetas de confidencialidad y advertencias de inspección de contenido de Protección de información de Microsoft."},answer:"CF"},
{id:60,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Purview.\nSu empresa tiene un proyecto llamado Proyecto1.\nDebes identificar todos los correos electrónicos que contengan la palabra \"Proyecto1\" en el asunto. La solución debe buscar únicamente en los\nbuzones de correo de los usuarios que trabajaron en el Proyecto1.\n\n¿Qué deberías hacer?",options:{"A":"Realizar una búsqueda de datos de usuario.","B":"Crear una disposición de gestión de registros.","C":"Realizar una búsqueda de auditoría.","D":"Realizar una búsqueda de contenido."},answer:"D"},
{id:61,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR.\nDescubres que cuando Microsoft Defender for Endpoint genera alertas para un archivo ejecutable de uso común, provoca fatiga\npor exceso de alertas.\n\nNecesitas ajustar las alertas.\n\n\n¿Qué dos acciones puede realizar una regla de ajuste de alertas para las alertas? Cada respuesta correcta presenta una solución\ncompleta.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"eliminar","B":"hide","C":"resolve","D":"merge","E":"asignar"},answer:"BC"},
