{id:64,type:"mc",question:"Nota: Esta sección contiene uno o más conjuntos de preguntas con el mismo escenario y problema. Cada pregunta presenta una\nsolución única al problema. Debe determinar si la solución cumple con los objetivos establecidos. Es posible que más de una\nsolución del conjunto resuelva el problema. También es posible que ninguna de las soluciones del conjunto lo resuelva.\n\nDespués de responder una pregunta en esta sección, NO podrá regresar. Por lo tanto, estas preguntas no aparecen en\nla pantalla de revisión.\n\nTienes una suscripción a Microsoft 365.\nTienes 1.000 dispositivos Windows con un producto antivirus de terceros instalado y Microsoft Defender\nAntivirus en modo pasivo.\nDebes asegurarte de que los dispositivos estén protegidos contra artefactos maliciosos que no hayan sido detectados por el producto\nantivirus de terceros.\n\nSolución: Habilitar la investigación y respuesta automatizadas (AIR).\n\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:65,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR.\nEs necesario implementar reglas de engaño. La solución debe garantizar que se pueda limitar el alcance de dichas reglas.\n\n¿Qué deberías crear primero?",options:{"A":"device groups","B":"device tags","C":"honeytoken entity tags","D":"sensitive entity tags"},answer:"B"},
{id:66,type:"mc",question:"Nota: Esta sección contiene uno o más conjuntos de preguntas con el mismo escenario y problema. Cada pregunta presenta una solución única al problema.\nTienes una suscripción de Microsoft 365. Tienes 1.000 dispositivos Windows con un producto antivirus de terceros instalado y Microsoft Defender Antivirus en modo pasivo. Todos los dispositivos Windows están integrados en Microsoft Defender for Endpoint.\nNecesitas asegurar que los dispositivos estén protegidos de artefactos maliciosos no detectados por el antivirus de terceros.\nSolución: Habilitas Live Response.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:67,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nUsted utiliza Azure Security Center.\nRecibes una alerta de seguridad en el Centro de seguridad.\n\nDebes consultar las recomendaciones para resolver la alerta en el Centro de seguridad.\nSolución: Desde Alertas de seguridad, seleccione la alerta, seleccione Tomar medidas y, a continuación, expanda la sección Prevenir ataques futuros.\n\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:68,type:"mc",question:"Recibes una alerta de Azure Defender para Key Vault.\n\nDescubres que la alerta se genera a partir de múltiples direcciones IP sospechosas.\n\nEs necesario reducir el riesgo de filtración de secretos de Key Vault mientras se investiga el problema. La solución\ndebe implementarse lo antes posible y minimizar el impacto en los usuarios legítimos.\n¿Qué debes hacer primero?",options:{"A":"Modifique la configuración de control de acceso para la bóveda de llaves.","B":"Habilitar el firewall de Key Vault.","C":"Crear un grupo de seguridad de aplicaciones.","D":"Modificar la política de acceso para el almacén de claves."},answer:"B"},
{id:69,type:"hotspot",question:"Tienes una suscripción de Azure que tiene Azure Defender habilitado para todos los tipos de recursos compatibles.\nCreas una aplicación lógica de Azure llamada LA1.\nPlaneas usar LA1 para remediar automáticamente los riesgos de seguridad detectados en Azure Security Center.\nNecesitas probar LA1 en Security Center.\n¿Qué deberías hacer?",subquestions:[{label:"Configurar el trigger de LA1:",options:["When an Azure Security Center Recommendation is created or triggered","When an Azure Security Center Alert is created or triggered","When a response to an Azure Security Center alert is triggered"],answer:"When an Azure Security Center Recommendation is created or triggered"},{label:"Activar la ejecución de LA1 desde:",options:["Recommendations","Workflow automation","Security alerts"],answer:"Security alerts"}]},
{id:70,type:"mc",question:"Tienes una suscripción a Microsoft 365 que utiliza Azure Defender. Tienes 100\nmáquinas virtuales en un grupo de recursos llamado RG1. Asignas los roles de\nadministrador de seguridad a un nuevo usuario llamado SecAdmin1.\nDebe asegurarse de que SecAdmin1 pueda aplicar correcciones rápidas a las máquinas virtuales mediante Azure Defender. La solución\ndebe basarse en el principio de mínimo privilegio.\n\n¿Qué rol debería asignarle a SecAdmin1?",options:{"A":"El rol de Lector de seguridad para la suscripción","B":"El colaborador de la suscripción","C":"El rol de Colaborador para RG1","D":"El rol de propietario para RG1"},answer:"C"},
{id:71,type:"mc",question:"Usted aprovisiona una máquina virtual Linux en una nueva suscripción de Azure.\n\nHabilita Azure Defender e incorpora la máquina virtual a Azure Defender.\nDebes verificar que un ataque a la máquina virtual active una alerta en Azure Defender.\n\n¿Qué dos comandos de Bash deberías ejecutar en la máquina virtual? Cada respuesta correcta presenta parte de la\nsolución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"cp /bin/echo ./asc_alerttest_662jfi039n","B":"./alerttest probando tubería eicar","C":"cp /bin/echo ./alerttest","D":"./asc_alerttest_662jfi039n prueba de tubería eicar"},answer:"AD"},
{id:72,type:"mc",question:"Creas una suscripción de Azure llamada sub1.\nEn sub1, creas un espacio de trabajo de Log Analytics llamado workspace1.\n\nHabilita Azure Security Center y configura Security Center para que utilice workspace1.\nNecesitas recopilar los registros de eventos de seguridad de las máquinas virtuales de Azure que envían informes al espacio de trabajo 1.\n¿Qué debes hacer?",options:{"A":"Desde el Centro de seguridad, habilite la recopilación de datos.","B":"En el apartado 1, registre un proveedor.","C":"Desde el Centro de seguridad, cree una automatización de flujo de trabajo.","D":"En el espacio de trabajo 1, cree un libro de trabajo."},answer:"A"},
{id:73,type:"dragdrop",question:"Creas una nueva suscripción de Azure y comienzas a recopilar logs para Azure Monitor.\nNecesitas configurar Azure Security Center para detectar posibles amenazas relacionadas con inicios de sesión desde direcciones IP sospechosas a máquinas virtuales de Azure. La solución debe validar la configuración.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["Change the alert severity threshold for emails to Medium","Copy an executable file on a virtual machine and rename the file as ASC_AlertTest_662jfi039N.exe","Enable Azure Defender for the subscription","Change the alert severity threshold for emails to Low","Run the executable file and specify the appropriate arguments","Rename the executable file as AlertTest.exe"],answer:["Enable Azure Defender for the subscription","Copy an executable file on a virtual machine and rename the file as ASC_AlertTest_662jfi039N.exe","Run the executable file and specify the appropriate arguments"]},
{id:74,type:"mc",question:"Su empresa utiliza Azure Security Center y Azure Defender.\nEl equipo de operaciones de seguridad de la empresa le informa que NO recibe notificaciones por correo electrónico sobre alertas de\nseguridad.\n¿Qué debo configurar en el Centro de seguridad para habilitar las notificaciones por correo electrónico?",options:{"A":"Soluciones de seguridad","B":"Política de seguridad","C":"Precios y configuración","D":"Alertas de seguridad","E":"Azure Defender"},answer:"C"},
{id:75,type:"dragdrop",question:"Tienes recursos en Azure y Google Cloud.\nNecesitas ingerir datos de Google Cloud Platform (GCP) en Azure Defender.\n¿En qué orden deberías realizar las acciones?",actions:["Enable Security Health Analytics","From Azure Security Center, add cloud connectors","Configure the GCP Security Command Center","Create a dedicated service account and a private key","Enable the GCP Security Command Center API"],answer:["Configure the GCP Security Command Center","Enable Security Health Analytics","Enable the GCP Security Command Center API","Create a dedicated service account and a private key","From Azure Security Center, add cloud connectors"]},
{id:76,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario.\nUsas Azure Security Center.\nRecibes una alerta de seguridad en Security Center.\nNecesitas ver recomendaciones para resolver la alerta en Security Center.\nSolución: Desde Regulatory compliance, descargas el informe.\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:77,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nUsted utiliza Azure Security Center.\nRecibes una alerta de seguridad en el Centro de seguridad.\n\nDebes consultar las recomendaciones para resolver la alerta en el Centro de seguridad.\nSolución: Desde Alertas de seguridad, seleccione la alerta, seleccione Tomar medidas y, a continuación, expanda la sección Mitigar la\namenaza.\n\n¿Esto cumple el objetivo?",options:{"A":"Sí","B":"No"},answer:"A"},
{id:78,type:"mc",question:"Dispones de una suscripción de Azure con Azure Defender habilitado para todos los tipos de recursos compatibles.\nEs necesario configurar la exportación continua de alertas de alta gravedad para permitir su recuperación desde una solución de\ngestión de información y eventos de seguridad (SIEM) de terceros.\n\n¿A qué servicio debería exportar las alertas?",options:{"A":"Azure Cosmos DB","B":"Azure Event Grid","C":"Azure Event Hubs","D":"Azure Data Lake"},answer:"C"},
{id:79,type:"mc",question:"Usted es responsable de responder a las alertas de Azure Defender para Key Vault.\nDurante la investigación de una alerta, se detectan intentos no autorizados de acceder a un almacén de claves desde un nodo de salida de Tor. ¿Qué\nconfiguración se debe aplicar para mitigar la amenaza?",options:{"A":"Key Vault firewalls and virtual networks","B":"Azure Active Directory (Azure AD) permissions","C":"role-based access control (RBAC) for the key vault","D":"the access policy settings of the key vault"},answer:"A"},
{id:80,type:"hotspot",question:"Necesitas usar una plantilla de Azure Resource Manager para crear una automatización de flujos de trabajo que activará una remediación automática cuando se reciban alertas de seguridad específicas en Azure Security Center.\n¿Cómo deberías completar la porción de la plantilla que aprovisionará los recursos de Azure requeridos?",subquestions:[{label:"Tipo del recurso principal (\"type\"):",options:["Microsoft.Automation","Microsoft.Logic","Microsoft.Security"],answer:"Microsoft.Security"},{label:"Tipo para el callback URI en workflows/triggers:",options:["Microsoft.Automation","Microsoft.Logic","Microsoft.Security"],answer:"Microsoft.Logic"}]},
{id:81,type:"mc",question:"Tienes una suscripción de Azure que contiene un workspace de Log Analytics.\nNecesitas habilitar el acceso JIT (just-in-time) a VMs y las detecciones de red para recursos de Azure.\n¿Dónde deberías habilitar Azure Defender?",options:{"A":"at the subscription level","B":"at the workspace level","C":"at the resource level"},answer:"A"},
{id:82,type:"mc",question:"Usted utiliza Azure Defender.\n\nTienes una cuenta de Azure Storage que contiene información confidencial.\nSi alguien accede a la cuenta de almacenamiento desde una dirección IP sospechosa, debes ejecutar un script de PowerShell.\n¿Qué dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Desde Azure Security Center, habilite la automatización del flujo de trabajo.","B":"Crea una aplicación lógica de Azure que tenga un desencadenador manual.","C":"Cree una aplicación lógica de Azure que tenga un desencadenador de alerta del Centro de seguridad de Azure.","D":"Crea una aplicación lógica de Azure que tenga un desencadenador HTTP.","E":"Desde Azure Active Directory (Azure AD), agregue un registro de aplicación."},answer:"AC"},
{id:83,type:"hotspot",question:"Administras la postura de seguridad de una suscripción de Azure que contiene dos máquinas virtuales llamadas vm1 y vm2.\nPara cada una de las siguientes afirmaciones, selecciona Sí si la afirmación es verdadera. De lo contrario, selecciona No.",subquestions:[{label:"Ambas máquinas virtuales tienen reglas de entrada que permiten acceso desde rangos Any o Internet:",options:["Sí","No"],answer:"Sí"},{label:"Ambas máquinas virtuales tienen puertos de administración expuestos directamente a Internet:",options:["Sí","No"],answer:"No"},{label:"Si habilitas controles de acceso de red just-in-time en todas las máquinas virtuales, aumentarás el secure score en cuatro puntos:",options:["Sí","No"],answer:"Sí"}]},
{id:84,type:"dragdrop",question:"Eres informado de una nueva vulnerabilidad CVE que afecta a tu entorno.\nNecesitas usar Microsoft Defender Security Center para solicitar remediación del equipo responsable de los sistemas afectados si existe un exploit activo documentado.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["From Device Inventory, search for the CVE.","Open the Threat Protection report.","From Threat & Vulnerability Management, select Weaknesses, and search for the CVE.","From Advanced hunting, search for CveId in the DeviceTvmSoftwareInventoryVulnerabilities table.","Create the remediation request.","Select Security recommendations."],answer:["From Threat & Vulnerability Management, select Weaknesses, and search for the CVE.","Select Security recommendations.","Create the remediation request."]},
{id:85,type:"mc",question:"Usas Azure Security Center.\nRecibes una alerta de seguridad en Security Center.\nNecesitas ver recomendaciones para resolver la alerta en Security Center.\n¿Qué deberías hacer?",options:{"A":"From Security alerts, select the alert, select Take Action, and then expand the Prevent future attacks section.","B":"From Security alerts, select Take Action, and then expand the Mitigate the threat section.","C":"From Regulatory compliance, download the report.","D":"From Recommendations, download the CSV report."},answer:"B"},
{id:86,type:"mc",question:"En Azure Security Center, tienes una regla de supresión para 10 máquinas virtuales que se utilizan para realizar pruebas. Las máquinas\nvirtuales ejecutan Windows Server.\n\nEstás solucionando un problema en las máquinas virtuales.\nEn el Centro de seguridad, debe ver las alertas generadas por las máquinas virtuales durante los últimos cinco días.\n¿Qué debe hacer?",options:{"A":"Cambiar la fecha de vencimiento de la regla de supresión.","B":"Cambiar el estado de la regla de supresión a Deshabilitado.","C":"Modifique el filtro para la página de alertas de seguridad.","D":"Consulte los registros de eventos de Windows en las máquinas virtuales."},answer:"C"},
{id:87,type:"hotspot",question:"Tienes una cuenta de Azure Storage que múltiples apps de Azure Function accederán durante el desarrollo de una aplicación.\nNecesitas ocultar las alertas de Azure Defender para la cuenta de almacenamiento.\n¿Qué tipo de entidad y campo deberías usar en una regla de supresión?",subquestions:[{label:"Entity type:",options:["IP address","Azure Resource","Host","User account"],answer:"Azure Resource"},{label:"Field:",options:["Name","Resource Id","Address","Command line"],answer:"Resource Id"}]},
{id:88,type:"mc",question:"Creas una suscripción de Azure.\nHabilitas Azure Defender para la suscripción.\nNecesitas usar Azure Defender para proteger equipos locales (on-premises).\n¿Qué deberías hacer en los equipos locales?",options:{"A":"Install the Log Analytics agent.","B":"Install the Dependency agent.","C":"Configure the Hybrid Runbook Worker role.","D":"Install the Connected Machine agent."},answer:"D"},
{id:89,type:"mc",question:"Un administrador de seguridad recibe alertas por correo electrónico de Azure Defender sobre actividades como la posible carga de\nmalware en una cuenta de almacenamiento y posibles ataques de fuerza bruta exitosos.\nEl administrador de seguridad NO recibe alertas por correo electrónico para actividades como fallos en la acción antimalware y\nactividad de red sospechosa. Las alertas aparecen en\n\n\nCentro de seguridad de Azure.\n\nDebe asegurarse de que el administrador de seguridad reciba alertas por correo electrónico para todas las\nactividades. ¿Qué debe configurar en los ajustes del Centro de seguridad?",options:{"A":"the severity level of email notifications","B":"a cloud connector","C":"the Azure Defender plans","D":"the integration settings for Threat detection"},answer:"A"},
{id:90,type:"dragdrop",question:"Tienes una app de Azure Functions que genera miles de alertas en Azure Security Center cada día por actividad normal.\nNecesitas ocultar las alertas automáticamente en Security Center.\n¿Cuáles tres acciones deberías realizar en secuencia en Security Center?",actions:["Select Pricing & settings","Select IP as the entity type and specify the IP address","Select Azure Resource as the entity type and specify the Resource ID","Select Security policy","Select Security alerts","Select Suppression rules, and then select Create new suppression rule"],answer:["Select Security alerts","Select Suppression rules, and then select Create new suppression rule","Select Azure Resource as the entity type and specify the Resource ID"]},
{id:91,type:"hotspot",question:"Tienes una suscripción de Azure.\nNecesitas delegar permisos para cumplir los siguientes requisitos:\n• Habilitar y deshabilitar Azure Defender.\n• Aplicar recomendaciones de seguridad a recursos.\nLa solución debe usar el principio de menor privilegio.\n¿Qué rol de Azure Security Center deberías usar para cada requisito?",subquestions:[{label:"Habilitar y deshabilitar Azure Defender:",options:["Security Admin","Resource Group Owner","Subscription Contributor","Subscription Owner"],answer:"Security Admin"},{label:"Aplicar recomendaciones de seguridad a un recurso:",options:["Security Admin","Resource Group Owner","Subscription Contributor","Subscription Owner"],answer:"Resource Group Owner"}]},
{id:92,type:"hotspot",question:"Tienes una suscripción de Azure que usa Azure Defender.\nPlaneas usar la automatización de flujos de trabajo de Azure Security Center para responder a alertas de amenazas de Azure Defender.\nNecesitas crear una directiva de Azure que realizará la remediación de amenazas automáticamente.\n¿Qué deberías incluir en la solución?",subquestions:[{label:"Set available effects to:",options:["Append","DeployIfNotExists","EnforceRegoPolicy"],answer:"DeployIfNotExists"},{label:"To perform remediation use:",options:["An Azure Automation runbook that has a webhook","An Azure Logic Apps app that has the trigger set to When an Azure Security Center Alert is created or triggered","An Azure Logic Apps app that has the trigger set to When a response to an Azure Security Center alert is triggered"],answer:"An Azure Logic Apps app that has the trigger set to When an Azure Security Center Alert is created or triggered"}]},
{id:93,type:"mc",question:"Tienes una suscripción de Azure que contiene una máquina virtual llamada VM1 y utiliza Azure Defender. Azure Defender\ntiene habilitado el aprovisionamiento automático.\nDebe crear una regla de supresión de alertas personalizada que suprima las alertas de falsos positivos por uso sospechoso de\nPowerShell en VM1.\n¿Qué debes hacer primero?",options:{"A":"Desde Azure Security Center, agregue una automatización de flujo de trabajo.","B":"En VM1, ejecute el cmdlet Get-MPThreatCatalog.","C":"En VM1, active una alerta de PowerShell.","D":"Desde Azure Security Center, exporte las alertas a un espacio de trabajo de Log Analytics."},answer:"C"},
{id:94,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nTienes máquinas virtuales Linux en Amazon Web Services (AWS).\nImplementas Azure Defender y habilitas el aprovisionamiento automático.\n\nNecesitas supervisar las máquinas virtuales usando Azure Defender. Solución:\nHabilita Azure Arc e incorpora las máquinas virtuales a Azure Arc. ¿Esto cumple el\nobjetivo?",options:{"A":"Sí","B":"No"},answer:"A"},
{id:95,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nTienes máquinas virtuales Linux en Amazon Web Services (AWS).\nImplementas Azure Defender y habilitas el aprovisionamiento automático.\n\nNecesitas supervisar las máquinas virtuales usando Azure Defender. Solución: Instala\nmanualmente el agente de Log Analytics en las máquinas virtuales. ¿Esto cumple el\nobjetivo?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:96,type:"mc",question:"Usted dispone de cinco servidores Linux locales.\n\nTienes una suscripción a Azure que utiliza Microsoft Defender para la nube.\nNecesitas usar Defender para la nube para proteger los servidores Linux.\n\n¿Qué deberías instalar primero en los servidores?",options:{"A":"El agente de dependencia","B":"El agente de Log Analytics","C":"El agente de Azure Connected Machine","D":"La extensión de configuración de invitados"},answer:"C"},
{id:97,type:"dragdrop",question:"Tienes una suscripción de Azure. La suscripción contiene 10 máquinas virtuales integradas a Microsoft Defender for Cloud.\nNecesitas asegurarte de que cuando Defender for Cloud detecte comportamiento de minería de moneda digital en una máquina virtual, recibas una notificación por correo electrónico. La solución debe generar un correo de prueba.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["From Logic App Designer, run a trigger","From Security alerts in Defender for Cloud, create a sample alert","From Logic App Designer, create a logic app","From Workflow automation in Defender for Cloud, add a workflow automation","From Workflow automation in Defender for Cloud, change the status of the workflow automation"],answer:["From Logic App Designer, create a logic app","From Logic App Designer, run a trigger","From Workflow automation in Defender for Cloud, add a workflow automation"]},
{id:98,type:"dragdrop",question:"Tienes una suscripción de Microsoft que tiene Microsoft Defender for Cloud habilitado.\nConfiguraslas aplicaciones lógicas: LogicApp1 (trigger: cuando se crea o activa una recomendación) y LogicApp2 (trigger: cuando se crea o activa una alerta de Defender for Cloud).\nNecesitas configurar una acción automática que se ejecute si se activa una alerta de Suspicious process executed. La solución debe minimizar el esfuerzo administrativo.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["From Workflow automation in Defender for Cloud, change the status of the workflow automation","From Logic App Designer, run a trigger","From Security alerts in Defender for Cloud, create a sample alert","From Logic App Designer, create a logic app","From Workflow automation in Defender for Cloud, add a workflow automation"],answer:["From Logic App Designer, create a logic app","From Logic App Designer, run a trigger","From Workflow automation in Defender for Cloud, add a workflow automation"]},
{id:99,type:"mc",question:"Tienes una suscripción a Azure con Microsoft Defender para la nube habilitado.\nTienes una máquina virtual llamada Server1 que ejecuta Windows Server 2022 y está alojada en Amazon Web Services\n(AWS).\nNecesita recopilar registros y solucionar las vulnerabilidades del Servidor1 utilizando Defender para la nube.\n¿Qué deberías instalar primero en el Servidor1?",options:{"A":"El agente de supervisión de Microsoft","B":"El agente de Azure Monitor","C":"El agente de Azure Arc","D":"El agente de Azure Pipelines"},answer:"C"},
{id:100,type:"mc",question:"Usted dispone de una suscripción a Azure que utiliza Microsoft Defender para la nube y contiene una cuenta de almacenamiento denominada\nstorage1.\nRecibes una alerta que indica que se ha producido un volumen inusualmente alto de operaciones de eliminación en los blobs del almacenamiento 1.\n\n\nDebes identificar qué blobs fueron eliminados.\n¿Qué deberías revisar?",options:{"A":"Los registros de actividad del almacenamiento1","B":"Los registros de Azure Storage Analytics","C":"Detalles de la alerta","D":"Las entidades relacionadas con la alerta"},answer:"B"},
{id:101,type:"mc",question:"Tienes una suscripción a Azure que utiliza Microsoft Defender para la nube.\nDebe filtrar la vista de alertas de seguridad para mostrar las siguientes alertas:\n• Un usuario inusual accedió a una bóveda de claves.\n\n• Iniciar sesión desde una ubicación inusual\n\n• Actividad de viaje imposible\n¿Qué nivel de gravedad debería utilizar?",options:{"A":"Informational","B":"Low","C":"Medium","D":"High"},answer:"C"},
{id:102,type:"mc",question:"Tiene previsto revisar las alertas de Microsoft Defender for Cloud utilizando una solución de gestión de información y eventos de\nseguridad (SIEM) de terceros.\n\nDebe localizar las alertas que indiquen el uso de la táctica de escalada de privilegios MITRE ATT&CK.\n\n¿Qué clave JSON debería buscar?",options:{"A":"Descripción","B":"Intención","C":"Propiedades extendidas","D":"Entidades"},answer:"B"},
{id:103,type:"dragdrop",question:"Tienes 50 servidores on-premises.\nTienes una suscripción de Azure que usa Microsoft Defender for Cloud. El despliegue de Defender for Cloud tiene Microsoft Defender for Servers y el aprovisionamiento automático habilitados.\nNecesitas configurar Defender for Cloud para soportar los servidores on-premises. La solución debe cumplir los siguientes requisitos:\n• Proporcionar gestión de amenazas y vulnerabilidades.\n• Soportar reglas de recopilación de datos.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["From the Add servers with Azure Arc settings in the Azure portal, generate an installation script","From the Data controller settings in the Azure portal, create an Azure Arc data controller","On the on-premises servers, install the Log Analytics agent","On the on-premises servers, install the Azure Connected Machine agent","On the on-premises servers, install the Azure Monitor agent"],answer:["From the Add servers with Azure Arc settings in the Azure portal, generate an installation script","On the on-premises servers, install the Azure Connected Machine agent","On the on-premises servers, install the Azure Monitor agent"]},
{id:104,type:"hotspot",question:"Tienes una suscripción de Azure que usa Microsoft Defender for Cloud y contiene una aplicación lógica de Azure llamada app1.\nNecesitas asegurarte de que app1 se lance cuando se genere una alerta de seguridad específica de Defender for Cloud.\n¿Cómo deberías completar la plantilla de Azure Resource Manager (ARM)?",subquestions:[{label:"Tipo del recurso (\"type\"):",options:["Microsoft.Automation/automationAccounts","Microsoft.Logic/workflows","Microsoft.Security/automations"],answer:"Microsoft.Logic/workflows"},{label:"Ruta del callback URI en Microsoft.Logic/workflows/___:",options:["actions","contents","triggers"],answer:"triggers"}]},
{id:105,type:"hotspot",question:"Tienes una suscripción de Azure que tiene Microsoft Defender for Cloud habilitado para todos los tipos de recursos compatibles.\nCreas una aplicación lógica de Azure llamada LA1.\nPlaneas usar LA1 para remediar automáticamente los riesgos de seguridad detectados en Defender for Cloud.\nNecesitas probar LA1 en Defender for Cloud.\n¿Qué deberías hacer?",subquestions:[{label:"Configurar el trigger de LA1:",options:["When a Defender for Cloud Recommendation is created or triggered","When a Defender for Cloud Alert is created or triggered","When a response to a Defender for Cloud alert is triggered"],answer:"When a Defender for Cloud Recommendation is created or triggered"},{label:"Activar la ejecución de LA1 desde:",options:["Recommendations","Security alerts","Regulatory compliance standards"],answer:"Security alerts"}]},
{id:106,type:"mc",question:"Tienes una suscripción a Azure con Microsoft Defender para la nube habilitado.\nTienes una máquina virtual que ejecuta Windows 10 y tiene instalado el agente de Log Analytics.\n\nDebes simular un ataque a la máquina virtual que genere una alerta.\n¿Qué debes hacer primero?",options:{"A":"Ejecute la herramienta de solución de problemas de análisis de registros.","B":"Copie el archivo ejecutable y cámbiele el nombre a ASC_AlertTest_662jfi039N.exe.","C":"Modifique la configuración del Agente de supervisión de Microsoft.","D":"Ejecute el archivo ejecutable MMASetup y especifique el argumento –foo."},answer:"B"},
{id:107,type:"dragdrop",question:"Creas una nueva suscripción de Azure y comienzas a recopilar logs para Azure Monitor.\nNecesitas validar que Microsoft Defender for Cloud activará una alerta cuando un archivo malicioso esté presente en una máquina virtual de Azure que ejecuta Windows Server.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["Rename the executable file as AlertTest.exe","Copy an executable file on a virtual machine and rename the file as ASC_AlertTest_662jfi039N.exe","Change the alert severity threshold for emails to Medium","Run the executable file and specify the appropriate arguments","Change the alert severity threshold for emails to Low","Enable Microsoft Defender for Cloud's enhanced security features for the subscription"],answer:["Enable Microsoft Defender for Cloud's enhanced security features for the subscription","Copy an executable file on a virtual machine and rename the file as ASC_AlertTest_662jfi039N.exe","Run the executable file and specify the appropriate arguments"]},
{id:108,type:"mc",question:"Usted dispone de una suscripción a Azure que utiliza Microsoft Defender para la nube y contiene 100 máquinas virtuales que ejecutan\nWindows Server.\n\n\nDebe configurar Defender for Cloud para recopilar datos de eventos de las máquinas virtuales. La solución debe minimizar el\nesfuerzo y los costos administrativos.\n\n¿Cuáles dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Desde el espacio de trabajo creado por Defender for Cloud, configure el nivel de recopilación de datos en Común.","B":"Desde el centro de administración de Microsoft Endpoint Manager, habilite la inscripción automática.","C":"Desde el portal de Azure, cree una suscripción a Azure Event Grid.","D":"Desde el espacio de trabajo creado por Defender for Cloud, configure el nivel de recopilación de datos en Todos los eventos.","E":"Desde Defender for Cloud en el portal de Azure, habilite el aprovisionamiento automático para las máquinas virtuales."},answer:"AE"},
{id:109,type:"mc",question:"Usted tiene una suscripción de Azure que utiliza Microsoft Defender para la nube y contiene un usuario llamado User1.\nDebe asegurarse de que el Usuario1 pueda modificar las directivas de seguridad de Microsoft Defender para la nube. La solución debe aplicar el\nprincipio de mínimo privilegio.\n\n¿Qué rol deberías asignar al Usuario1?",options:{"A":"Security operator","B":"Security Admin","C":"Owner","D":"Contributor"},answer:"B"},
{id:110,type:"mc",question:"Tienes una suscripción de Azure que contiene un usuario llamado User1.\nAl usuario 1 se le ha asignado una licencia de Azure Active Directory Premium Plan 2.\n\nDebes determinar si la identidad del Usuario1 se vio comprometida durante los últimos 90 días.\n\n¿Qué deberías usar?",options:{"A":"Informe de detección de riesgos","B":"Informe de usuarios de riesgo","C":"Recomendaciones de Identity Secure Score","D":"Informe sobre inicios de sesión riesgosos"},answer:"B"},
{id:111,type:"mc",question:"Tienes una suscripción a Azure que utiliza Microsoft Defender para la nube.\n\nUsted tiene una cuenta de Amazon Web Services (AWS) que contiene una instancia de Amazon Elastic Compute Cloud (EC2) llamada\nEC2-1.\n\nNecesitas integrar EC2-1 a Defender for Cloud.\n¿Qué debería instalar en EC2-1?",options:{"A":"El agente de Log Analytics","B":"El agente de Azure Connected Machine","C":"El paquete de soluciones unificadas de Microsoft Defender para endpoints","D":"Agente de supervisión de Microsoft"},answer:"B"},
{id:112,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Defender para la nube y contiene un grupo de recursos llamado RG1. RG1\ncontiene 20 máquinas virtuales que ejecutan Windows Server 2019.\n\nDebe configurar el acceso justo a tiempo (JIT) para las máquinas virtuales en RG1. La solución debe cumplir los\nsiguientes requisitos:\n• Limite el tiempo máximo de solicitud a dos horas.\n• Limitar el acceso a los protocolos únicamente al Protocolo de Escritorio Remoto (RDP).\n\n• Minimizar el esfuerzo administrativo.\n\n¿Qué deberías usar?",options:{"A":"Azure AD Privileged Identity Management (PIM)","B":"Azure Policy","C":"Azure Bastion","D":"Azure Front Door"},answer:"B"},
{id:113,type:"hotspot",question:"Tienes una suscripción de Azure que usa Microsoft Defender for Cloud.\nCreas una organización de Google Cloud Platform (GCP) llamada GCP1.\nNecesitas integrar GCP1 en Defender for Cloud usando el conector de nube nativo. La solución debe asegurar que todos los proyectos futuros de GCP se integren automáticamente.\n¿Qué deberías incluir en la solución?",subquestions:[{label:"Crear:",options:["A management group and an Azure AD service principal","A management project and a custom role","An Azure AD administrative unit and a managed identity"],answer:"A management project and a custom role"},{label:"Mediante:",options:["Deploying a Bicep template","Running a script in Azure Cloud Shell","Running a script in GCP Cloud Shell"],answer:"Running a script in GCP Cloud Shell"}]},
{id:114,type:"mc",question:"Usted dispone de una suscripción a Azure que contiene una máquina virtual llamada VM1 y utiliza Microsoft Defender para la nube.\nMicrosoft Defender for Cloud tiene configurado el aprovisionamiento automático para usar Azure Monitor Agent.\n\nDebes crear una regla de supresión de alertas personalizada que suprima las alertas falsas positivas por uso sospechoso de\nPowerShell en VM1.\n¿Qué debes hacer primero?",options:{"A":"Desde Microsoft Defender para la nube, exporte las alertas a un espacio de trabajo de Log Analytics.","B":"Desde Microsoft Defender para la nube, agregue una automatización de flujo de trabajo.","C":"En VM1, active una alerta de PowerShell.","D":"En VM1, ejecute el cmdlet Get-MPThreatCatalog."},answer:"C"},
{id:115,type:"hotspot",question:"(Caso de estudio - Fabrikam, Inc.) Necesitas cumplir los requisitos de Microsoft Defender for Cloud Apps:\n• Asegurar que las políticas de alertas de viaje imposible se basen en las actividades previas de cada usuario.\n• Reducir la cantidad de alertas de viaje imposible que son falsos positivos.\n¿Qué deberías hacer?",subquestions:[{label:"Para basar las políticas en actividades previas de cada usuario:",options:["Ajustar la sensibilidad de la política de viaje imposible","Habilitar el enriquecimiento automático de datos de usuarios","Crear una ubicación con nombre para las VPNs","Agregar las IPs de VPN a la categoría 'VPN'"],answer:"Ajustar la sensibilidad de la política de viaje imposible"},{label:"Para reducir los falsos positivos de VPN:",options:["Ajustar la sensibilidad de la política de viaje imposible","Habilitar el enriquecimiento automático de datos de usuarios","Crear una ubicación con nombre para las VPNs","Agregar las IPs de VPN a la categoría 'VPN'"],answer:"Agregar las IPs de VPN a la categoría 'VPN'"}]},
{id:116,type:"hotspot",question:"(Caso de estudio - Fabrikam, Inc.) Necesitas asignar roles de control de acceso basado en roles (RBAC) a Group1 y Group2 para cumplir los requisitos de Microsoft Defender for Cloud:\n• Group2 puede modificar políticas de seguridad.\n• Group1 puede asignar iniciativas de cumplimiento regulatorio a nivel de suscripción de Azure.\n¿Qué rol deberías asignar a cada grupo?",subquestions:[{label:"Rol para Group1:",options:["Contributor","Owner","Security Admin","Security Assessment Contributor"],answer:"Owner"},{label:"Rol para Group2:",options:["Contributor","Owner","Security Admin","Security Assessment Contributor"],answer:"Security Admin"}]},
{id:117,type:"mc",question:"¿Qué debes hacer primero en la Cuenta1?",options:{"A":"Cree un usuario de AWS para Defender for Cloud.","B":"Configurar AWS Security Hub.","C":"Implemente el agente de AWS Systems Manager (SSM).","D":"Cree un rol de control de acceso (IAM) para Defender for Cloud."},answer:"B",scenario:"Estudio de caso -\n\nEste es un estudio de caso. Los estudios de caso no tienen un tiempo límite individual. Puede usar todo el tiempo del examen que necesite\npara completar cada caso. Sin embargo, puede haber estudios de caso y secciones adicionales en este examen. Debe administrar su tiempo\npara asegurarse de poder responder todas las preguntas incluidas en este examen dentro del tiempo asignado.\n\nPara responder a las preguntas de un estudio de caso, deberá consultar la información que se proporciona en el\nmismo. Los estudios de caso pueden incluir anexos y otros recursos que ofrecen información adicional sobre el\nescenario descrito. Cada pregunta es independiente de las demás.\nAl finalizar este caso práctico, aparecerá una pantalla de revisión. Esta pantalla le permite revisar sus respuestas y realizar\ncambios antes de pasar a la siguiente sección del examen. Una vez que comience una nueva sección, no podrá regresar a\nesta.\n\nPara comenzar el estudio de caso -\n\nPara ver la primera pregunta de este caso práctico, haga clic en el botón «Siguiente». Utilice los botones del panel izquierdo para\nexplorar el contenido del caso práctico antes de responder las preguntas. Al hacer clic en estos botones, se mostrará información\ncomo los requisitos del negocio, el entorno actual y la descripción del problema. Si el caso práctico incluye una pestaña «Toda la\ninformación», tenga en cuenta que la información que se muestra es idéntica a la de las pestañas siguientes. Cuando esté listo para",scenario_title:"Caso Práctico"},
{id:118,type:"mc",question:"Dispones de los recursos que se muestran en la siguiente tabla.\n\nTienes una suscripción a Azure que utiliza Microsoft Defender para la nube.\n\nDebe habilitar Microsoft Defender para servidores en cada recurso.\n¿Qué recursos requerirán la instalación del agente de Azure Arc?\nSolo para el servidor A.Server3",options:{"A":"Server3 only","B":"Server1 and Server4 only","C":"Server1, Server2, and Server4 only","D":"Server1, Server2, Server3, and Server4"},answer:"C"},
{id:119,type:"mc",question:"Tienes una suscripción a Azure que utiliza Microsoft Defender para la nube.\nTienes una cuenta de GitHub llamada Account1 que contiene 10 repositorios.\nDebe asegurarse de que Defender for Cloud pueda acceder a los repositorios de la Cuenta1.\n¿Qué es lo primero que debes hacer en el portal de Microsoft Defender para la nube?",options:{"A":"Habilitar integraciones.","B":"Habilitar un plan.","C":"Añadir un entorno.","D":"Habilitar políticas de seguridad."},answer:"C"},
{id:120,type:"hotspot",question:"Tienes una suscripción de Azure llamada Sub1 que usa Microsoft Defender for Cloud.\nTienes una organización de Azure DevOps llamada AzDO1.\nNecesitas integrar Sub1 y AzDO1. La solución debe cumplir los siguientes requisitos:\n• Detectar secretos expuestos en pipelines usando Defender for Cloud.\n• Minimizar el esfuerzo administrativo.\n¿Qué deberías hacer?",subquestions:[{label:"Crear para la integración GCP/Azure DevOps:",options:["A management group and an Azure AD service principal","A management project and a custom role","An Azure AD administrative unit and a managed identity"],answer:"A management project and a custom role"},{label:"Ejecutar mediante:",options:["Deploying a Bicep template","Running a script in Azure Cloud Shell","Running a script in GCP Cloud Shell"],answer:"Running a script in Azure Cloud Shell"}]},
{id:121,type:"dragdrop",question:"Tienes una suscripción de Azure que usa Microsoft Defender for Cloud.\nNecesitas crear un flujo de trabajo que enviará un mensaje de Microsoft Teams al departamento de TI de tu empresa cuando se genere una nueva acción de Microsoft Secure Score.\n¿Cuáles tres acciones deberías realizar en secuencia?",actions:["From Logic App Designer, create a logic app that has an HTTP request trigger","From Workflow automation in Defender for Cloud, add a workflow automation","From Logic App Designer, add a Teams connector and configure the send message action","From Defender for Cloud, enable enhanced security features","From Workflow automation in Defender for Cloud, change the status"],answer:["From Logic App Designer, create a logic app that has an HTTP request trigger","From Logic App Designer, add a Teams connector and configure the send message action","From Workflow automation in Defender for Cloud, add a workflow automation"]},
{id:122,type:"mc",question:"Usted dispone de una suscripción a Azure que utiliza Microsoft Defender para la nube y contiene 100 máquinas virtuales que ejecutan\nWindows Server.\n\nDebe configurar Defender for Cloud para recopilar datos de eventos de las máquinas virtuales. La solución debe minimizar el\nesfuerzo y los costos administrativos.\n\n¿Cuáles dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Configure el aprovisionamiento automático estableciendo el almacenamiento de eventos de seguridad en Común.","B":"Desde el centro de administración de Microsoft Endpoint Manager, habilite la inscripción automática.","C":"Desde el portal de Azure, cree una suscripción a Azure Event Grid.","D":"Configure el aprovisionamiento automático estableciendo el almacenamiento de eventos de seguridad en Todos los eventos.","E":"Desde Defender para la nube en el portal de Azure, habilite Microsoft Defender para servidores."},answer:"AE"},
{id:123,type:"mc",question:"Tienes una suscripción a Azure que utiliza Microsoft Defender para la nube.\nUsted tiene una suscripción a Amazon Web Services (AWS). La suscripción contiene varias máquinas virtuales que ejecutan\nWindows Server.\nDebe habilitar Microsoft Defender para servidores en las máquinas virtuales.\n\n\n¿Cuáles dos acciones debes realizar? Cada respuesta correcta presenta parte de la solución.\n\nNOTA: Cada respuesta correcta vale un punto.",options:{"A":"Desde Defender for Cloud, habilite el análisis sin agente.","B":"Incorporar las máquinas virtuales a Microsoft Defender para Endpoint.","C":"Desde Defender for Cloud, configure el conector de AWS.","D":"Instale el Agente de máquina virtual de Azure (Agente VM) en cada máquina virtual.","E":"Desde Defender for Cloud, configure el aprovisionamiento automático."},answer:"CE"},
{id:124,type:"hotspot",question:"Tienes una suscripción de Azure llamada Sub1 y una organización de Azure DevOps llamada AzDO1. AzDO1 usa Defender for Cloud y contiene un proyecto que tiene un pipeline YAML llamado Pipeline1.\nPipeline1 envía los detalles de las vulnerabilidades de software de código abierto descubiertas a Defender for Cloud.\nNecesitas configurar Pipeline1 para enviar los resultados del escaneo de secretos a Defender for Cloud.\n¿Qué deberías agregar a Pipeline1?",subquestions:[{label:"Task type para secret scanning:",options:["MicrosoftSecurityDevOps@1","CredScan@3","AdvancedSecurity-Codeql-Init@1"],answer:"MicrosoftSecurityDevOps@1"},{label:"Categoría del task:",options:["secrets","code","supply-chain"],answer:"secrets"}]},
{id:125,type:"mc",question:"Creas una suscripción de Azure llamada sub1.\nEn sub1, creas un espacio de trabajo de Log Analytics llamado workspace1.\nHabilita Microsoft Defender para la nube y configura Defender para la nube para que utilice workspace1.\nDebe recopilar los registros de eventos de seguridad de las máquinas virtuales de Azure que envían informes al espacio de trabajo 1.\n\n¿Qué deberías hacer?",options:{"A":"Desde Defender para la nube, modifique la configuración del plan de Microsoft Defender para servidores.","B":"En el apartado 1, registre un proveedor.","C":"Desde Defender for Cloud, cree una automatización de flujo de trabajo.","D":"En el espacio de trabajo 1, cree un libro de trabajo."},answer:"A"},
{id:126,type:"mc",question:"¿Qué debería configurar para el Servidor2?",options:{"A":"La extensión antimalware de Microsoft","B":"La extensión de configuración de máquinas Azure Automanage para Windows","C":"un bloqueo de recursos de Azure","D":"una etiqueta de recurso de Azure"},answer:"D",scenario:"Estudio de caso -\n\nEste es un estudio de caso. Los estudios de caso no tienen un tiempo límite individual. Puede usar todo el tiempo del examen que desee\npara completar cada caso. Sin embargo, puede haber estudios de caso y secciones adicionales en este examen. Debe gestionar\n\n\nTómese su tiempo para asegurarse de poder responder todas las preguntas incluidas en este examen dentro del tiempo asignado.\n\nPara responder a las preguntas de un estudio de caso, deberá consultar la información que se proporciona en el\nmismo. Los estudios de caso pueden incluir anexos y otros recursos que ofrecen información adicional sobre el\nescenario descrito. Cada pregunta es independiente de las demás.\nAl finalizar este caso práctico, aparecerá una pantalla de revisión. Esta pantalla le permite revisar sus respuestas y realizar\ncambios antes de pasar a la siguiente sección del examen. Una vez que comience una nueva sección, no podrá regresar a\nesta.\n\nPara comenzar el estudio de caso -\n\nPara ver la primera pregunta de este caso práctico, haga clic en el botón «Siguiente». Utilice los botones del panel izquierdo para\nexplorar el contenido del caso práctico antes de responder las preguntas. Al hacer clic en estos botones, se mostrará información\ncomo los requisitos del negocio, el entorno actual y la descripción del problema. Si el caso práctico incluye una pestaña «Toda la\ninformación», tenga en cuenta que la información que se muestra es idéntica a la de las pestañas siguientes. Cuando esté listo ",scenario_title:"Caso Práctico"},
