{id:291,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que contiene un dispositivo llamado Device1. Device1 está inscrito en Microsoft\nDefender para Endpoint.\nEl dispositivo 1 informa de un incidente que incluye un archivo llamado File1.exe como prueba.\n\nUsted inicia la acción \"Recopilar paquete de investigación\" y descarga el archivo ZIP.\nDebes identificar la primera y la última vez que se ejecutó File1.exe.\n¿Qué elementos del paquete de investigación debería revisar?",options:{"A":"Processes","B":"Autoruns","C":"Security event log","D":"Scheduled tasks","E":"Prefetch files"},answer:"E"},
{id:292,type:"mc",question:"Tienes una suscripción a Azure con Microsoft Defender para la nube habilitado.\nTienes una máquina virtual llamada Server1 que ejecuta Windows Server 2022 y está alojada en Amazon Web Services\n(AWS).\nNecesita recopilar registros y solucionar las vulnerabilidades del Servidor1 utilizando Defender para la nube.\n¿Qué deberías instalar primero en el Servidor1?",options:{"A":"El agente de supervisión de Microsoft","B":"El agente de Azure Monitor","C":"El agente de Azure Connected Machine","D":"El agente de Azure Pipelines"},answer:"C"},
{id:293,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR.\nUsted está investigando a un atacante conocido por usar la API de Microsoft Graph como vector de ataque. El atacante emplea las\ntácticas que se muestran en la siguiente tabla.\n\nDebes buscar actividades maliciosas en tu organización.\n¿Qué tácticas se pueden analizar utilizando la tabla MicrosoftGraphActivityLogs?\nSolo A.Táctica2",options:{"A":"Tactic2 only","B":"Tactic1 and Tactic2 only","C":"Tactic2 and Tactic3 only","D":"Tactic1, Tactic2, and Tactic3"},answer:"D"},
{id:294,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas recopilar eventos de seguridad de Windows de servidores on-premises que ejecutan Windows Server 2019.\nLos servidores ya tienen Azure Arc y el Azure Monitor Agent instalados.\n¿Qué conector de datos deberías usar?",options:{"A":"Windows Security Events via AMA","B":"Security Events via Legacy Agent","C":"Common Event Format (CEF)","D":"Syslog"},answer:"A"},
{id:295,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una consulta KQL que devuelva todos los eventos de inicio de sesión fallidos de los últimos 7 días, agrupados por cuenta de usuario.\n¿Qué tabla deberías consultar?",options:{"A":"AuditLogs","B":"SecurityEvent","C":"SigninLogs","D":"IdentityLogonEvents"},answer:"C"},
{id:296,type:"mc",question:"Usted dispone de una suscripción a Microsoft 365 que utiliza Microsoft Defender para el plan Endpoint 2 y contiene 500\ndispositivos Windows.\nPlaneas crear una regla de engaño personalizada para Microsoft Defender XDR.\n\nDebes asegurarte de que la regla se aplique solo a 10 dispositivos específicos.\n¿Qué debes hacer primero?",options:{"A":"Añadir señuelos personalizados a la regla.","B":"Agregue la dirección IP de cada dispositivo a la lista de cuentas y hosts señuelo de la regla.","C":"Añadir los dispositivos a un grupo.","D":"Asigne una etiqueta a los dispositivos."},answer:"D"},
{id:297,type:"mc",question:"Tienes una suscripción de Azure llamada Sub1 que utiliza Microsoft Defender para la nube.\n\nDebe asignar la iniciativa PCI DSS 4.0 a Sub1 y hacer que la iniciativa se muestre en Defender for Cloud.\n\nPanel de control de cumplimiento normativo.\n\nEn las políticas de seguridad de la configuración del entorno, se observa que la opción para agregar más estándares industriales\ny normativos no está disponible.\n\n¿Qué debes hacer primero?",options:{"A":"Configure los ajustes de exportación continua para Log Analytics.","B":"Habilitar el plan de Gestión de la Postura de Seguridad en la Nube (CSPM) para la suscripción.","C":"Configure los ajustes de exportación continua para Azure Event Hubs.","D":"Deshabilitar la asignación del Microsoft Cloud Security Benchmark (MCSB)."},answer:"B"},
{id:298,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel llamado SW1.\n\nDebe identificar qué reglas de anomalías están habilitadas en SW1.\n\n¿Qué debería revisar en Microsoft Sentinel?",options:{"A":"Content hub","B":"Entity behavior","C":"Analytics","D":"Settings"},answer:"C"},
{id:299,type:"mc",question:"Tienes una suscripción de Azure que contiene un espacio de trabajo de Microsoft Sentinel llamado WS1.\nSe crea una consulta de búsqueda que detecta un nuevo vector de ataque. Este vector de ataque se corresponde con una táctica que figura en la base de datos\nMITRE ATT&CK.\n\nDebe asegurarse de que se cree un incidente en WS1 cuando se detecte el nuevo vector de ataque.\n\n¿Qué deberías configurar?\nSesión de transmisión en vivo de caza de Aa\n\nMarcador de consulta Ba\nRegla de consulta programada de CA\n\nRegla de fusión Da",options:{"A":"a hunting livestream session","B":"a query bookmark","C":"a scheduled query rule","D":"a Fusion rule"},answer:"C"},
{id:300,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que utiliza Microsoft Defender XDR.\nEl equipo de seguridad de su empresa detecta tráfico de agentes de comando y control (C2) en la red. Agentes\n\ncomunicarse una vez cada 50 horas.\nDebe crear una regla de detección personalizada de Microsoft Defender XDR que identifique los dispositivos comprometidos y\nestablezca un patrón de comunicación. La solución debe cumplir los siguientes requisitos:\n• Identifique todos los dispositivos que se han comunicado durante los últimos 14 días.\n• Minimizar el tiempo necesario para identificar los dispositivos.\n\n¿A qué frecuencia de detección debería configurarse para la regla?",options:{"A":"Cada 12 horas","B":"Cada 24 horas","C":"Cada tres horas","D":"Cada hora"},answer:"B"},
{id:301,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR.\nTienes una consulta que contiene las siguientes instrucciones.\n\nDebes configurar una regla de detección personalizada que utilice la consulta. La solución debe minimizar el tiempo de espera para recibir\nnotificaciones sobre eventos que coincidan con la consulta.\n\n¿Qué frecuencia debería seleccionar para la regla?",options:{"A":"Cada hora","B":"Continuo (NRT)","C":"Cada 12 horas","D":"Cada 3 horas"},answer:"B"},
{id:302,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nRecibes muchas alertas de falsos positivos de una regla de análisis programada.\nNecesitas reducir el número de falsos positivos sin deshabilitar la regla.\n¿Qué deberías hacer?",options:{"A":"Crear una regla de automatización que cierre los incidentes automáticamente","B":"Agregar condiciones de filtrado a la consulta KQL de la regla","C":"Cambiar el tipo de regla a Fusion","D":"Deshabilitar el conector de datos fuente"},answer:"B"},
{id:303,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas buscar indicadores de compromiso (IoC) en todos los logs del workspace.\n¿Qué característica de Microsoft Sentinel deberías usar?",options:{"A":"Workbooks","B":"Hunting","C":"Analytics","D":"Automation"},answer:"B"},
{id:304,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas identificar qué reglas se usan para detectar ataques de múltiples etapas avanzados que comprenden dos o más alertas o actividades. La solución debe minimizar el esfuerzo administrativo.\n¿Qué tipo de regla deberías consultar?",options:{"A":"Fusion","B":"Microsoft Security","C":"ML Behavior Analytics","D":"Scheduled"},answer:"A"},
{id:305,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nEstás realizando hunting de amenazas y quieres recibir notificaciones en tiempo real cuando la consulta de hunting actual encuentre coincidencias a medida que los nuevos logs llegan al workspace.\n¿Qué característica deberías usar?",options:{"A":"Bookmarks","B":"Livestream","C":"Notebooks","D":"Watchlists"},answer:"B"},
{id:306,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis que genere un incidente cuando se detecte actividad sospechosa de un usuario específico en múltiples recursos de Azure.\n¿Qué deberías configurar?",subquestions:[{label:"Tipo de regla de análisis:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Scheduled"},{label:"Tabla de datos para actividad de Azure:",options:["AuditLogs","AzureActivity","SecurityAlert","SigninLogs"],answer:"AzureActivity"}]},
{id:307,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5.\nDebe asegurarse de que se genere una alerta en Microsoft Defender XDR cuando los atacantes intenten conectarse a un\ndispositivo específico. La solución debe minimizar el esfuerzo administrativo.\n\n¿Qué debes hacer en el portal de Microsoft Defender?",options:{"A":"Crea una regla de engaño que incluya un señuelo.","B":"Etiquete un dispositivo existente como una entidad honeytoken.","C":"Crea una regla de engaño que incluya un señuelo.","D":"Tag un dispositivo existente como entidad sensible."},answer:"B"},
{id:308,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 E5 que contiene un sitio de Microsoft SharePoint Online llamado Site1.\nDebe habilitar el control de sesión de Microsoft Defender para aplicaciones en la nube para el Sitio1.\n\n¿Qué tipo de política debería crear primero?",options:{"A":"access","B":"session","C":"app governance","D":"Conditional Access"},answer:"D"},
{id:309,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con una regla de análisis de tipo Scheduled.\nLa regla genera demasiados incidentes.\nNecesitas agrupar las alertas relacionadas en un único incidente.\n¿Qué configuración deberías modificar en la regla?",options:{"A":"El período de búsqueda (lookback period)","B":"La configuración de agrupación de eventos (event grouping)","C":"La configuración de supresión de alertas","D":"El umbral de frecuencia de ejecución"},answer:"B"},
{id:310,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas conectar Microsoft Sentinel a un feed de inteligencia de amenazas de terceros que usa el protocolo STIX/TAXII.\n¿Qué conector de datos deberías usar?",options:{"A":"Microsoft Defender Threat Intelligence","B":"Threat Intelligence - TAXII","C":"Threat Intelligence Platforms (TIP)","D":"Upload Indicators API"},answer:"B"},
{id:311,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con una watchlist que contiene IPs maliciosas conocidas.\nNecesitas enriquecer las alertas de seguridad correlacionando las IPs de las alertas con la watchlist.\n¿Qué función KQL deberías usar para unir los datos?",options:{"A":"join","B":"lookup","C":"union","D":"_GetWatchlist()"},answer:"B"},
{id:312,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que utiliza Microsoft Defender XDR.\n\nTienes una regla de detección personalizada llamada Rule1 que genera una alerta si se detectan más de cinco detecciones de antivirus en\nun dispositivo. Rule1 tiene un período de retrospectiva de 12 horas.\n\nDebes cambiar el período de retrospectiva a 48 horas.\n¿Qué deberías modificar para la Regla 1?",options:{"A":"el alcance","B":"El operador de resumen de la consulta KQL","C":"la frecuencia","D":"El operador where de la consulta KQL"},answer:"C"},
{id:313,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas configurar Microsoft Sentinel para que reciba alertas de Microsoft Defender for Cloud.\n¿Qué deberías hacer?",subquestions:[{label:"Tipo de conector de datos a usar:",options:["Azure Activity","Microsoft Defender for Cloud","Microsoft 365 Defender","Threat Intelligence - TAXII"],answer:"Microsoft Defender for Cloud"},{label:"Tipo de regla de análisis para convertir alertas en incidentes:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Microsoft Security"}]},
{id:314,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nRecibes muchos incidentes de falsos positivos de una regla de análisis Scheduled para una dirección IP específica de tu red corporativa.\nNecesitas cerrar automáticamente los incidentes futuros de esta IP. La solución debe minimizar el esfuerzo administrativo.\n¿Qué deberías crear?",options:{"A":"Una regla de automatización que cierre los incidentes con la condición de IP","B":"Una regla de supresión de alertas en la regla de análisis","C":"Un playbook que cierre los incidentes automáticamente","D":"Una watchlist con las IPs corporativas"},answer:"A"},
{id:315,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nDurante la investigación de un incidente, identificas una cuenta de usuario comprometida.\nNecesitas agregar esta cuenta a una watchlist de cuentas comprometidas para usarla en futuras reglas de análisis.\n¿Desde dónde en Microsoft Sentinel puedes agregar la entidad directamente a la watchlist?",options:{"A":"Desde el investigation graph del incidente","B":"Desde la página de Incidents","C":"Desde la página de Hunting","D":"Desde la página de Watchlists"},answer:"A"},
{id:316,type:"mc",question:"Tienes una suscripción de Azure que utiliza Microsoft Sentinel.\nEs necesario minimizar el esfuerzo administrativo requerido para responder a los incidentes y solucionar las amenazas de\nseguridad detectadas por Microsoft Sentinel.\n\n¿Qué dos funciones deberías usar? Cada respuesta correcta presenta parte de la solución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"Microsoft Sentinel workbooks","B":"Azure Automation runbooks","C":"Microsoft Sentinel automation rules","D":"Microsoft Sentinel playbooks","E":"Azure Functions apps"},answer:"CD"},
{id:317,type:"mc",question:"Tienes una suscripción de Azure que contiene un usuario llamado User1 y un espacio de trabajo de Microsoft Sentinel llamado WS1. WS1\nutiliza Microsoft Defender para la nube.\nDispone de las reglas de análisis de seguridad de Microsoft que se muestran en la siguiente tabla.\n\nEl usuario 1 realiza una acción que coincide con las reglas 1, 2, 3 y 4.\n¿Cuántos incidentes se generarán en WS1?",options:{"A":"1","B":"2","C":"3","D":"4"},answer:"D"},
{id:318,type:"mc",question:"Usted dispone de una red local.\nTienes una suscripción a Microsoft 365 E5 que utiliza Microsoft Defender para la gestión de identidades.\n\nDesde el portal de Microsoft Defender, investiga un incidente en un dispositivo llamado Device1 de un usuario llamado User1. El\nincidente contiene la siguiente alerta de Defender for Identity.\nSospecha de robo de identidad (transferencia de boletos) (ID externo 2018)\n\nEs necesario contener el incidente sin afectar a los usuarios ni a los dispositivos. La solución debe minimizar el esfuerzo administrativo.\n\n¿Qué deberías hacer?",options:{"A":"Deshabilitar solo al Usuario1.","B":"Solo dispositivo de cuarentena 1.","C":"Restablezca la contraseña de todas las cuentas que iniciaron sesión previamente en el Dispositivo1.","D":"Deshabilitar Usuario1 y poner en cuarentena Dispositivo1.","E":"Deshabilitar Usuario1, poner en cuarentena Dispositivo1 y restablecer la contraseña de todas las cuentas que iniciaron sesión previamente en Dispositivo1."},answer:"E"},
{id:319,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas ejecutar una consulta KQL que analice los logs de los últimos 90 días y presente los resultados en un gráfico de barras.\n¿Qué deberías usar?",options:{"A":"Un Workbook de Microsoft Sentinel","B":"Una regla de análisis de tipo Scheduled","C":"La página de Hunting","D":"Un notebook de Jupyter"},answer:"A"},
{id:320,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que cuando se cree un incidente, un analista reciba una notificación en Microsoft Teams. La solución debe minimizar el esfuerzo administrativo.\n¿Qué deberías crear?",options:{"A":"Una regla de automatización que ejecute un playbook de Logic Apps con conector de Teams","B":"Una regla de análisis Scheduled con acción de notificación","C":"Un webhook en Microsoft Teams","D":"Una Azure Function que monitoree los incidentes"},answer:"A"},
{id:321,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas ejecutar consultas de hunting avanzadas usando Jupyter notebooks integrados con Microsoft Sentinel.\n¿Qué servicio de Azure deberías usar para alojar los notebooks?",options:{"A":"Azure Databricks","B":"Azure Machine Learning","C":"Azure Notebooks (legacy)","D":"Azure Synapse Analytics"},answer:"B"},
{id:322,type:"mc",question:"Usted dispone de una suscripción a Microsoft 365 que utiliza Microsoft Defender para el plan Endpoint 2 y contiene 1000\ndispositivos Windows.\nTienes un script de PowerShell llamado Script1.ps1 que está firmado digitalmente.\nDebes asegurarte de poder ejecutar Script1.ps1 en una sesión de respuesta en vivo en uno de los dispositivos.\n¿Qué es lo primero que debes hacer después de la sesión de respuesta en directo?",options:{"A":"Ejecuta el comando de la biblioteca.","B":"Subir el archivo Script1.ps1 a la biblioteca.","C":"Ejecute el comando putfile.","D":"Modificar la política de ejecución de PowerShell del dispositivo."},answer:"B"},
{id:323,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas recopilar logs de actividad de Microsoft Exchange Online, SharePoint Online y Microsoft Teams.\n¿Qué conector de datos deberías usar?",options:{"A":"Azure Active Directory","B":"Microsoft 365 Defender","C":"Microsoft Defender for Cloud Apps","D":"Office 365"},answer:"D"},
{id:324,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nTienes una suscripción de Azure que utiliza Microsoft Defender XDR.\nDesde el portal de Microsoft Defender, realice una búsqueda de auditoría y exporte los resultados como un archivo llamado File1.csv que\ncontiene 10.000 filas.\nUsted utiliza Microsoft Excel para realizar operaciones de Obtener y Transformar Datos con el fin de analizar la columna AuditData del archivo File1.csv.\nLas operaciones no logran generar columnas para propiedades JSON específicas.\nDebe asegurarse de que Excel genere columnas para las propiedades JSON específicas en los resultados de la búsqueda de auditoría.\n\nSolución: Desde Defender, modifique los criterios de búsqueda de la auditoría para aumentar el número de registros devueltos y,\na continuación, exporte los resultados. Desde Excel, realice las operaciones de Obtener y transformar datos utilizando la nueva\nexportación.\n\n¿Cumple esto con el requisito?",options:{"A":"Sí","B":"No"},answer:"B"},
{id:325,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nTienes una suscripción de Azure que utiliza Microsoft Defender XDR.\nDesde el portal de Microsoft Defender, realice una búsqueda de auditoría y exporte los resultados como un archivo llamado File1.csv que\ncontiene 10.000 filas.\nUsted utiliza Microsoft Excel para realizar operaciones de Obtener y Transformar Datos con el fin de analizar la columna AuditData del archivo File1.csv.\nLas operaciones no logran generar columnas para propiedades JSON específicas.\nDebe asegurarse de que Excel genere columnas para las propiedades JSON específicas en los resultados de la búsqueda de auditoría.\n\nSolución: Desde Excel, aplique filtros a las columnas existentes en File1.csv para reducir el número de filas y, a continuación, realice\nlas operaciones Obtener y transformar datos para analizar la columna AuditData.\n\n¿Cumple esto con el requisito?",options:{"A":"Sí","B":"No"},answer:"A"},
{id:326,type:"mc",question:"Nota: Esta pregunta forma parte de una serie de preguntas que presentan el mismo escenario. Cada pregunta de la serie contiene una\nsolución única que podría cumplir los objetivos planteados. Algunos conjuntos de preguntas pueden tener más de una solución correcta,\nmientras que otros pueden no tener ninguna.\n\n\nUna vez que respondas una pregunta en esta sección, NO podrás volver a ella. Por lo tanto, estas preguntas no aparecerán en\nla pantalla de revisión.\nTienes una suscripción de Azure que utiliza Microsoft Defender XDR.\nDesde el portal de Microsoft Defender, realice una búsqueda de auditoría y exporte los resultados como un archivo llamado File1.csv que\ncontiene 10.000 filas.\nUsted utiliza Microsoft Excel para realizar operaciones de Obtener y Transformar Datos con el fin de analizar la columna AuditData del archivo File1.csv.\nLas operaciones no logran generar columnas para propiedades JSON específicas.\nDebe asegurarse de que Excel genere columnas para las propiedades JSON específicas en los resultados de la búsqueda de auditoría.\n\nSolución: Desde Defender, modifique los criterios de búsqueda de la auditoría para reducir el número de registros devueltos y, a\ncontinuación, exporte los resultados. Desde Excel, realice las operaciones de Obtener y transformar datos utilizando la nueva\nexportación.\n\n¿Cumple esto con el requisito?",options:{"A":"Sí","B":"No"},answer:"A"},
{id:327,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asignar el rol de menor privilegio que permita a un usuario ver datos de Sentinel, investigar incidentes y ejecutar playbooks manualmente.\n¿Qué rol deberías asignar?",options:{"A":"Microsoft Sentinel Reader","B":"Microsoft Sentinel Responder","C":"Microsoft Sentinel Contributor","D":"Microsoft Sentinel Automation Contributor"},answer:"B"},
{id:328,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con múltiples conectores de datos activos.\nNecesitas monitorear el estado de salud de todos los conectores de datos y recibir alertas cuando un conector deje de ingerir datos.\n¿Qué deberías usar?",options:{"A":"El Data connectors health monitoring workbook","B":"Azure Monitor alerts","C":"Microsoft Sentinel analytics rules","D":"Azure Service Health"},answer:"A"},
{id:329,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5.\nLa investigación y respuesta automatizadas (AIR) están habilitadas en Microsoft Defender para Office 365 y los dispositivos utilizan la\nautomatización completa en Microsoft Defender para Endpoint.\nSe ha producido un incidente relacionado con un usuario que recibió mensajes de correo electrónico infectados con malware en un dispositivo administrado.\n\n¿Qué acción requiere la corrección manual del incidente?",options:{"A":"soft elimina el mensaje de correo electrónico","B":"hard eliminando el mensaje de correo electrónico","C":"Aislamiento del dispositivo","D":"que contiene el dispositivo"},answer:"C"},
{id:330,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR y contiene un dispositivo Windows llamado\nDevice1.\nLa línea de tiempo del Dispositivo1 incluye tres archivos llamados File1.ps1, File2.exe y File3.dll.\n\nDebe enviar archivos para un análisis exhaustivo en Microsoft Defender XDR.\n\n¿Qué archivos puedes enviar?\nSolo A.File1.ps1\n\nSolo B.File2.exe\nSolo C.File3.dll\nSolo D.File2.exe y File3.dll\nSolo E.File1.ps1 y File2.exe\nArchivo F.File1.ps1, Archivo2.exe y Archivo3.dll",options:{"A":"File1.ps1 only","B":"File2.exe only","C":"File3.dll only","D":"File2.exe and File3.dll only","E":"File1.ps1 and File2.exe only","F":"File1.ps1, File2.exe, and File3.dll"},answer:"D"},
{id:331,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR.\nEs necesario identificar todas las entidades afectadas por un incidente.\n\n¿Qué pestaña debo usar en el portal de Microsoft Defender?",options:{"A":"Investigations","B":"Assets","C":"Evidence and Response","D":"Alerts"},answer:"C"},
{id:332,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR.\nUsted está investigando a un atacante conocido por usar la API de Microsoft Graph como vector de ataque. El atacante emplea las\ntácticas que se muestran en la siguiente tabla.\n\nDebes buscar actividades maliciosas en tu organización.\n¿Qué tácticas se pueden analizar utilizando la tabla MicrosoftGraphActivityLogs?\nSolo A.Táctica1\n\nSolo B.Táctica2\n\n\nSolo C.Táctica1 y Táctica3\nSolo D.Tactic2 y Tactic3",options:{"A":"Tactic1 only","B":"Tactic2 only","C":"Tactic1 and Tactic3 only","D":"Tactic2 and Tactic3 only","E":"Tactic1, Tactic2, and Tactic3"},answer:"E"},
{id:333,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis que detecte cuando se creen usuarios de Azure AD con privilegios elevados fuera del horario laboral.\n¿Qué deberías configurar?",subquestions:[{label:"Tipo de regla de análisis:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Scheduled"},{label:"Tabla de datos para eventos de Azure AD:",options:["AuditLogs","AzureActivity","SecurityAlert","SigninLogs"],answer:"AuditLogs"}]},
{id:334,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis que detecte eventos casi en tiempo real con la menor latencia posible.\n¿Qué tipo de regla de análisis deberías usar?",options:{"A":"Fusion","B":"Microsoft Security","C":"ML Behavior Analytics","D":"NRT (Near-Real-Time)","E":"Scheduled"},answer:"D"},
{id:335,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel llamado SW1.\n\nEn SW1, usted investiga un incidente que está asociado con las siguientes entidades:\n• Anfitrión\n\n• Dirección IP\n• Cuenta de usuario\n• Nombre del malware\n\n¿Qué entidad puede etiquetarse como indicador de compromiso (IoC) directamente desde la página del incidente?\nNombre del malware",options:{"A":"malware name","B":"host","C":"user account","D":"IP address"},answer:"D"},
{id:336,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis que use machine learning para detectar comportamientos anómalos de usuarios.\n¿Qué tipo de regla de análisis deberías usar?",options:{"A":"Fusion","B":"Microsoft Security","C":"ML Behavior Analytics","D":"Scheduled"},answer:"C"},
{id:337,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nEstás investigando un incidente y quieres agregar contexto adicional visible para otros analistas que trabajen en el mismo incidente.\n¿Qué deberías hacer?",options:{"A":"Agregar un bookmark al incidente","B":"Agregar un comentario al incidente","C":"Crear una watchlist con el contexto","D":"Crear una regla de automatización"},answer:"B"},
{id:338,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas conectar Microsoft Sentinel con Microsoft Defender XDR para importar incidentes y alertas.\nAl configurar el conector de Microsoft 365 Defender, ¿qué opción deberías seleccionar para evitar la duplicación de incidentes cuando ya tienes conectores individuales de productos Defender?",options:{"A":"Turn off all Microsoft incident creation rules for these products","B":"Enable the bi-directional sync option","C":"Select only alerts, not incidents","D":"Keep all Microsoft incident creation rules enabled"},answer:"A"},
{id:339,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas investigar un incidente y ver todos los eventos relacionados con las entidades del incidente en una vista de línea de tiempo.\n¿Qué deberías usar?",options:{"A":"El investigation graph","B":"La Entity timeline en el panel de entidades","C":"La página de Hunting","D":"Los Workbooks"},answer:"B"},
{id:340,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel.\n\nEstás investigando un incidente que involucra múltiples alertas, eventos y entidades.\nNecesitas crear un marcador para la investigación. La solución debe minimizar el esfuerzo administrativo.\n¿Qué configuración debería usar?",options:{"A":"Incidents","B":"Hunting","C":"Content hub","D":"Logs"},answer:"D"},
{id:341,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que un playbook se ejecute automáticamente cuando se cree un incidente de alta severidad.\n¿Qué deberías crear?",options:{"A":"Una regla de automatización","B":"Una regla de análisis de tipo Fusion","C":"Una regla de análisis de tipo Microsoft Security","D":"Un webhook en Azure"},answer:"A"},
{id:342,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que contiene un dispositivo llamado Device1.\n\nDesde el portal de Microsoft Defender, descubre que se activó una alerta para el Dispositivo1.\nDesde la página de inventario de dispositivos, aísle el Dispositivo1.\nNecesitas recopilar una lista de los programas instalados en el Dispositivo1.\n\n¿Qué deberías hacer?",options:{"A":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceProcessEvents.","B":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceTvmSoftwareInventory.","C":"Inicie una investigación automatizada y vea los resultados en el Centro de acciones.","D":"Inicie una sesión de respuesta en vivo y ejecute el comando de procesos."},answer:"B"},
{id:343,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que contiene un usuario llamado User1. La suscripción utiliza Microsoft 365\nCopilot for Security. Copilot for Security utiliza el complemento Sentinel.\nAl usuario 1 se le asigna el rol de Colaborador Copiloto.\nDurante una investigación, el Usuario1 envía una solicitud y recibe una notificación de que Copilot for Security no puede responder a las\npeticiones porque el uso de la unidad de cómputo de seguridad (SCU) se está acercando al límite de capacidad aprovisionada.\n\nDebes asegurarte de que el Usuario1 pueda usar Copilot para la seguridad para generar una respuesta correcta.\n¿Qué debería hacer el Usuario1?",options:{"A":"Espere una hora y vuelva a enviar la solicitud.","B":"Actualizar las SCU aprovisionadas.","C":"Ejecute el libro de trabajo de optimización de Microsoft Sentinel.","D":"Abra una segunda sesión de Copilot for Security y envíe la solicitud."},answer:"B"},
{id:344,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel.\n\nUsted está investigando un incidente que involucra a las siguientes entidades:\n• Un host llamado Host1\n• Una cuenta de usuario llamada Usuario1\n\n• Una dirección IP de 175.45.176.99\nDebes actualizar la lista de inteligencia sobre amenazas para incluir las entidades.\n¿Qué entidades puedes añadir en la página de Incidentes?",options:{"A":"175.45.176.99 only","B":"Host1 only","C":"User1 only","D":"175.45.176.99 and Host1 only","E":"Host1 and User1 only","F":"175.45.176.99, Host1, and User1"},answer:"A"},
{id:345,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 que utiliza Microsoft Copilot para la seguridad.\nCreas un libro de instrucciones llamado Book1.\nPara el Libro 1, debe crear una solicitud que contenga un campo de entrada llamado IncidentID.\n\n¿Cómo se debe formatear el ID del incidente?",options:{"B":"##IDIncidente##","C":"[ID del incidente]","D":"$IDIncidente$"},answer:"A"},
{id:346,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas conectar Microsoft Sentinel a una solución de inteligencia de amenazas de terceros que usa el protocolo STIX/TAXII.\n¿Qué conector de datos y configuración deberías usar?",subquestions:[{label:"Tipo de conector de datos:",options:["Microsoft Defender Threat Intelligence","Threat Intelligence - TAXII","Threat Intelligence Platforms","Upload Indicators API"],answer:"Threat Intelligence - TAXII"},{label:"Protocolo de comunicación del servidor TAXII:",options:["API REST","HTTPS con autenticación básica","STIX 2.0 sobre HTTPS","Syslog"],answer:"HTTPS con autenticación básica"}]},
{id:347,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con un playbook.\nNecesitas que el playbook se ejecute automáticamente cada vez que se cree un nuevo incidente de alta severidad.\n¿Qué deberías crear para activar el playbook?",options:{"A":"An analytics rule with a playbook action","B":"An automation rule with a playbook action","C":"A Logic Apps recurrence trigger","D":"An alert trigger in the playbook"},answer:"B"},
{id:348,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nEstás investigando un incidente y necesitas ver todos los detalles de las entidades asociadas como usuarios, IPs y hosts, en una vista visual de mapa.\n¿Qué herramienta de Microsoft Sentinel deberías usar?",options:{"A":"Entity timeline","B":"Investigation graph","C":"Incident log","D":"Hunting queries"},answer:"B"},
{id:349,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que los datos de la tabla SecurityEvent se retengan durante 2 años para auditoría, pero solo estén disponibles de forma interactiva durante los primeros 90 días.\n¿Qué deberías configurar?",options:{"A":"Cambiar el plan de la tabla a Basic","B":"Configurar la retención interactiva a 90 días y la retención total a 730 días en el plan Analytics","C":"Crear una exportación de datos a Azure Storage","D":"Configurar el archivo de datos en Log Analytics"},answer:"B"},
{id:350,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con 50 máquinas virtuales Linux en Azure.\nNecesitas recopilar logs de Syslog de estas VMs.\nLas VMs ya tienen el Azure Monitor Agent instalado.\n¿Qué deberías configurar para recopilar los logs?",options:{"A":"El conector de datos Syslog con el Legacy Agent","B":"Una Data Collection Rule (DCR) que especifique las facilities y severidades de Syslog","C":"El conector de CEF (Common Event Format)","D":"Un Log Analytics Workspace query"},answer:"B"},
{id:351,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que contiene un dispositivo llamado Device1.\n\nDesde el portal de Microsoft Defender, descubre que se activó una alerta para el Dispositivo1.\nDesde la página de inventario de dispositivos, aísle el Dispositivo1.\nNecesitas recopilar una lista de los programas instalados en el Dispositivo1.\n\n¿Qué deberías hacer?",options:{"A":"Inicie una sesión de respuesta en vivo y ejecute el comando de procesos.","B":"Inicie una investigación automatizada y vea los resultados en el Centro de acciones.","C":"Inicie una sesión de respuesta en vivo y ejecute el comando de análisis.","D":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceTvmSoftwareInventory."},answer:"D"},
{id:352,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que contiene un dispositivo llamado Device1.\n\nDesde el portal de Microsoft Defender, descubre que se activó una alerta para el Dispositivo1.\nDesde la página de inventario de dispositivos, aísle el Dispositivo1.\nNecesitas recopilar una lista de los programas instalados en el Dispositivo1.\n\n¿Qué deberías hacer?",options:{"A":"Recopile un paquete de investigación y descargue los resultados desde el Centro de acciones.","B":"Inicie una sesión de respuesta en vivo y ejecute el comando de análisis.","C":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceProcessEvents.","D":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceTvmInfoGathering."},answer:"A"},
{id:353,type:"mc",question:"Tienes dos inquilinos de Microsoft Entra llamados Tenant1 y Tenant2. Cada inquilino está vinculado a una suscripción de Azure.\nTenant1 contiene un grupo llamado Group1. Tenant2 contiene un grupo llamado Group2.\n\nDebe implementar Microsoft Sentinel para cada inquilino. La solución debe cumplir los siguientes requisitos:\n• Asegúrese de que el Grupo 1 pueda gestionar los incidentes de seguridad de los inquilinos 1 y 2 en un único espacio de trabajo.\n\n• Asegúrese de que Group2 solo pueda gestionar incidentes de seguridad para Tenant2.\n\n• Minimizar el uso de cuentas de invitados.\n• Minimizar el esfuerzo administrativo.\n• Minimizar los costos.\n\n¿Qué debería incluir en la solución?",options:{"A":"Un único espacio de trabajo y gestión de identidades privilegiadas (PIM)","B":"Un espacio de trabajo y múltiples asignaciones de roles de control de acceso basado en roles (RBAC).","C":"Dos espacios de trabajo y Azure Lighthouse","D":"Dos espacios de trabajo y privilegios de administrador delegados granulares (GDAP)."},answer:"C"},
{id:354,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis que correlacione alertas de Microsoft Defender for Endpoint con alertas de Microsoft Defender for Identity.\n¿Qué tipo de regla de análisis deberías usar?",options:{"A":"Fusion","B":"Microsoft Security","C":"ML Behavior Analytics","D":"Scheduled"},answer:"A"},
{id:355,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas buscar activamente amenazas en los logs usando consultas KQL predefinidas de la comunidad.\n¿Qué característica de Microsoft Sentinel deberías usar?",options:{"A":"Analytics","B":"Automation","C":"Hunting","D":"Workbooks"},answer:"C"},
{id:356,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una visualización en un workbook que muestre el número de incidentes por severidad durante los últimos 30 días.\n¿Qué tabla deberías consultar en la visualización?",options:{"A":"SecurityAlert","B":"SecurityEvent","C":"SecurityIncident","D":"SentinelHealth"},answer:"C"},
{id:357,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que contiene un dispositivo llamado Device1.\n\nDesde el portal de Microsoft Defender, descubre que se activó una alerta para el Dispositivo1.\nDesde la página de inventario de dispositivos, aísle el Dispositivo1.\nNecesitas recopilar una lista de los programas instalados en el Dispositivo1.\n\n¿Qué deberías hacer?",options:{"A":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceProcessEvents.","B":"Inicie una investigación automatizada y vea los resultados en el Centro de acciones.","C":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceTvmInfoGathering.","D":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceTvmSoftwareInventory."},answer:"D"},
{id:358,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis que genere un único incidente cuando múltiples alertas del mismo usuario se activen en un período de 24 horas.\n¿Qué deberías configurar?",subquestions:[{label:"Configuración de agrupación de alertas:",options:["Agrupar todas las alertas en un único incidente","Agrupar alertas de la misma regla con la misma entidad Account","Crear incidentes separados para cada alerta","Deshabilitar la creación de incidentes"],answer:"Agrupar alertas de la misma regla con la misma entidad Account"},{label:"Período de agrupación:",options:["1 hora","5 horas","24 horas","72 horas"],answer:"24 horas"}]},
{id:359,type:"mc",question:"Tienes 50 workspaces de Microsoft Sentinel distribuidos en múltiples suscripciones de Azure.\nNecesitas ver todos los incidentes de todos los workspaces en una sola página del portal de Azure. La solución debe minimizar el esfuerzo administrativo.\n¿Qué deberías usar?",options:{"A":"Azure Lighthouse","B":"Microsoft Sentinel multiple workspace view","C":"Azure Monitor workbooks","D":"Azure Resource Graph"},answer:"B"},
{id:360,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas habilitar User and Entity Behavior Analytics (UEBA) y configurar las fuentes de datos para Azure AD.\n¿Desde dónde deberías habilitar UEBA en Microsoft Sentinel?",options:{"A":"Analytics","B":"Configuration > Settings","C":"Entity behavior settings","D":"Threat management > UEBA"},answer:"C"},
{id:361,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que contiene un dispositivo llamado Device1.\n\nDesde el portal de Microsoft Defender, descubre que se activó una alerta para el Dispositivo1.\nDesde la página de inventario de dispositivos, aísle el Dispositivo1.\nNecesitas recopilar una lista de los programas instalados en el Dispositivo1.\n\n¿Qué deberías hacer?",options:{"A":"Inicie una sesión de respuesta en vivo y ejecute el comando de la biblioteca.","B":"Ejecute una consulta de búsqueda avanzada en la tabla DeviceTvmSoftwareInventory.","C":"Inicie una sesión de respuesta en vivo y ejecute el comando de análisis.","D":"Inicie una investigación automatizada y vea los resultados en el Centro de acciones."},answer:"B"},
{id:362,type:"mc",question:"Tienes un espacio de trabajo de Microsoft Sentinel que contiene las siguientes tablas.\n\nNecesitas investigar los datos de registro mediante una búsqueda.\n\n¿En qué tablas puedes buscar?",options:{"A":"Solo la tabla 3","B":"Solo la Tabla 1 y la Tabla 3","C":"Solo las tablas 3 y 4","D":"Solo las tablas 1, 3 y 4","E":"Tabla 1, Tabla 2, Tabla 3 y Tabla 4"},answer:"D"},
{id:363,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que todos los incidentes de alta severidad se asignen automáticamente a un analista específico.\n¿Qué deberías crear?",options:{"A":"Una regla de automatización con la condición de severidad Alta y la acción de asignación","B":"Una regla de análisis Scheduled con la acción de asignación","C":"Un playbook que asigne incidentes","D":"Una watchlist con los analistas disponibles"},answer:"A"},
{id:364,type:"mc",question:"Debes recomendar una solución que cumpla con los requisitos técnicos de las máquinas virtuales de\nAzure. ¿Qué debes incluir en la recomendación?\nAcceso justo a tiempo (JIT)",options:{"A":"just-in-time (JIT) access","B":"Azure Defender","C":"Azure Firewall","D":"Azure Application Gateway"},answer:"B"},
{id:365,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas exportar todos los datos de incidentes a un sistema externo de ticketing.\n¿Qué deberías usar?",options:{"A":"Un playbook de Logic Apps con un trigger de incidente de Sentinel","B":"Una regla de automatización con exportación de datos","C":"Azure Data Factory","D":"Azure Event Hub con exportación continua"},answer:"A"},
{id:366,type:"mc",question:"Su red local contiene un bosque de Servicios de dominio de Active Directory (AD DS).\nTienes un inquilino de Microsoft Entra que usa Microsoft Defender para la gestión de identidades. El bosque de AD DS se sincroniza con el\ninquilino.\nNecesitas crear una consulta de búsqueda que identifique las vinculaciones simples de LDAP a los controladores de dominio de AD DS.\n\n¿Qué tabla deberías consultar?",options:{"A":"AADServicePrincipalRiskEvents","B":"AADDomainServicesAccountLogon","C":"SigninLogs","D":"IdentityLogonEvents"},answer:"D"},
{id:367,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas configurar la retención de datos para que los logs de seguridad se conserven 2 años, pero los datos interactivos solo estén disponibles por 90 días.\n¿Qué deberías configurar?",subquestions:[{label:"Tipo de plan de tabla para retención extendida:",options:["Analytics plan","Auxiliary plan","Basic plan","Free plan"],answer:"Analytics plan"},{label:"Período de retención total a configurar:",options:["90 días","180 días","365 días","730 días"],answer:"730 días"}]},
{id:368,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con un playbook de Logic Apps.\nEl playbook falla intermitentemente sin dejar rastro en los logs de Sentinel.\nNecesitas configurar notificaciones cuando el playbook falle.\n¿Qué deberías configurar?",options:{"A":"Diagnósticos de Logic Apps enviados a Log Analytics","B":"Una regla de análisis de Sentinel que monitoree los logs de Logic Apps","C":"Una alerta de Azure Monitor para la Logic App","D":"Un webhook de error en la Logic App"},answer:"C"},
{id:369,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas identificar qué reglas de análisis generaron más incidentes durante el último mes.\n¿Qué deberías usar?",options:{"A":"El Security Operations Efficiency workbook","B":"La página de Analytics","C":"La tabla SecurityIncident en Log Analytics","D":"La página de Incidents con filtros"},answer:"A"},
{id:370,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que cuando un playbook de respuesta a incidentes falle, recibas una notificación.\n¿Qué deberías configurar?",options:{"A":"Diagnósticos de Logic Apps enviados a Log Analytics","B":"Una regla de análisis que monitoree los logs de Logic Apps","C":"Una alerta de Azure Monitor para la Logic App","D":"Un webhook de error en la Logic App"},answer:"C"},
{id:371,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas ver el estado de salud de todos los conectores de datos.\n¿Qué deberías usar?",options:{"A":"El Data connectors health monitoring workbook","B":"La página de Data connectors","C":"Azure Monitor","D":"Log Analytics workspace insights"},answer:"A"},
{id:372,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas recopilar eventos de seguridad de Windows de 100 VMs de Azure usando el Azure Monitor Agent (AMA).\n¿Qué deberías crear para definir qué eventos recopilar?",options:{"A":"A Data Collection Rule (DCR)","B":"A Log Analytics saved search","C":"A Sentinel analytics rule","D":"An Azure Policy initiative"},answer:"A"},
{id:373,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nEstás configurando el conector Threat Intelligence - TAXII para conectarte a un servidor TAXII externo.\n¿Qué tipo de autenticación soporta este conector?",options:{"A":"Azure AD OAuth 2.0","B":"Username and password (Basic Auth)","C":"Certificate-based authentication","D":"API key only"},answer:"B"},
{id:374,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas configurar el conector de datos de Microsoft Defender XDR para importar incidentes y alertas a Microsoft Sentinel.\n¿Qué deberías seleccionar durante la configuración?",subquestions:[{label:"Qué importar del conector Microsoft 365 Defender:",options:["Solo alertas","Solo incidentes","Incidentes y alertas","Eventos raw de productos individuales"],answer:"Incidentes y alertas"},{label:"Para evitar duplicados cuando Sentinel también tiene conectores individuales de Defender:",options:["Deshabilitar los conectores individuales de Defender","Habilitar la opción de deduplicación","Filtrar por severidad en el conector","Usar solo el conector M365 Defender"],answer:"Deshabilitar los conectores individuales de Defender"}]},
{id:375,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una watchlist que contenga una lista de IPs maliciosas conocidas para usarla en reglas de análisis.\n¿Qué formato de archivo deberías usar para importar la watchlist?",options:{"A":"CSV","B":"JSON","C":"XML","D":"YAML"},answer:"A"},
{id:376,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas exportar continuamente los datos de la tabla SecurityAlert a un Azure Storage Account para retención a largo plazo.\n¿Qué deberías configurar?",options:{"A":"Continuous Export en Microsoft Defender for Cloud","B":"Log Analytics data export rules","C":"Un playbook que exporte datos diariamente","D":"Azure Data Factory pipeline"},answer:"B"},
{id:377,type:"mc",question:"Tienes una suscripción de Azure que contiene un espacio de trabajo de Microsoft Sentinel llamado WS1. WS1 tiene\nconfigurados el conector de actividad de Azure y el conector de ID de Microsoft Entra.\nEs necesario investigar qué cuentas presentan la mayor cantidad de alertas y la información de incidentes correspondiente a cada\nuna. La solución debe minimizar el esfuerzo administrativo.\n\n\n¿Qué deberías hacer primero en WS1?",options:{"A":"Utilice el análisis del comportamiento de usuarios y entidades (UEBA) para detectar anomalías.","B":"Habilitar el análisis del comportamiento de usuarios y entidades (UEBA).","C":"Desde el centro de contenido, instale la solución de gestión de riesgos internos Microsoft Purview.","D":"Desde el centro de contenido, instale Cloud Identity Threat Protection Essentials."},answer:"B"},
{id:378,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 E5 que utiliza Microsoft Copilot para la seguridad.\nPlaneas ejecutar el siguiente código para crear un plugin personalizado de Copilot for Security.\n\nDebes especificar un formato y completar el segmento de código.\n¿Qué formato debería utilizar para el?\n\n¿variable?\n\nAPI de A.",options:{"A":"API","B":"GPT","C":"KQL","D":"SQL"},answer:"C"},
{id:379,type:"mc",question:"Tienes una suscripción a Microsoft 365 E5 que utiliza Microsoft Defender XDR.\nEstás investigando un incidente.\nDebes revisar las tareas relacionadas con el incidente que se realizaron.\n¿Qué información puedes usar en la página de incidentes?",options:{"A":"Solo tareas","B":"Solo registro de tareas y actividad","C":"Solo cronograma de tareas y alertas","D":"Tareas, registro de actividad y cronograma de alertas"},answer:"D"},
{id:380,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que las consultas KQL de hunting puedan acceder a datos de una watchlist que contiene cuentas privilegiadas.\n¿Qué función KQL deberías usar para consultar la watchlist?",options:{"A":"_GetWatchlist('WatchlistName')","B":"externaldata()","C":"lookup into watchlist","D":"materialize(watchlist)"},answer:"A"},
{id:381,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con múltiples reglas de análisis activas.\nNecesitas pausar todas las reglas de análisis durante una ventana de mantenimiento para evitar falsos positivos.\n¿Qué deberías hacer?",options:{"A":"Deshabilitar cada regla individualmente","B":"Crear una regla de automatización con condición de tiempo que cierre todos los incidentes","C":"Usar el modo de mantenimiento de Microsoft Sentinel","D":"Suspender el workspace de Log Analytics"},answer:"A"},
{id:382,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas agregar inteligencia de amenazas de un feed TAXII a Microsoft Sentinel para enriquecer las alertas.\n¿Qué conector de datos deberías configurar?",options:{"A":"Microsoft Defender Threat Intelligence","B":"Threat Intelligence - TAXII","C":"Threat Intelligence Platforms (TIP)","D":"Upload Indicators API"},answer:"B"},
{id:383,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asignar el rol de menor privilegio que permita a un usuario ver datos, incidentes, workbooks y otros recursos de Microsoft Sentinel, pero sin poder modificar nada.\n¿Qué rol deberías asignar?",options:{"A":"Microsoft Sentinel Reader","B":"Microsoft Sentinel Responder","C":"Microsoft Sentinel Contributor","D":"Log Analytics Reader"},answer:"A"},
{id:384,type:"mc",question:"Usted tiene una suscripción a Microsoft 365 E5 que utiliza Microsoft Copilot para la seguridad.\nInicias una sesión de Copilot for Security e introduces cinco preguntas, cada una de las cuales proporciona una respuesta.\n\nNecesitas crear un libro de preguntas que utilice las preguntas pero que NO contenga las respuestas. La solución debe minimizar el\nesfuerzo administrativo.\n\n¿Qué deberías hacer?",options:{"A":"Seleccione cada indicación y, a continuación, seleccione Crear libro de indicaciones.","B":"Crea un nuevo libro de indicaciones e incluye cada indicación.","C":"Introduzca una nueva solicitud con la siguiente entrada: Crear un libro de solicitudes a partir de las solicitudes de mi sesión.","D":"Comparta la sesión y, a continuación, seleccione Crear libro de indicaciones."},answer:"A"},
{id:385,type:"mc",question:"Dispone de 1000 dispositivos Windows 11 Pro locales integrados en Microsoft Defender para Endpoint.\nUsted tiene una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR.\nUsted identifica que un atacante realizó las siguientes acciones en un dispositivo:\n• Se modificó la ruta del sistema de archivos de una exclusión de antivirus basada en el registro.\n\n• Se descargó un archivo malicioso en la ruta del sistema de archivos.\n\nUsted inicia una sesión de respuesta en vivo en el dispositivo.\n\nDebes deshacer el cambio en el registro.\n\n¿Qué comando debes ejecutar?",options:{"A":"remediate","B":"registry","C":"scan","D":"analyze"},answer:"B"},
{id:386,type:"mc",question:"Su red local contiene dos dominios de Servicios de dominio de Active Directory (AD DS) llamados contoso.com y\nfabrikam.com. Contoso.com contiene un grupo llamado Group1. Fabrikam.com contiene un grupo llamado Group2.\nTienes un espacio de trabajo de Microsoft Sentinel llamado WS1 que contiene una regla de consulta programada llamada Rule1. Rule1\ngenera alertas en respuesta a eventos de seguridad anómalos de AD DS. Cada alerta crea un incidente.\nDebe implementar una solución de clasificación de incidentes que cumpla con los siguientes requisitos:\n• Los incidentes de seguridad procedentes de contoso.com deben asignarse al Grupo 1.\n• Los incidentes de seguridad procedentes de fabrikam.com deben asignarse al Grupo 2.\n\n• El esfuerzo administrativo debe minimizarse.\n\n¿Qué debería incluir en la solución?\nUn manual de procedimientos que se activa al producirse un incidente.\nUn manual de procedimientos que se activa al crearse una alerta.",options:{"A":"a playbook that is triggered by the creation of an incident","B":"a playbook that is triggered by the creation of an alert","C":"one automation rule assigned to Rule1","D":"two automation rules assigned to Rule1"},answer:"D"},
{id:387,type:"mc",question:"Tienes una suscripción a Microsoft 365.\nTienes la siguiente consulta KQL.\n\nDebe asegurarse de que puede crear una regla de detección personalizada de Microsoft Defender XDR utilizando la consulta.\n\n¿Qué deberías añadir a la consulta?",options:{"A":"| resumir (Timestamp, ReportId)=arg_max(Timestamp, ReportId), count() por DeviceId","B":"| resumir (ReportId)=crear_conjunto(ReportId), contar() por DeviceId","C":"| resumir (Marca de tiempo, Nombre del dispositivo)=arg_min(Marca de tiempo, Nombre del dispositivo), contar() por ID del dispositivo","D":"| resumir (Marca de tiempo)=rango(Marca de tiempo), contar() por DeviceId"},answer:"A"},
{id:388,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas automatizar la respuesta a un incidente específico: cuando se detecte inicio de sesión desde una IP de país bloqueado, deshabilitar automáticamente la cuenta del usuario en Azure AD.\n¿Cuál es la combinación correcta de componentes?",options:{"A":"Analytics rule + Automation rule + Playbook with Azure AD action","B":"Fusion rule + Playbook with Azure AD action","C":"Analytics rule + Playbook with Azure AD action (direct)","D":"Microsoft Security rule + Playbook with Azure AD action"},answer:"A"},
{id:389,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas ingerir logs de AWS CloudTrail en Microsoft Sentinel.\n¿Qué conector de datos deberías usar?",options:{"A":"Amazon Web Services S3","B":"Common Event Format (CEF)","C":"Syslog","D":"REST API personalizada"},answer:"A"},
{id:390,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis KQL que detecte cuando se realizan más de 10 intentos fallidos de inicio de sesión desde la misma IP en 5 minutos.\n¿Qué operador KQL deberías usar para contar los intentos por IP?",options:{"A":"count()","B":"dcount()","C":"summarize count() by IPAddress","D":"make_list(IPAddress)"},answer:"C"},
{id:391,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas identificar todas las cuentas de usuario que iniciaron sesión desde IPs listadas en una watchlist de IPs maliciosas.\n¿Qué operador KQL deberías usar para unir los datos de SigninLogs con la watchlist?",options:{"A":"join","B":"lookup","C":"union","D":"where in"},answer:"B"},
{id:392,type:"mc",question:"Tienes una suscripción de Azure que usa Microsoft Sentinel.\nNecesitas crear una regla de análisis de tipo Scheduled que ejecute una consulta KQL cada 5 minutos.\n¿Cuál es el período de búsqueda mínimo que puedes configurar?",options:{"A":"5 minutos","B":"10 minutos","C":"30 minutos","D":"1 hora"},answer:"A"},
{id:393,type:"mc",question:"Tienes una suscripción a Microsoft 365 que utiliza Microsoft Defender XDR. La suscripción contiene 500 dispositivos Windows\n11 que están integrados a Microsoft Defender para Endpoint.\nUsted detecta cambios no autorizados en la composición del grupo de administradores de los dispositivos.\n\nDebe configurar una solución que cumpla con los siguientes requisitos:\n• Cada hora, compruebe la pertenencia al grupo de administradores de cada punto final.\n\n• Cuando se detecte un cambio en la pertenencia al grupo de administradores, cree un incidente en Microsoft Defender.\n\n\nXDR.\n¿Qué deberías crear primero?\nGrupo de dispositivos Aa",options:{"A":"a device group","B":"an advanced hunting query","C":"an alert tuning rule","D":"a detection rule"},answer:"B"},
{id:394,type:"hotspot",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas asegurarte de que los datos de Microsoft Defender for Cloud se envíen a Microsoft Sentinel y se conviertan en incidentes.\n¿Qué deberías configurar?",subquestions:[{label:"Conector de datos a agregar:",options:["Azure Activity","Microsoft Defender for Cloud","Microsoft 365 Defender","Threat Intelligence - TAXII"],answer:"Microsoft Defender for Cloud"},{label:"Tipo de regla de análisis para crear incidentes:",options:["Fusion","Microsoft Security","ML Behavior Analytics","Scheduled"],answer:"Microsoft Security"}]},
{id:395,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nRecibes un incidente de alta severidad.\nNecesitas investigar todas las entidades del incidente y sus conexiones de forma visual.\n¿Qué deberías usar?",options:{"A":"Entity timeline","B":"Investigation graph","C":"Incident log","D":"Hunting queries"},answer:"B"},
{id:396,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear un playbook que se ejecute automáticamente cuando se detecte un inicio de sesión sospechoso y bloquee la cuenta del usuario en Azure AD.\n¿Qué trigger deberías usar en la Logic App?",options:{"A":"Microsoft Sentinel incident trigger","B":"Microsoft Sentinel alert trigger","C":"HTTP request trigger","D":"Recurrence trigger"},answer:"A"},
{id:397,type:"mc",question:"Tienes un workspace de Microsoft Sentinel.\nNecesitas crear una regla de análisis que ejecute una consulta KQL cada 5 minutos para detectar eventos críticos con la menor latencia posible.\n¿Qué tipo de regla deberías usar?",options:{"A":"Fusion","B":"Microsoft Security","C":"NRT (Near-Real-Time)","D":"Scheduled"},answer:"C"},
{id:398,type:"mc",question:"Tienes una suscripción de Azure que utiliza Microsoft Sentinel.\nNecesitas crear un libro de trabajo personalizado que calcule el tiempo promedio que se tarda en resolver los incidentes de seguridad. La\nsolución debe minimizar el esfuerzo administrativo.\n¿Qué plantilla de libro de trabajo integrada de Microsoft Sentinel debería seleccionar?",options:{"A":"Detección y respuesta de punto final (EDR) en modo de bloque","B":"Permitir o bloquear archivos","C":"Resolver alertas automáticamente","D":"Protección contra manipulaciones"},answer:"A"},
{id:399,type:"mc",question:"Tienes un workspace de Microsoft Sentinel con una regla de análisis Scheduled.\nLa regla genera muchos incidentes separados. Necesitas reducir el número de incidentes agrupando alertas del mismo usuario en un único incidente.\n¿Cómo deberías configurar la agrupación?",options:{"A":"Group all alerts triggered by the same rule into a single incident","B":"Group alerts triggered by the same rule and same Account entity into a single incident","C":"Create a separate incident for each alert","D":"Disable incident creation"},answer:"B"},
{id:400,type:"mc",question:"Tienes una suscripción a Microsoft 365. La suscripción incluye 500 dispositivos integrados en Microsoft Defender\npara Endpoint.\nUsted dispone de una suscripción a Azure que contiene un espacio de trabajo de Microsoft Sentinel.\n\nDebe ejecutar un programa piloto en 50 dispositivos que corrijan las amenazas automáticamente. La solución debe cumplir los\nsiguientes requisitos:\n• Minimizar el impacto en los dispositivos que quedan excluidos del programa piloto.\n\n• Minimizar el esfuerzo administrativo.\n\n¿Qué debes configurar primero?",options:{"A":"un manual de jugadas","B":"una política de seguridad de punto final","C":"un grupo de dispositivos","D":"una regla de automatización"},answer:"C"},

{id:427,type:"mc",question:"Para cumplir con los requisitos de Microsoft Defender for Endpoint, debe restringir las aplicaciones en la nube que se ejecutan en\nCLIENT1. ¿Qué dos configuraciones debe modificar? Cada respuesta correcta forma parte de la solución.\n\nNOTA: Cada selección correcta vale un punto.",options:{"A":"La configuración de incorporación desde la administración de dispositivos en el Centro de seguridad de Microsoft Defender.","B":"Políticas de detección de anomalías de seguridad de aplicaciones en la nube","C":"Funciones avanzadas de la configuración en el Centro de seguridad de Microsoft Defender.","D":"la configuración de detección en la nube en Cloud App Security"},answer:"CD"},

];

const SIM_TOTAL=57,SIM_MINUTES=150,SIM_PASS=700,SIM_MIN=100,SIM_MAX=1000;
const Q_CASE=ALL_QUESTIONS.filter(function(q){return q.scenario||q.scenario_title;});
const Q_SERIES=ALL_QUESTIONS.filter(function(q){
  if(q.scenario||q.scenario_title)return false;
  var t=(q.question||'').toLowerCase();
  return t.indexOf('parte de una serie')>-1||t.indexOf('esta sección contiene')>-1||
    t.indexOf('¿esto cumple el objetivo?')>-1||t.indexOf('solución:')>-1||t.indexOf('does this meet the goal')>-1;
});
const Q_REG=ALL_QUESTIONS.filter(function(q){return !Q_CASE.some(function(x){return x.id===q.id;})&&!Q_SERIES.some(function(x){return x.id===q.id;});});
var sim=null,_simTid=null;
function shuffle(a){var r=[].concat(a);for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}return r;}
function buildSimSections(){
  var groups={};Q_CASE.forEach(function(q){var k=q.scenario_title||'__';if(!groups[k])groups[k]=[];groups[k].push(q);});
  var sg=Object.values(groups).sort(function(a,b){return b.length-a.length;});
  var cQs=[];for(var i=0;i<sg.length;i++){if(sg[i].length>=6){cQs=shuffle(sg[i]).slice(0,6);break;}}
  if(!cQs.length&&sg.length)cQs=shuffle(sg[0]).slice(0,Math.min(sg[0].length,6));
  var cc=cQs.length,sQs=shuffle(Q_SERIES).slice(0,Math.min(Q_SERIES.length,8,Math.max(0,SIM_TOTAL-cc-30)));
  var rQs=shuffle(Q_REG).slice(0,SIM_TOTAL-cc-sQs.length);
  return[{id:'regular',icon:'📝',label:'Preguntas',color:'--accent3',canBack:true,info:'Responde cada pregunta seleccionando la mejor opción.',questions:rQs},
    {id:'series',icon:'🔗',label:'Serie de Preguntas',color:'--warning',canBack:false,info:'Determina si la solución presentada cumple el objetivo.',questions:sQs},
    {id:'casestudy',icon:'📋',label:'Caso Práctico',color:'--success',canBack:false,info:'Lee el escenario y responde las preguntas relacionadas.',questions:cQs}
  ].filter(function(s){return s.questions.length>0;});
}
function startSimulation(){var sec=buildSimSections();sim={sections:sec,idx:0,answers:{},revealed:new Set(),flags:new Set(),startTime:Date.now()};_loadSim(0);state.mode='simulation';state.screen='sim-section-intro';_startTimer();render();}
function _loadSim(i){var s=sim.sections[i];sim.idx=i;state.questions=s.questions;state.current=0;state.answers=sim.answers;state.revealed=sim.revealed;state.flags=sim.flags;}
function _startTimer(){clearInterval(_simTid);_simTid=setInterval(function(){var l=SIM_MINUTES*60000-(Date.now()-sim.startTime);_tick(l);if(l<=0){clearInterval(_simTid);finishSimulation();}},1000);}
function _tick(l){var el=document.getElementById('sim-timer');if(!el)return;if(l<=0){el.textContent='0:00';el.className='sim-timer danger';return;}var m=Math.floor(l/60000),s=Math.floor((l%60000)/1000);el.textContent=m+':'+('0'+s).slice(-2);el.className='sim-timer'+(m<5?' danger':m<15?' warn':'');}
function _tstr(){if(!sim)return'--:--';var l=Math.max(0,SIM_MINUTES*60000-(Date.now()-sim.startTime));var m=Math.floor(l/60000),s=Math.floor((l%60000)/1000);return m+':'+('0'+s).slice(-2);}
window.beginSimSection=function(){state.screen='quiz';render();};
window.endSimSection=function(){state.screen='sim-section-end';render();};
window.backToSimSection=function(){state.screen='quiz';render();};
window.finishSimSection=function(){var n=sim.idx+1;if(n>=sim.sections.length){finishSimulation();return;}_loadSim(n);state.screen='sim-section-intro';render();};
window.finishSimulation=function(){clearInterval(_simTid);state.screen='sim-score';render();};
window.retrySimulation=function(){startSimulation();};
function getSimResult(){var tot=0,cor=0;var by=sim.sections.map(function(s){var sc=0;s.questions.forEach(function(q){if(checkAnswer(q,sim.answers[q.id]))sc++;});tot+=s.questions.length;cor+=sc;return Object.assign({},s,{correct:sc});});var score=Math.round(SIM_MIN+(cor/tot)*(SIM_MAX-SIM_MIN));return{score:score,cor:cor,tot:tot,passed:score>=SIM_PASS,by:by,elapsed:Date.now()-sim.startTime};}
function _simBar(sub){return'<div class="sim-top-bar"><div class="sim-top-logo"><div class="logo-icon" style="width:32px;height:32px;font-size:11px">SC</div><div class="logo-text"><span class="logo-title">SC-200 · Simulacro</span><span class="logo-sub">'+escHtml(sub||'')+'</span></div></div><div class="sim-top-right"><div class="sim-timer" id="sim-timer">'+_tstr()+'</div>'+(sim?'<div class="sim-top-total">'+sim.sections.reduce(function(a,s){return a+s.questions.length;},0)+' pregs.</div>':'')+'</div></div>';}
function renderSimSectionIntro(){var sec=sim.sections[sim.idx];var n=sim.idx+1,tot=sim.sections.length;var prev=sim.sections.slice(0,sim.idx).reduce(function(a,s){return a+s.questions.length;},0);var grand=sim.sections.reduce(function(a,s){return a+s.questions.length;},0);return'<div class="sim-wrap">'+_simBar('Sección '+n+' de '+tot)+'<div class="sim-intro-body"><div class="ssi-eyebrow">Sección '+n+' de '+tot+'</div><div class="ssi-icon">'+sec.icon+'</div><h2 class="ssi-title">'+escHtml(sec.label)+'</h2><p class="ssi-info">'+escHtml(sec.info)+'</p>'+(sim.idx>0?'<div class="ssi-alert">⚠️ Una vez que inicies esta sección no podrás regresar a secciones anteriores.</div>':'')+'<div class="ssi-rules"><div class="ssi-rule"><span class="ssi-rule-dot ok">✓</span>Navega libremente entre preguntas de esta sección</div><div class="ssi-rule"><span class="ssi-rule-dot ok">✓</span>Marca preguntas para revisar</div><div class="ssi-rule"><span class="ssi-rule-dot info">📊</span>'+prev+'/'+grand+' completadas del examen</div><div class="ssi-rule"><span class="ssi-rule-dot info">🕐</span>'+sec.questions.length+' pregunta'+(sec.questions.length!==1?'s':'')+' en esta sección</div></div><button class="btn btn-primary ssi-cta" onclick="beginSimSection()">Iniciar Sección '+n+' →</button></div></div>';}
function renderSimSectionEnd(){var sec=sim.sections[sim.idx];var isLast=sim.idx===sim.sections.length-1;var ans=sec.questions.filter(function(q){return sim.answers[q.id]!==undefined;}).length;var fl=sec.questions.filter(function(q){return sim.flags.has(q.id);}).length;var un=sec.questions.length-ans;return'<div class="sim-wrap">'+_simBar('Resumen')+'<div class="sim-intro-body"><div class="ssi-icon">📊</div><h2 class="ssi-title">'+escHtml(sec.label)+'</h2><div class="ssi-info">'+ans+'/'+sec.questions.length+' respondidas'+(fl?' · '+fl+' marcadas':'')+'</div>'+(un>0?'<div class="ssi-alert">⚠️ <strong>'+un+' sin responder.</strong></div>':'<div class="ssi-ok">✓ ¡Todas respondidas!</div>')+'<div class="ssi-nav-btns"><button class="btn btn-secondary" onclick="backToSimSection()">← Revisar</button>'+(isLast?'<button class="btn btn-success" onclick="finishSimulation()">Finalizar Examen 🏁</button>':'<button class="btn btn-primary" onclick="finishSimSection()">Continuar → Sección '+(sim.idx+2)+'</button>')+'</div></div></div>';}
function renderSimScore(){var r=getSimResult();var pct=Math.round(r.cor/r.tot*100);var m=Math.floor(r.elapsed/60000),s=Math.floor((r.elapsed%60000)/1000);var nPct=Math.round((r.score-SIM_MIN)/(SIM_MAX-SIM_MIN)*100);var pPct=Math.round((SIM_PASS-SIM_MIN)/(SIM_MAX-SIM_MIN)*100);var sd=502.65;return'<div class="sim-result-page"><div class="sim-result-topbar"><div class="logo"><div class="logo-icon">SC</div><div class="logo-text"><span class="logo-title">SC-200 · Resultado</span><span class="logo-sub">Microsoft Security Operations Analyst</span></div></div></div><div class="sim-result-body"><div class="sim-ring-wrap"><svg class="sim-ring-svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="80" fill="none" stroke="var(--surface3)" stroke-width="14"/><circle cx="100" cy="100" r="80" fill="none" stroke="'+(r.passed?'var(--success)':'var(--danger)')+'" stroke-width="14" stroke-dasharray="'+sd+'" stroke-dashoffset="'+Math.round(sd*(1-nPct/100))+'" stroke-linecap="round" transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 1.2s"/></svg><div class="sim-ring-center"><div class="sim-ring-score">'+r.score+'</div><div class="sim-ring-of">/ 1000</div></div></div><div class="sim-verdict '+(r.passed?'pass':'fail')+'">'+(r.passed?'✓ APROBADO':'✗ REPROBADO')+'</div><p class="sim-verdict-msg">'+(r.passed?'Superaste el mínimo de <strong>'+SIM_PASS+'</strong> puntos.':'Necesitas <strong>'+(SIM_PASS-r.score)+' puntos más</strong> para aprobar.')+'</p><div class="sim-res-stats"><div class="sim-res-stat"><div class="srstat-val">'+r.cor+'/'+r.tot+'</div><div class="srstat-lbl">Correctas</div></div><div class="sim-res-stat"><div class="srstat-val">'+pct+'%</div><div class="srstat-lbl">Porcentaje</div></div><div class="sim-res-stat"><div class="srstat-val">'+m+'m '+s+'s</div><div class="srstat-lbl">Tiempo</div></div></div><div class="sim-scale-wrap"><div class="sim-scale-track"><div class="sim-scale-fail-zone" style="width:'+pPct+'%"></div><div class="sim-scale-pass-line" styl window.goTo=function(i){if(state.mode==='simulation'&&sim&&sim.sections[sim.idx]&&!sim.sections[sim.idx].canBack&&i<state.current)return;state.current=i;render();setTimeout(function(){var el=document.querySelector('.q-card');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},50);};
window.toggleFlag=function(id){if(state.flags.has(id))state.flags.delete(id);else state.flags.add(id);render();};
window.selectAnswer=function(qid,key,isM){var q=state.questions.find(function(x){return x.id==qid;});if(!q||state.revealed.has(q.id))return;if(isM){var a=state.answers[q.id]?state.answers[q.id].slice():[];var ix=a.indexOf(key);if(ix>=0)a.splice(ix,1);else a.push(key);state.answers[q.id]=a;if(state.mode==='study'&&a.length===q.answer.length){state.revealed.add(q.id);render();return;}}else{state.answers[q.id]=key;if(state.mode==='study'){state.revealed.add(q.id);render();return;}}render();var btn=document.getElementById('submit-btn');if(btn){var ca=q.answer||'';btn.disabled=ca.length>1?((state.answers[q.id]||[]).length<ca.length):(state.answers[q.id]===undefined);}syncBN();};
window.selectHotspot=function(qid,idx,val){var q=state.questions.find(function(x){return x.id==qid;});if(!q||state.revealed.has(q.id))return;var ua=state.answers[q.id]?state.answers[q.id].slice():new Array(q.subquestions.length).fill('');ua[idx]=val;state.answers[q.id]=ua;if(state.mode==='study'&&ua.every(function(v,i){return v===q.subquestions[i].answer;})){state.revealed.add(q.id);}render();syncBN();};
window.addDD=function(qid,act){var q=state.questions.find(function(x){return x.id==qid;});if(!q||state.revealed.has(q.id))return;var ua=state.answers[q.id]?state.answers[q.id].slice():[];if(ua.length<q.answer.length)ua.push(act);state.answers[q.id]=ua;if(state.mode==='study'&&ua.length===q.answer.length){state.revealed.add(q.id);}render();syncBN();};
window.removeDD=function(qid,idx){var q=state.questions.find(function(x){return x.id==qid;});if(!q||state.revealed.has(q.id))return;var ua=state.answers[q.id]?state.answers[q.id].slice():[];ua.splice(idx,1);state.answers[q.id]=ua;render();syncBN();};
window.submitAnswer=function(){var q=state.questions[state.current];state.revealed.add(q.id);render();};
window.finishQuiz=function(){state.screen='score';render();};
function syncBN(){var btn=document.getElementById('bnav-confirm');if(!btn)return;var q=state.questions[state.current],ua=state.answers[q.id],ca=q.answer||'';if(q.type==='mc'){var isM=ca.length>1&&/^[A-F]+$/.test(ca);btn.disabled=isM?!(Array.isArray(ua)&&ua.length===ca.length):!ua;}else if(q.type==='hotspot')btn.disabled=!Array.isArray(ua)||ua.length<q.subquestions.length||ua.some(function(v){return!v;});else if(q.type==='dragdrop')btn.disabled=!Array.isArray(ua)||ua.length!==q.answer.length;}
function buildBNav(){var nav=document.getElementById('bottom-nav');if(!nav){nav=document.createElement('div');nav.id='bottom-nav';document.body.appendChild(nav);}if(!state||state.screen!=='quiz'){nav.style.display='none';return;}nav.style.display='flex';var q=state.questions[state.current],answered=state.revealed.has(q.id),isLast=state.current===state.questions.length-1,simMode=state.mode==='simulation'&&sim,btns='';if(state.current>0&&!simMode)btns+='<button class="bnav-btn" onclick="goTo('+(state.current-1)+')"><span class="bnav-icon">←</span></button>';if(!answered)btns+='<button class="bnav-btn primary" id="bnav-confirm" onclick="submitAnswer()" disabled><span class="bnav-icon">✓</span> Confirmar</button>';else if(!isLast)btns+='<button class="bnav-btn primary" onclick="goTo('+(state.current+1)+')">Siguiente <span class="bnav-icon">→</span></button>';else btns+=simMode?'<button class="bnav-btn primary" onclick="endSimSection()">Finalizar →</button>':'<button class="bnav-btn success" onclick="finishQuiz()">Resultados 🏁</button>';if(state.mode==='exam')btns+='<button class="bnav-btn" onclick="finishQuiz()"><span class="bnav-icon">⏹</span></button>';nav.innerHTML=btns;syncBN();}
render();

</script>

(function(){var sx=0,sy=0,mv=false;document.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;mv=false;},{passive:true});document.addEventListener('touchmove',function(e){if(Math.abs(e.touches[0].clientY-sy)>20)mv=true;},{passive:true});document.addEventListener('touchend',function(e){if(mv)return;var dx=e.changedTouches[0].clientX-sx,dy=Math.abs(e.changedTouches[0].clientY-sy);if(Math.abs(dx)<60||dy>40||typeof state==='undefined'||state.screen!=='quiz')return;if(dx<-60&&state.current<state.questions.length-1){state.current++;render();}else if(dx>60&&state.current>0){state.current--;render();}},{passive:true});})();
